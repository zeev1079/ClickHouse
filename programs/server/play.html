                /// fragment, but the node references stay valid after the move into the table body.
                const streamed_rows = fragment.querySelectorAll('tr');
                targetResultEl.flushFragment(fragment);
                /// Keep the pinned-column feature live as the table streams: lay out the new rows
                /// for any already-pinned columns (e.g. a wide `?pinned_columns=...&run=1` link),
                /// and otherwise just refresh whether the table now scrolls horizontally so the pin
                /// toggles become usable mid-stream rather than only at EOF.
                targetResultEl._pinStreamedRows(streamed_rows);

                if (!cont)
                {
                    abortController.abort();
                    break;
                }
                buffer = lines[lines.length - 1];
            }

            /// A mid-stream exception fails the query. Keep any partial rows that already streamed
            /// in and render the error beneath them (a partial result is still worth showing), but
            /// if nothing but a header arrived, hide the empty table so only the error shows. The
            /// partial table still needs its layout pass (deferred while the tab is hidden).
            if (stream_exception !== null) {
                if (targetResultEl.rowCount > 0) {
                    targetResultEl.renderTotals();
                    targetResultEl.applyColumnColors();
                    if (tab.id === activeTabId) { targetResultEl.transposeIfNeeded(); targetResultEl._changeTableLayout(); }
                    else { targetResultEl._pendingTranspose = true; targetResultEl._pendingChangeLayout = true; }
                } else {
                    targetResultEl.clear();
                }
                targetResultEl.renderError(stream_exception);
                return { format, reply, response_ok: false, is_table: false, is_raw: false, is_chart: false, is_image: false, is_error: true };
            }
        } else if (format == 'JSONCompactColumns') {
            is_chart = true;
            reply = await response.text();
            if (posted_request_num != tab.reqNum) { return { cancelled: true }; }
            /// Await the chart render and let it bail inside (after the uPlot load, before
            /// touching the DOM) if a tab switch superseded this request meanwhile.
            await targetResultEl.renderChart(JSON.parse(reply), () => posted_request_num === tab.reqNum);
        } else {
            is_raw = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                let new_content = decoder.decode(value, { stream: true });
                reply += new_content;

                if (posted_request_num != tab.reqNum) { return { cancelled: true }; }
                targetResultEl.updateRaw(new_content);
            }
        }

        if (targetResultEl.isExplainGraph) {
            /// Bail inside renderGraph (after the Viz load, before mutating the DOM) if a tab
            /// switch superseded this request during the load. Kept inside the `try` so a Viz
            /// loader failure (like the uPlot one for charts) is reported as a normal error.
            await targetResultEl.renderGraph(() => posted_request_num === tab.reqNum);
        } else {
            /// Render totals before coloring, so the totals row (which `_colorTargetRows`
            /// includes) is colored on the first paint too. Totals and coloring are content-only
            /// (no measurement), so they run even for a hidden tab; the transpose pass measures
            /// widths, so it is deferred when the tab is hidden (see `applyDeferredLayout`).
            if (is_table) targetResultEl.renderTotals();
            targetResultEl.applyColumnColors();
            if (is_table) {
                if (tab.id === activeTabId) targetResultEl.transposeIfNeeded();
                else targetResultEl._pendingTranspose = true;
            }
        }

        /// A tab switch during an awaited renderer (chart/graph loader) makes the render bail
        /// without painting; report cancellation too, so the caller does not then update the
        /// now-active tab's shared progress/download/history state for this stale run.
        if (posted_request_num != tab.reqNum) { return { cancelled: true }; }

        return { format, reply, response_ok: true, is_table, is_raw, is_chart, is_image, is_error };
    } catch (e) {
        if (posted_request_num != tab.reqNum) { return { cancelled: true }; }

        console.log(e);
        if (e instanceof TypeError) {
            reply = "Network error";
        } else if (e.name === 'AbortError') {
            reply = "Query was cancelled";
        } else {
            reply = e.toString();
        }
        targetResultEl.renderError(reply);
        return { format, reply, response_ok: false, is_table: false, is_raw: false, is_chart: false, is_image: false, is_error: true };
    }
}

/// Build a compact stand-in for a failed reply too large to persist in full. The success path
/// drops an oversized result to `null` (it stays reproducible via `run=1`), but doing that for a
/// failure would lose the error entirely and make the tab reopen blank. Keep the essential error
/// text within the same size budget: the `{"exception":...}` line if the stream carried one — the
/// rows that streamed before it are what made the reply large and cannot be kept — otherwise a
/// bounded prefix of the error body. `restoreErrorSnapshot` renders either form on restore.
function compactFailureSnapshot(reply)
{
    /// Locate the `{"exception":...}` line without splitting the whole (potentially huge) reply.
    let start = reply.startsWith(`{"exception":`) ? 0 : reply.indexOf(`\n{"exception":`);
    if (start !== -1)
    {
        if (start > 0) ++start;   /// skip the leading newline
        let end = reply.indexOf('\n', start);
        if (end === -1) end = reply.length;
        const line = reply.slice(start, end);
        /// Keep the whole exception line when it fits, so the restore replays it as the exception.
        if (line.length <= 100000) return line;
        /// A single exception line over the budget: store just its message text (which the restore
        /// renders as a plain error) rather than a truncated, unparseable JSON line.
        try { return JSON.parse(line).exception.slice(0, 100000); }
        catch (e) { return line.slice(0, 100000); }
    }
    /// A plain (non-row) error body with no exception line: keep a bounded prefix.
    return reply.slice(0, 100000);
}

/// Execute a single query (legacy path, used for single-query mode) in the given `tab`, rendering
/// into that tab's own persistent result element. All shared-chrome updates (progress bar under
/// Run, download/copy buttons, page hue) are applied only when `tab` is the active one; otherwise
/// they are recorded on the tab and replayed by `syncActiveTabChrome` when it is next opened, so a
/// background run never disturbs the foreground.
/// When `history_query_text` is provided, it overrides `query` for browser history/URL storage,
/// preserving the full textarea content when running a selected query in multi-query mode.
/// `paramValuesSnapshot`, `connection` and `query_database` are captured by the caller
/// (`postOne`/`postAll`) BEFORE the lexer preflight await, so a tab switch during that await cannot
/// rebind this run to another tab's parameters, database, or freshly edited connection fields.
async function postSingle(tab, posted_request_num, query, history_query_text, paramValuesSnapshot, queryStart, connection, query_database)
{
    /// Per-run start time: tabs execute concurrently, so a shared global would be overwritten
    /// by whichever tab launched last and misreport the elapsed time of the others.
    const query_start = performance.now();
    const el = tab.resultEl;
    const active = () => tab.id === activeTabId;
    /// `history_query_text` is provided exactly when the run covered only PART of the launched
    /// editor (one statement of a multi-statement text, under the cursor or selected); with it
    /// absent, `query` IS the whole launched text. `saveHistory` needs this to decide whether the
    /// entry may carry `run=1` (see the full-editor requirement there).
    const ran_full_editor = history_query_text === undefined;
    /// The database, server address and user this run executes against are snapshotted by the caller
    /// (`postOne`/`postAll`) BEFORE the lexer preflight await, together with the connection tuple and
    /// parameter values, and threaded in — never re-read from the live inputs here. A tab switch +
    /// database/connection edit during that await must not retarget this already-snapshotted run.
    /// They are kept for the saved result snapshot and a later download so both reproduce the result
    /// against the database and server/user that produced it (see `writeHistoryEntry`/
    /// `materializeResult`). The password authenticates this run only; it is never persisted (see the
    /// `last_url_for_download` docs).
    const query_url = connection.url;
    const query_user = connection.user;

    tab.downloadVisible = false;
    tab.copyVisible = false;
    clearPanel(tab);
    tab.progressPhase = 'running';
    if (active()) { paintDownloadCopy(tab); progressEl.start(); }

    tab.controller = new AbortController();
    const result = await postImpl(tab, posted_request_num, query, el, tab.controller, paramValuesSnapshot, query_database, connection, queryStart);

    if (result.cancelled) return;

    if (result.is_error || !result.response_ok) {
        tab.logoVisible = false;
        tab.progressPhase = 'error';
        tab.failed = true;
        tab.downloadVisible = false;
        tab.copyVisible = false;
        if (active()) {
            logoEl.style.display = 'none';
            progressEl.clear();
            paintDownloadCopy(tab);
        }
        /// Persist the error as this tab's result snapshot. The restore path renders an
        /// `ok: false` snapshot as the exception, so switching away/back or reloading shows
        /// the failed query's error; without this, the failed run leaves the tab's previous
        /// successful result in place and that stale result would resurrect under the failed
        /// query. Guarded on the tab's request number (like the success path below and like
        /// `postMulti`), so a superseded run (re-run / cancel) does not overwrite the snapshot.
        if (posted_request_num == tab.reqNum) {
            /// Mark "finished while away" only when the tab is not the active one at the moment the
            /// run ends; a foreground finish must not make the tab sprout a completion check-mark
            /// the instant the user later switches away from it.
            tab.completed = !active();
            saveHistory({
                query: history_query_text || query,
                resultQuery: query,
                format: result.format,
                ok: result.response_ok,
                /// Unlike the success path, never drop a failure to `null`: keep at least a compact
                /// summary so a reload restores the error instead of reopening the tab blank.
                data: result.reply.length > 100000 ? compactFailureSnapshot(result.reply) : result.reply,
                elapsed_ns: 1e6 * (performance.now() - query_start),
                params: paramValuesSnapshot,
                fullEditor: ran_full_editor,
                database: query_database,
                url: query_url,
                user: query_user,
            }, undefined, tab);
        }
        updateTabIndicator(tab);
        return;
    }

    /// `postImpl` already performed `renderGraph`/`applyColumnColors`/`renderTotals`/`transposeIfNeeded`;
    /// the only step specific to the single-query path is the final table layout pass. It measures
    /// column widths, so defer it (like the transpose) when the tab is hidden — a hidden panel
    /// measures 0 and would freeze every column to minimal width (`applyDeferredLayout` runs it on
    /// show).
    if (result.is_table) {
        if (tab.id === activeTabId) el._changeTableLayout();
        else el._pendingChangeLayout = true;
    }

    tab.progressPhase = 'done';
    tab.failed = false;
    tab.downloadVisible = true;
    tab.copyVisible = result.is_raw;
    tab.downloadQuery = query;
    tab.downloadParams = paramValuesSnapshot;
    /// Record the database and connection this run produced its result against, so a later download
    /// (possibly after switching tabs, so `paintDownloadCopy` mirrors these into the shared
    /// `last_*_for_download`) reproduces the result against the same database/server/user rather than
    /// whatever connection happens to be live then. A fresh run's connection is always known, so the
    /// result is reproducible (unlike a legacy restored snapshot; see `materializeResult`).
    tab.downloadDatabase = query_database;
    tab.downloadUrl = query_url;
    tab.downloadUser = query_user;

    if (result.is_raw || result.is_image) {
        el.elapsedNs = 1e6 * (performance.now() - query_start);
    }
    tab.finalStats = { rowCount: el.rowCount, elapsedNs: el.elapsedNs, incomplete: el.incompleteResult };

    if (active()) {
        elapsed_ns = el.elapsedNs;
        progressEl.finish();
        paintDownloadCopy(tab);
        progressEl.updateText(el.rowCount, el.elapsedNs, el.incompleteResult);
        progressEl.style.setProperty('--progress', '0');
        document.documentElement.style.setProperty('--background-color-rotate', queryToColor(query));
    }

    if (posted_request_num != tab.reqNum) { updateTabIndicator(tab); return; }

    /// Only flag "finished while inactive" when the tab is not currently active (see the error
    /// path above): otherwise switching away from a tab that just finished in the foreground would
    /// wrongly show its completion check-mark.
    tab.completed = !active();
    updateTabIndicator(tab);

    /// Persist the result snapshot on this tab and record an entry in browser history + the URL.
    /// In multi-query "Run selected" mode `history_query_text` carries the full editor content (the
    /// editor text + URL), while `resultQuery` is the single statement that produced this result.
    /// The per-column color coding modes travel with the snapshot (see `saveHistory`).
    ///
    /// An image result (e.g. `FORMAT PNG`) streams as a blob and is rendered directly by `postImpl`,
    /// so its `reply` stays empty and the image bytes are not persisted. Store `data: null` for it,
    /// exactly like an oversized result and like the per-statement multi-query path (`postMulti`):
    /// the restore path treats `data: null` as "no stored snapshot" and reopens the tab idle rather
    /// than misclassifying the empty body as an empty raw result (with a Copy button). The run stays
    /// reproducible from the `run=1` URL (see `buildHistoryParams`), which is why images are grouped
    /// with oversized results as "not snapshotted" there. Storing `data: ''` here would fall through
    /// to the raw branch in `materializeResult` and restore the image tab as an empty text result.
    saveHistory({
        query: history_query_text || query,
        resultQuery: query,
        format: result.format,
        ok: result.response_ok,
        data: (result.is_image || result.reply.length > 100000) ? null : result.reply,
        elapsed_ns: el.elapsedNs,
        params: paramValuesSnapshot,
        fullEditor: ran_full_editor,
        database: query_database,
        url: query_url,
        user: query_user,
    }, undefined, tab);
}

/// Execute multiple queries with parallelization of consecutive SELECTs, in the given `tab`,
/// rendering into that tab's own multi-query container. Like `postSingle`, all shared-chrome
/// side effects apply only when `tab` is active; a background run only touches its own tab.
/// `parsed` is an array of { query, is_select } objects from splitAllQueries; `editorText` is the
/// full editor content captured at launch (used as the tab's saved query — must NOT be re-read
/// from the shared editor at completion, which by then may hold another tab's text).
/// `paramValuesSnapshot`, `connection` and `query_database` are captured by the caller before the
/// lexer preflight await (see `postSingle`); every statement group of this run uses the same values,
/// so a database/connection edit mid-run cannot reroute the later groups to a different database,
/// server or identity.
/// `ranFullEditor` says whether `parsed` covers EVERY statement of the launched editor ("Run all",
/// or a selection spanning all statements) — only then may the history entry carry `run=1`,
/// because its URL hash is the full editor text (see `saveHistory`).
async function postMulti(tab, posted_request_num, parsed, paramValuesSnapshot, editorText, connection, ranFullEditor, query_database)
{
    /// Per-run start time, as in `postSingle`: concurrent tabs must not share it.
    const query_start = performance.now();
    const active = () => tab.id === activeTabId;
    /// See `postSingle`: the database, server address and user are snapshotted by the caller before
    /// the lexer preflight await and threaded in; every statement group of this run uses the same
    /// values (groups run sequentially, so without a single snapshot editing the connection between
    /// groups would split one run across different servers/users while the saved provenance still
    /// claims a single producing connection). Kept for the saved result snapshot (see
    /// `writeHistoryEntry`); the password authenticates this run's requests only.
    const query_url = connection.url;
    const query_user = connection.user;

    tab.downloadVisible = false;
    tab.copyVisible = false;
    clearPanel(tab);
    tab.progressPhase = 'running';
    if (active()) { paintDownloadCopy(tab); progressEl.start(); }

    /// Hide this tab's single result element and the logo; the multi container takes over.
    tab.resultEl.style.display = 'none';
    tab.logoVisible = false;
    if (active()) logoEl.style.display = 'none';

    /// Create this tab's multi-query container if needed (one per tab, kept alive with the panel).
    if (!tab.multiContainer) {
        tab.multiContainer = document.createElement('div');
        tab.multiContainer.className = 'multi-query-results';
        tab.panel.insertBefore(tab.multiContainer, tab.resultEl);
    }
    tab.multiContainer.innerHTML = '';
    tab.multiContainer.style.display = 'block';
    if (active()) multiQueryContainer = tab.multiContainer;
    tab.multiControllers = [];

    /// Create result elements for each query.
    const resultElements = [];
    for (let i = 0; i < parsed.length; ++i) {
        const el = document.createElement('query-result');
        el._colorModes = tab.colorModes;
        el._pinnedColumns = tab.pinnedColumns;
        tab.multiContainer.appendChild(el);
        resultElements.push(el);
    }

    /// Track aggregated progress across all concurrent queries.
    const progressState = new Map(); /// query index -> { read_rows, read_bytes, total_rows, elapsed_ns }
    tab.progressState = progressState;
    function updateAggregatedProgress() {
        let total_read_rows = 0, total_read_bytes = 0, total_total_rows = 0, max_elapsed_ns = 0;
        for (const [, p] of progressState) {
            total_read_rows += p.read_rows;
            total_read_bytes += p.read_bytes;
            total_total_rows += p.total_rows;
            max_elapsed_ns = Math.max(max_elapsed_ns, p.elapsed_ns);
        }
        const detail = {
            read_rows: String(total_read_rows),
            read_bytes: String(total_read_bytes),
            total_rows_to_read: String(total_total_rows),
            elapsed_ns: String(max_elapsed_ns),
        };
        tab.progress = {
            read_rows: total_read_rows, read_bytes: total_read_bytes,
            total_rows_to_read: total_total_rows, elapsed_ns: max_elapsed_ns,
        };
        updateTabIndicator(tab);
        if (active()) progressEl.updateProgress(detail);
    }

    /// Listen for progress events from each result element.
    for (let i = 0; i < resultElements.length; ++i) {
        resultElements[i].addEventListener('query-progress', (e) => {
            progressState.set(i, {
                read_rows: +e.detail.read_rows,
                read_bytes: +e.detail.read_bytes,
                total_rows: +e.detail.total_rows_to_read,
                elapsed_ns: +e.detail.elapsed_ns,
            });
            updateAggregatedProgress();
        });
    }

    /// Group consecutive parallelizable queries together.
    /// Each group is either a batch of SELECTs (run in parallel) or a single non-SELECT (barrier).
    const groups = [];
    let current_group = null;
    for (let i = 0; i < parsed.length; ++i) {
        if (parsed[i].is_select) {
            if (!current_group || !current_group.parallelizable) {
                current_group = { parallelizable: true, indices: [] };
                groups.push(current_group);
            }
            current_group.indices.push(i);
        } else {
            current_group = { parallelizable: false, indices: [i] };
            groups.push(current_group);
        }
    }

    /// Execute groups sequentially; within a parallelizable group, execute all queries concurrently.
    /// Keep each statement's result so a small run can be snapshotted for restore (see below).
    let had_error = false;
    const collected = new Array(parsed.length).fill(null);
    for (const group of groups) {
        if (posted_request_num != tab.reqNum) return;
        if (had_error) break;

        const promises = group.indices.map(i => {
            const ac = new AbortController();
            tab.multiControllers.push(ac);
            return postImpl(tab, posted_request_num, parsed[i].query, resultElements[i], ac, paramValuesSnapshot, query_database, connection, parsed[i].queryStart)
                .then(result => ({ index: i, result }));
        });

        const results = await Promise.all(promises);

        for (const { index, result } of results) {
            if (result.cancelled) return;
            collected[index] = result;
            if (result.is_error || !result.response_ok) {
                had_error = true;
            }
        }
    }

    if (posted_request_num != tab.reqNum) return;

    /// Compute aggregated stats.
    let total_rows = 0;
    let max_elapsed_ns = 0;
    let any_incomplete = false;
    for (const el of resultElements) {
        total_rows += el.rowCount;
        max_elapsed_ns = Math.max(max_elapsed_ns, el.elapsedNs);
        if (el.incompleteResult) any_incomplete = true;
    }

    tab.logoVisible = !had_error;
    /// A "Run all" where any statement failed marks the tab failed (red cross on its title) and is
    /// encoded with the SAME `'error'` phase as a single-query failure — not `'done'`. Otherwise
    /// `syncActiveTabChrome` (whose `'done'` branch calls `progressEl.finish()`) would replay the
    /// green success check-mark when the failed background tab is reopened, contradicting its state.
    tab.failed = had_error;
    tab.progressPhase = had_error ? 'error' : 'done';
    tab.finalStats = {
        rowCount: total_rows,
        elapsedNs: max_elapsed_ns || 1e6 * (performance.now() - query_start),
        incomplete: any_incomplete,
    };

    if (active()) {
        if (had_error) {
            /// Mirror the single-query error path: clear the shared progress widget rather than
            /// showing the success check-mark; each statement's error is rendered in its own panel.
            progressEl.clear();
        } else {
            logoEl.style.display = 'block';
            progressEl.finish();
            elapsed_ns = tab.finalStats.elapsedNs;
            progressEl.updateText(total_rows, tab.finalStats.elapsedNs, any_incomplete);
            progressEl.style.setProperty('--progress', '0');
            document.documentElement.style.setProperty('--background-color-rotate', queryToColor(parsed[0].query));
        }
    }

    if (posted_request_num != tab.reqNum) { updateTabIndicator(tab); return; }

    /// As in the single-query path, only mark "finished while away" when this tab is inactive at
    /// the moment the run completes; a foreground finish must not badge the tab on the next switch.
    tab.completed = !active();
    updateTabIndicator(tab);

    /// Snapshot the per-statement results so switching tabs / reloading restores the whole
    /// "Run all" output (not just the queries), the same way a single query's result is kept.
    /// Mirror the single-query 100 KB cap, but on the TOTAL size across all statements: above
    /// it we store no data (`multi: null`) and the run is query-only (re-running reproduces it).
    /// Images stream as a blob (their `reply` stays empty) and cannot be re-rendered from text,
    /// so they are stored with `data: null` and restore as empty, exactly like a single image.
    let multi = collected.map((r, i) => ({
        query: parsed[i].query,
        format: r ? r.format : null,
        ok: r ? !!r.response_ok : false,
        data: (r && !r.is_image) ? r.reply : null,
    }));
    let multi_size = 0;
    for (const s of multi) multi_size += s.data ? s.data.length : 0;
    if (multi_size > 100000) multi = null;

    /// Save all queries to browser history, using the full editor content captured at launch.
    saveHistory({
        query: editorText,
        format: null,
        ok: !had_error,
        data: null,
        multi: multi,
        elapsed_ns: tab.finalStats.elapsedNs,
        params: paramValuesSnapshot,
        fullEditor: ranFullEditor,
        database: query_database,
        url: query_url,
        user: query_user,
    }, parsed[0].query, tab);
}

/// Restore an `ok: false` result snapshot into `el`, mirroring how the live streaming path leaves
/// a failed query (see the mid-stream exception handling in `postImpl`): the rows that streamed
/// before a `{"exception":...}` line are replayed first and the exception is rendered beneath
/// them, so reopening or reloading a failed tab keeps its partial result. Falls back to a bare
/// error when the snapshot produced no rows, or when its payload is not row JSON at all (e.g. a
/// non-200 error body). Returns true when partial rows were replayed as a table, so the caller
/// can run its usual table layout passes.
function restoreErrorSnapshot(el, data)
{
    let exception_line = null;
    const row_lines = [];
    for (const line of data.split('\n')) {
        if (line.length === 0) continue;
        if (line.startsWith(`{"exception":`)) { exception_line = line; break; }
        row_lines.push(line);
    }
    if (exception_line === null) {
        el.renderError(data);
        return false;
    }
    if (row_lines.length > 0) {
        try {
            const fragment = document.createDocumentFragment();
            for (const line of row_lines) {
                if (!el.update(JSON.parse(line), fragment)) break;
            }
            el.flushFragment(fragment);
        } catch (e) {
            /// The pre-exception lines are not row JSON (a plain-text error body that merely
            /// contains an exception line): drop the half-replayed content and show the error alone.
            el.clear();
        }
    }
    if (el.rowCount > 0) {
        el.renderTotals();
        el.applyColumnColors();
        el.renderError(JSON.parse(exception_line).exception);
        return true;
    }
    el.clear();
    el.renderError(JSON.parse(exception_line).exception);
    return false;
}

/// Render one saved multi-query statement snapshot into `el`, mirroring the live per-statement
/// rendering in `postImpl` (table / chart / EXPLAIN graph / raw / error), minus the streaming.
/// `matToken` (a snapshot of `tab.reqNum`) guards the awaited chart/graph loaders: a superseding
/// run/re-materialization/close of the tab bails before touching the DOM, and a loader failure
/// (e.g. a blocked CDN) is shown as an error for that statement rather than throwing out.
/// Returns false when such a restore-time failure turned a saved-successful statement into an
/// error panel, so the caller can fold it into the tab outcome (a persisted failure is already
/// accounted for by `snap.ok`); true otherwise, including when superseded (the caller re-checks
/// `matToken` and bails without using the value).
async function renderSnapshotIntoElement(el, snap, tab, matToken) {
    el.queryText = snap.query;
    /// `data == null` means no stored payload for this statement - an image (streamed as a blob,
    /// kept as `data: null`) or a statement that never ran - so restore it as blank. A successful
    /// statement with a legitimately empty body (`data === ''`, e.g. a raw-format `SELECT ... WHERE
    /// 0`) is not that case and must still render, so test null here, not falsiness (mirrors the
    /// single-query guard in `materializeResult`).
    if (snap.data == null) return true;
    const format = snap.format;

    if (!snap.ok) {
        /// Replay any rows that streamed before a mid-stream exception, as the live path
        /// leaves them; the replayed table gets the same transpose pass as the success path.
        if (restoreErrorSnapshot(el, snap.data)) el.transposeIfNeeded();
        return true;
    }

    let is_table = false;
    if (format == default_format) {
        is_table = true;
        let fragment = document.createDocumentFragment();
        for (const line of snap.data.split('\n')) {
            if (line.length == 0) continue;
            if (!el.update(JSON.parse(line), fragment)) { break; }
        }
        el.flushFragment(fragment);
    } else if (format == 'JSONCompactColumns') {
        if (matToken !== tab.reqNum) return true;
        try {
            await el.renderChart(JSON.parse(snap.data), () => matToken === tab.reqNum);
        } catch (e) {
            if (matToken !== tab.reqNum) return true;
            console.log(e);
            el.renderError(e.toString());
            return false;
        }
        if (matToken !== tab.reqNum) return true;
    } else {
        el.updateRaw(snap.data);
    }

    if (el.isExplainGraph) {
        try {
            await el.renderGraph(() => matToken === tab.reqNum);
        } catch (e) {
            if (matToken !== tab.reqNum) return true;
            console.log(e);
            el.renderError(e.toString());
            return false;
        }
        if (matToken !== tab.reqNum) return true;
    } else {
        /// Render totals before coloring, so the totals row (which `_colorTargetRows`
        /// includes) is colored on the first paint too.
        if (is_table) el.renderTotals();
        el.applyColumnColors();
        if (is_table) el.transposeIfNeeded();
    }
    return true;
}

/// Persist the per-column color coding modes so reloads, shares, and Back/Forward keep them.
/// The modes belong to the active tab's displayed result, so record them on the tab's result
/// snapshot (persisted to IndexedDB and re-applied when the tab is re-activated) and re-stamp the
/// current history entry + URL in place, without creating a new record.
function persistColorModes() {
    const tab = getActiveTab();
    const modes = tab ? tab.colorModes : {};
    if (tab && tab.result) tab.result.color_modes = modes;
    const url = new URL(window.location);
    if (Object.keys(modes).length > 0) {
        url.searchParams.set('color_modes', JSON.stringify(modes));
    } else {
        url.searchParams.delete('color_modes');
    }
    /// Keep the tabs state shape: fold the modes into the entry's nested `result` when it has one
    /// (matching how the restore path reads them back via `state.result || state`), else at
    /// the top level for a legacy flat entry.
    const cur = history.state;
    if (cur) {
        const next = cur.result
            ? { ...cur, result: { ...cur.result, color_modes: modes } }
            : { ...cur, color_modes: modes };
        try {
            history.replaceState(next, document.title, url.toString());
        } catch (e) {
            /// History manipulation is not allowed for the 'file:' protocol.
        }
    }
    scheduleSave();
}

/// Persist the pinned columns the same way `persistColorModes` persists the color modes: onto the
/// active tab's result snapshot, the URL, and the current history entry, so reloads, shares, and
/// Back/Forward keep them. The pinned set is PER TAB (`getActiveTab().pinnedColumns`), so a toggle
/// updates only the active tab's persisted set.
function persistPinnedColumns() {
    const tab = getActiveTab();
    const pins = tab ? tab.pinnedColumns : {};
    if (tab && tab.result) tab.result.pinned_columns = pins;
    const url = new URL(window.location);
    if (Object.keys(pins).length > 0) {
        url.searchParams.set('pinned_columns', JSON.stringify(pins));
    } else {
        url.searchParams.delete('pinned_columns');
    }
    /// Keep the tabs state shape: fold the pins into the entry's nested `result` when it has one
    /// (matching how the restore path reads them back via `state.result || state`), else at
    /// the top level for a legacy flat entry.
    const cur = history.state;
    if (cur) {
        const next = cur.result
            ? { ...cur, result: { ...cur.result, pinned_columns: pins } }
            : { ...cur, pinned_columns: pins };
        try {
            history.replaceState(next, document.title, url.toString());
        } catch (e) {
            /// History manipulation is not allowed for the 'file:' protocol.
        }
    }
    scheduleSave();
}

/// Re-render a saved multi-query ("Run all") result snapshot into `tab`'s own panel, rebuilding
/// its multi-query container the same way `postMulti` lays it out: one result element per
/// statement, this tab's single result element and the logo hidden, and aggregated progress text.
/// Called from `materializeResult` for a tab whose result carries a `multi` array (small runs;
/// large ones are query-only). `matToken` is the tab's materialization generation.
async function restoreMultiQuery(snapshot, tab, matToken) {
    tab.resultEl.style.display = 'none';

    if (!tab.multiContainer) {
        tab.multiContainer = document.createElement('div');
        tab.multiContainer.className = 'multi-query-results';
        tab.panel.insertBefore(tab.multiContainer, tab.resultEl);
    }
    tab.multiContainer.innerHTML = '';
    tab.multiContainer.style.display = 'block';
    if (tab.id === activeTabId) multiQueryContainer = tab.multiContainer;

    const elements = [];
    for (let i = 0; i < snapshot.multi.length; ++i) {
        const el = document.createElement('query-result');
        el._colorModes = tab.colorModes;
        el._pinnedColumns = tab.pinnedColumns;
        tab.multiContainer.appendChild(el);
        elements.push(el);
    }

    let any_restore_failed = false;
    for (let i = 0; i < snapshot.multi.length; ++i) {
        const rendered_ok = await renderSnapshotIntoElement(elements[i], snapshot.multi[i], tab, matToken);
        if (matToken !== tab.reqNum) return;
        if (!rendered_ok) any_restore_failed = true;
    }

    let total_rows = 0;
    let max_elapsed_ns = 0;
    let any_incomplete = false;
    for (const el of elements) {
        total_rows += el.rowCount;
        max_elapsed_ns = Math.max(max_elapsed_ns, el.elapsedNs);
        if (el.incompleteResult) any_incomplete = true;
    }

    /// The logo returns only for a fully successful run, matching the live `postMulti` path.
    /// Recorded on the tab; `syncActiveTabChrome` applies it to the shared logo/progress bar.
    /// A statement that failed to re-render (a chart/graph loader failure during restore) shows
    /// an error panel, so it counts as failed too — matching the single-query restore path in
    /// `materializeResult`, which flips the tab to `'error'` for the same loader failures.
    tab.logoVisible = !snapshot.multi.some(s => !s.ok) && !any_restore_failed;
    tab.failed = !tab.logoVisible;
    /// Restore the same phase the live run recorded (`postMulti`): a failed "Run all" is `'error'`,
    /// so reopening it does not paint the shared success check-mark over a failed tab.
    tab.progressPhase = tab.failed ? 'error' : 'done';
    tab.finalStats = { rowCount: total_rows, elapsedNs: snapshot.elapsed_ns || max_elapsed_ns, incomplete: any_incomplete };
}

/// Restore the SHARED editor (query text + parameter inputs) from a tab/history `state`. Guarded
/// by `token` (a snapshot of `activation_num`): a newer activation/run bumps it and this bails
/// after the tokenization await, so a slow restore never applies on top of a newer activation.
/// It does NOT touch the result DOM — the result lives in the tab's own panel and is rendered
/// separately by `materializeResult` (once, lazily) so switching keeps it intact. The producing
/// database/connection and the download-action targets are likewise restored per tab by
/// `materializeResult`, not here (this only touches the shared editor).
async function restoreEditor(state, token) {
    if (token === undefined) token = activation_num;
    query_area.value = state.query;
    query_area.dispatchEvent(new Event('input'));

    /// Restore query parameter inputs and their values. Replace the FULL snapshot rather than
    /// overlaying `state.params`: when the previous and restored tabs share a placeholder name,
    /// `updateQueryParams` keeps the existing input (the detected param list is unchanged), so a
    /// value from the previous tab would leak into a param the restored tab leaves unset. Reset
    /// every detected param explicitly (absent -> ''), then capture the snapshot into the active
    /// tab so its stored params match what is shown and will run.
    /// `updateQueryParams` awaits tokenization, and `activateTab` has already made this tab active,
    /// but the `param_*` inputs still hold the previous tab's values until `setParamValues` below.
    /// Mark the restore as in flight so a `captureActiveTab` running during the await (the debounced
    /// `persist`, or a quick second navigation) does not snapshot those stale inputs into this tab.
    params_restore_pending_token = token;
    const params_ok = await updateQueryParams();
    /// If a NEWER activation's restore has taken over the shared editor and parameter inputs, it now
    /// owns `params_restore_pending_token` (every `restoreEditor` stamps it with its own token): stop,
    /// so we neither overwrite that tab's freshly restored parameters nor clear its pending guard. A
    /// run in the SAME tab that superseded this activation (`postOne`/`postAll` bump `activation_num`
    /// without starting a new restore) still owns this token, so fall through: commit this tab's
    /// parameters into the now-rebuilt inputs and release the guard. Keying the bail on the token
    /// owner rather than on `activation_num` is what stops the guard from staying latched until the
    /// next tab switch — which would leave the visible `param_*` inputs decoupled from the values a
    /// later run actually sends (a run would keep sourcing the saved snapshot instead of the inputs).
    if (params_restore_pending_token !== token) return;
    const restored_params = {};
    if (params_ok)
    {
        for (const param of currentQueryParams)
        {
            restored_params[param.name] = state.params?.[param.name] ?? '';
        }
        setParamValues(restored_params);
    }
    else
    {
        /// Tokenization did not rebuild the parameter list (e.g. a query too large for the WASM
        /// lexer, or no lexer at all), so `currentQueryParams` may still describe the PREVIOUS
        /// tab. Deriving params from it would inject that tab's placeholder names into this one
        /// and persist them into history / `IndexedDB`. Fall back to this tab's own saved
        /// snapshot, and clear the stale param inputs (and the stale list) so the previous tab's
        /// names/values cannot linger in the UI or leak through `getParamValues`.
        queryParamsContainer.innerHTML = '';
        currentQueryParams = [];
        Object.assign(restored_params, state.params || {});
    }
    const active_tab_for_params = getActiveTab();
    if (active_tab_for_params) active_tab_for_params.params = restored_params;
    /// Parameters are now committed to both the DOM inputs and the tab; capture is safe again.
    params_restore_pending_token = null;
}

/// Render a tab's stored result snapshot (`tab.result`) into its OWN persistent result element,
/// the first time the tab is opened (lazy materialization) or when Back/Forward swaps its
/// snapshot. Sets per-tab state (progress phase, final stats, logo/download/copy visibility) but
/// does NOT paint the shared chrome — the caller does that via `syncActiveTabChrome`. Bumps the
/// tab's `reqNum` so a superseding run / re-materialization / close bails; guarded on `matToken`.
async function materializeResult(tab) {
    tab.materialized = true;
    tab.failed = false;   /// set true below if the restored snapshot is an error
    /// A rematerialized snapshot is a historical result, not a live run: drop any live-progress
    /// numbers left on the tab (e.g. from a later run before a Back to an older entry). Otherwise
    /// `syncActiveTabChrome`'s `'done'` branch would replay that stale `tab.progress` — the wrong
    /// run's `Read ...` counters and progress fill — underneath the restored result. The finished
    /// stats come from `tab.finalStats`, set below.
    tab.progress = null;
    const matToken = ++tab.reqNum;
    const el = tab.resultEl;
    const result = tab.result || {};

    /// Restore this result's per-column color coding modes before rendering so the table is
    /// colored on first paint. The element shares the tab's modes object.
    tab.colorModes = result.color_modes || {};
    el._colorModes = tab.colorModes;
    /// Restore this result's pinned columns likewise, so the table is laid out with them on first
    /// paint. The element shares the tab's pinned-columns object, mirroring the color modes above.
    tab.pinnedColumns = result.pinned_columns || {};
    el._pinnedColumns = tab.pinnedColumns;

    clearPanel(tab);
    tab.downloadVisible = false;
    tab.copyVisible = false;
    tab.downloadQuery = result.query || '';
    tab.downloadParams = result.params || {};
    /// Graph detection keys off the producing query, so a snapshot still renders as a graph
    /// even if the editor query was changed without rerunning.
    el.queryText = result.query ?? tab.query;

    /// A snapshotted multi-query ("Run all") result is restored into this tab's multi-query
    /// container, rebuilding one result element per statement, rather than into `tab.resultEl`.
    if (result.multi && result.multi.length) {
        await restoreMultiQuery(result, tab, matToken);
        return;
    }

    /// A finished failed run must restore as an error even when its body was too large to store in
    /// full (persisted as a compact summary) or was not stored at all (a legacy/edge snapshot with
    /// `data: null`): fall through to the `!result.ok` branch below rather than reopening blank. A
    /// never-run tab has no `ok` field, so it still resolves to idle here.
    ///
    /// A successful run with no stored snapshot (`data: null`) resolves to idle here too: this
    /// covers an oversized result and an image result (`FORMAT PNG` and friends), whose bytes are
    /// deliberately not persisted (see `postSingle`/`postMulti`) and which stay reproducible from
    /// the `run=1` URL. Reopening idle avoids rendering an empty raw result for them.
    ///
    /// Test `data == null` ("no stored snapshot"), not falsiness: a successful run can legitimately
    /// have an empty body (`data === ''`) in a raw format - e.g. `SELECT 1 WHERE 0 FORMAT CSV`
    /// returns `200` with no bytes - and must still restore as `done` (with its elapsed time and
    /// download action), not be demoted to idle.
    if (result.data == null && result.ok !== false) { tab.progressPhase = 'idle'; return; }

    let is_table = false;
    let is_raw = false;
    let format = result.format;

    if (!result.ok) {
        /// The idle logo is hidden for the error branch, matching the live single-query error path.
        tab.logoVisible = false;
        tab.progressPhase = 'error';
        tab.failed = true;
        if (result.data) {
            /// Replay any rows that streamed before a mid-stream exception, as the live path leaves
            /// them; the replayed table needs the same layout passes as the success restore below.
            if (restoreErrorSnapshot(el, result.data)) {
                el.transposeIfNeeded();
                el._changeTableLayout();
            }
        } else {
            /// The failure body was not stored (too large with no exception line to keep, or a
            /// legacy snapshot): show a notice so the tab restores as failed rather than blank.
            el.renderError('The query failed, but its error output was not stored.');
        }
        return;
    } else if (format == default_format) {
        is_table = true;
        let lines = result.data.split('\n');
        let fragment = document.createDocumentFragment();

        for (const line of lines) {
            if (line.length == 0) continue;
            if (!el.update(JSON.parse(line), fragment)) { break; }
        }

        el.flushFragment(fragment);
    } else if (format == 'JSONCompactColumns') {
        if (matToken !== tab.reqNum) { return; }
        /// renderChart awaits the uPlot loader on first use; the predicate makes it bail
        /// inside (right after the load, before mutating the DOM) if this materialization was
        /// superseded, and we re-check here too.
        try {
            await el.renderChart(JSON.parse(result.data), () => matToken === tab.reqNum);
        } catch (e) {
            /// The external chart library failed to load (e.g. CDN blocked). Show the error
            /// for this saved snapshot instead of throwing out half-rendered.
            if (matToken !== tab.reqNum) return;
            console.log(e);
            el.renderError(e.toString());
            tab.logoVisible = false;
            tab.progressPhase = 'error';
            tab.failed = true;
            return;
        }
        if (matToken !== tab.reqNum) { return; }
    } else {
        is_raw = true;
        el.updateRaw(result.data);
    }

    if (el.isExplainGraph) {
        try {
            await el.renderGraph(() => matToken === tab.reqNum);
        } catch (e) {
            /// The Viz loader failed; show the error instead of throwing out half-rendered.
            if (matToken !== tab.reqNum) return;
            console.log(e);
            el.renderError(e.toString());
            tab.logoVisible = false;
            tab.progressPhase = 'error';
            tab.failed = true;
            return;
        }
        if (matToken !== tab.reqNum) return;
    } else {
        /// Render totals before coloring, so the totals row is colored on first paint too.
        if (is_table) el.renderTotals();
        el.applyColumnColors();
        if (is_table) el.transposeIfNeeded();
        if (is_table) el._changeTableLayout();
    }

    /// A result is shown for this tab, so its download/copy actions apply to this query — unless the
    /// snapshot predates the producing-connection record (`download_reproducible` is false): its
    /// producing connection is unknown, so keep Download hidden until the query is rerun on the
    /// current connection (a rerun stamps a fresh, reproducible snapshot). Copy stays available: it
    /// copies the already-fetched result client-side and hits no server. The producing
    /// database/server/user are recorded on the tab so `paintDownloadCopy` targets the download at
    /// the connection that produced the result (see the download handler / `last_url_for_download`).
    const download_reproducible = result.url !== undefined && result.user !== undefined;
    tab.downloadDatabase = result.database || '';
    tab.downloadUrl = result.url ?? '';
    tab.downloadUser = result.user ?? '';
    tab.progressPhase = 'done';
    tab.downloadVisible = download_reproducible;
    tab.copyVisible = is_raw;
    if (is_raw) {
        el.elapsedNs = result.elapsed_ns;
    }
    tab.finalStats = { rowCount: el.rowCount, elapsedNs: el.elapsedNs, incomplete: el.incompleteResult };
}

let query_area = document.getElementById('query');

/// A middle click that focuses the query editor - duplicating a tab, or opening a table in a new
/// tab - additionally pastes the X11 PRIMARY selection on Linux, appending clipboard junk after the
/// query we just set. The new-tab activation (`activateTab` with `guard_paste`) arms this flag
/// right around that `query_area.focus()`, so we swallow exactly that one paste.
///
/// The guard must never eat a real keyboard paste. The X11 PRIMARY paste is mouse-driven and
/// carries no keystroke, whereas a real keyboard paste - Ctrl+V / Cmd+V, or Shift+Insert on
/// Linux/Windows - is always preceded by its own paste-shortcut `keydown`; disarming on that
/// `keydown` (which fires before the resulting `paste`) keeps the discrimination independent of
/// timing. So even if the user middle-clicks and immediately presses a paste shortcut on a platform
/// where no PRIMARY paste ever arrives, their paste is preserved; the short post-focus fallback in
/// `activateTab` only bounds how long a never-consumed guard can linger.
///
/// The guard is a single shared bit, so we keep the handle of its one fallback timer and cancel
/// it whenever the guard is re-armed or consumed. Otherwise two overlapping middle-click opens
/// (open A, then open B within the fallback window) would share the bit but leave two pending
/// timeouts: A's stale timeout could clear the bit that B re-armed, before B's PRIMARY paste
/// arrives, letting that paste land in the editor. Cancelling the previous timer on re-arm means
/// an older open's timeout can never clear a newer open's guard.
let suppress_middleclick_paste = false;
let middleclick_paste_timeout = null;
function disarmMiddleclickPaste() {
    suppress_middleclick_paste = false;
    clearTimeout(middleclick_paste_timeout);
    middleclick_paste_timeout = null;
}
query_area.addEventListener('keydown', e => {
    /// Match the physical `V` key via `e.code` rather than the printed character `e.key`: on a
    /// non-Latin layout (e.g. Russian) `Ctrl`/`Cmd`+paste reports a non-'v' `e.key`, so keying off
    /// the character would leave the guard armed and swallow the genuine paste. `e.code === 'KeyV'`
    /// is layout-independent, matching how the OS binds the paste shortcut on such layouts.
    /// `Shift+Insert` already keys off the layout-independent named key `'Insert'`.
    const keyboard_paste = ((e.ctrlKey || e.metaKey) && e.code === 'KeyV')
        || (e.shiftKey && e.key === 'Insert');
    if (keyboard_paste) disarmMiddleclickPaste();
});
query_area.addEventListener('paste', e => {
    if (suppress_middleclick_paste) {
        e.preventDefault();
        disarmMiddleclickPaste();
    }
});

appendTextareaResizer();

/// ===== Tabs =====================================================================
/// A tab bundles a query, its title, query parameters and a result snapshot.
/// We keep one shared editor (its content restored on activation) but a persistent result panel
/// per tab, so results survive switching and queries run independently (see the notes on the
/// `tabs` model above and the `activation_num` / per-tab `reqNum` token split).

const tab_bar_elem = document.getElementById('tab-bar');
const tabs_elem = document.getElementById('tabs');

/// The connection parameters (url/user/password) live in the `#inputs` element. When the tab
/// bar is shown they clutter the top of every tab, so we relocate that same element into a
/// drop-down behind a 🔑 button in the top-right corner. Relocating the existing element (rather
/// than duplicating the inputs) keeps every reference and event listener bound to it valid. The
/// three inputs carry `form="controls"`, so once moved out of the form's subtree they still count
/// as its fields: pressing `Enter` in url/user/password keeps submitting `#controls` (running the
/// query), matching the inline single-tab layout.
const inputs_elem = document.getElementById('inputs');
const controls_elem = document.getElementById('controls');
const connection_menu_elem = document.getElementById('connection-menu');
const connection_key_elem = document.getElementById('connection-key');
const connection_dropdown_elem = document.getElementById('connection-dropdown');

function openConnectionDropdown() {
    connection_dropdown_elem.hidden = false;
    connection_key_elem.setAttribute('aria-expanded', 'true');
    /// The url input was unmeasurable while the drop-down was display:none; recompute now.
    updateServerInfoVisibility();
}

function closeConnectionDropdown() {
    connection_dropdown_elem.hidden = true;
    connection_key_elem.setAttribute('aria-expanded', 'false');
}

/// Place the `#inputs` element either inline in `#controls` (no tab bar) or inside the
/// drop-down behind the 🔑 button (tab bar shown). Called from `renderTabBar` whenever the
/// tab bar's visibility is recomputed.
function syncConnectionUI() {
    const tabsShown = !tab_bar_elem.hidden;
    /// Capture whether the 🔑 button owns focus before the next line may hide it: hiding a focused
    /// element strands keyboard focus, so on the drop-down→inline transition we hand focus to a
    /// visible control below (the mirror of the inline→drop-down handoff).
    const keyHadFocus = document.activeElement === connection_key_elem;
    connection_key_elem.hidden = !tabsShown;
    if (tabsShown) {
        if (inputs_elem.parentElement !== connection_dropdown_elem) {
            /// If focus is inside `#inputs` when the tab bar first appears (e.g. the user pressed
            /// Enter in url/user/password to run the first query — reachable because those fields
            /// keep `form="controls"` and submit implicitly), moving the subtree into the hidden
            /// drop-down would strand focus on a hidden element. Move focus to the now-visible 🔑
            /// button first — as the Escape handler does — so keyboard users keep a visible focus
            /// target and the inputs stay one key press away behind that button.
            const refocus = inputs_elem.contains(document.activeElement);
            connection_dropdown_elem.appendChild(inputs_elem);
            if (refocus) connection_key_elem.focus();
        }
    } else {
        /// Restore the inline position (first child of the form) and make sure the drop-down
        /// is closed so a later reappearance of the tab bar starts collapsed.
        if (inputs_elem.parentElement !== controls_elem) {
            controls_elem.insertBefore(inputs_elem, controls_elem.firstChild);
        }
        closeConnectionDropdown();
        /// The `#connection-key` button was just hidden; if it owned focus, hand focus to the
        /// now-visible inline `url` input — the first connection field the button gated — so
        /// keyboard focus stays visible and the next Tab continues from the connection row.
        if (keyHadFocus) url_elem.focus();
    }
    /// The url input's width differs between the inline bar and the drop-down, so the point at
    /// which the hostname reaches the version/uptime indicator changes: recompute its visibility.
    updateServerInfoVisibility();
}

connection_key_elem.addEventListener('click', (e) => {
    /// Keep the toggle click from reaching the result-selection handler on `document`.
    e.stopPropagation();
    if (connection_dropdown_elem.hidden) openConnectionDropdown(); else closeConnectionDropdown();
});

/// A click inside the drop-down (e.g. typing in the inputs) must neither close it nor clear the
/// result selection, so keep it from bubbling to `document`.
connection_dropdown_elem.addEventListener('click', (e) => e.stopPropagation());

/// Close the drop-down on a click anywhere outside `#connection-menu` (which holds the 🔑 button
/// and the drop-down). Test the target in the capture phase instead of relying on the click
/// bubbling to `document`: several outside controls in this file (the download menu, the
/// databases-panel toggles, the terminal toggle, the tab-close button, the per-column toggles)
/// call `stopPropagation()` in their own bubble-phase click handlers, so a bubbling listener
/// would never see those clicks and the popover would stay open. A capture-phase listener runs
/// before all of them, so every outside interaction dismisses it.
///
/// A `click` fires on the nearest common ancestor of the `mousedown` and `mouseup` targets, so a
/// text selection that starts inside an input (e.g. selecting the user name) and is dragged past
/// the drop-down's border before release lands its `click` on an ancestor outside `#connection-menu`
/// — which would wrongly dismiss the popover mid-selection. Remember where the pointer went down
/// (capture phase, so it is unaffected by `stopPropagation()` on inner handlers) and only close
/// when the interaction both started and ended outside the menu.
let connection_pointerdown_inside = false;
document.addEventListener('mousedown', (e) => {
    connection_pointerdown_inside = connection_menu_elem.contains(e.target);
}, true);
document.addEventListener('click', (e) => {
    /// The latch is meaningful only for the pointer press that produced this `click`, and a press
    /// arms it only when it goes on to emit a `click` (`detail !== 0`). Two kinds of `click` must
    /// therefore ignore it: a keyboard or synthetic activation (Space/Enter on a focused control, or
    /// a programmatic `.click()`) reports `detail === 0` and has no preceding `mousedown`; and a
    /// mouse interaction that ends without a `click` — a right-click's `contextmenu`, a middle-click,
    /// or a drag released outside the window — leaves a stale latch that no `click` ever consumes.
    /// In both cases a stale `true` would otherwise wrongly suppress the outside dismissal, so the
    /// latch counts only for a real pointer `click`.
    const started_inside = e.detail !== 0 && connection_pointerdown_inside;
    if (!connection_menu_elem.contains(e.target) && !started_inside) closeConnectionDropdown();
}, true);
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !connection_dropdown_elem.hidden) {
        /// Closing hides the subtree that may own focus (a connection input). Return focus to
        /// the 🔑 button — as the download menu does with its trigger — so keyboard users keep a
        /// visible focus target and the next Tab continues from the tab bar, not the page top.
        const refocus = connection_dropdown_elem.contains(document.activeElement);
        closeConnectionDropdown();
        if (refocus) connection_key_elem.focus();
    }
});

/// The connection inputs keep `form="controls"`, so native constraint validation (e.g. the
/// `type="url"` check on `#url`) still runs on submit while they sit in the closed drop-down.
/// A hidden invalid control blocks the submit with no visible bubble, leaving the Run button
/// dead. Open the drop-down when a connection field reports invalid, so the browser shows its
/// validation bubble on a now-visible control. `invalid` does not bubble, so listen in the
/// capture phase. In the single-tab layout the 🔑 button is hidden and the inputs are already
/// visible inline, so nothing is opened.
inputs_elem.addEventListener('invalid', () => {
    if (!connection_key_elem.hidden && connection_dropdown_elem.hidden) openConnectionDropdown();
}, true);

/// Generate the next default title: "Query A" .. "Query Z", "Query AA", ...
/// Skips titles already in use so closing/reopening doesn't produce duplicates.
function nextDefaultTitle() {
    const used = new Set(tabs.map(t => t.title));
    for (;;) {
        let n = tabTitleSeq++;
        let letters = '';
        do { letters = String.fromCharCode(65 + (n % 26)) + letters; n = Math.floor(n / 26) - 1; } while (n >= 0);
        const title = 'Query ' + letters;
        if (!used.has(title)) return title;
    }
}

/// Tab titles double as the URL `tab=` key and the startup-reconciliation lookup key, so
/// they must stay unique: two tabs sharing a title would let a shared/reloaded URL match —
/// and overwrite — the wrong tab. If `desired` collides with another tab (ignoring the tab
/// `excludeId`, i.e. the one being renamed), disambiguate by appending " (2)", " (3)", …
function uniqueTitle(desired, excludeId) {
    const taken = new Set(tabs.filter(t => t.id !== excludeId).map(t => t.title));
    if (!taken.has(desired)) return desired;
    for (let i = 2; ; ++i) {
        const candidate = desired + ' (' + i + ')';
        if (!taken.has(candidate)) return candidate;
    }
}

/// Transient per-tab runtime state (never persisted). Kept in a factory so it can be attached both
/// to tabs created by `makeTab` and to tabs rehydrated from IndexedDB in `reconcileStartup`.
function tabRuntimeDefaults() {
    return {
        panel: null,            /// the <div class="tab-panel"> holding this tab's result(s)
        resultEl: null,         /// this tab's <query-result>
        multiContainer: null,   /// this tab's multi-query results container (created on demand)
        controller: null,       /// AbortController of this tab's in-flight single query
        multiControllers: [],   /// AbortControllers of this tab's in-flight multi-query statements
        reqNum: 0,              /// per-tab run/render generation (see the token model at `activation_num`)
        inFlight: false,        /// a query is currently running in this tab
        materialized: false,    /// this tab's stored result has been rendered into its panel
        completed: false,       /// a query finished while this tab was inactive (check-mark / cross on its title)
        failed: false,          /// the finished query errored (show a red cross instead of a green check)
        progress: null,         /// last progress detail (numbers) for the shared bar / tab indicator
        progressState: null,    /// per-statement progress map for a multi-query run
        progressPhase: 'idle',  /// 'idle' | 'running' | 'done' | 'error' — drives the shared bar on activation
        finalStats: null,       /// { rowCount, elapsedNs, incomplete } shown when a run finishes
        logoVisible: true,      /// whether the shared logo shows for this tab (hidden by errors / multi)
        colorModes: {},         /// per-column color modes for this tab's result (shared with its element)
        pinnedColumns: {},      /// pinned columns for this tab's result (shared with its element)
        downloadQuery: '',      /// query the download button should re-run for this tab
        downloadParams: {},
        downloadDatabase: '',   /// database the download should target (the producing connection)
        downloadUrl: '',        /// server address the download reproduces against (producing connection)
        downloadUser: '',       /// user the download reproduces against (producing connection)
        downloadVisible: false, /// whether the download / copy buttons apply to this tab
        copyVisible: false,
        launchQuery: undefined, /// editor text snapshotted when this tab's run was launched (see `saveHistory`)
        launchRunId: undefined, /// unique run identity of this tab's current launch (see `run_epoch` / `window.onpopstate`)
        runEditorInteraction: 0,  /// `editorInteractionGen` snapshot at this tab's run launch (see `beginFlight`)
        queryErrorOwnerStart: -1, /// editor offset of the statement owning the error marker in this tab's run, or -1
        barEl: null,            /// cached tab-bar row + indicator nodes (see renderTabBar/updateTabIndicator)
        spinnerEl: null,
        checkEl: null,
        crossEl: null,
        fillEl: null,
    };
}

/// Title for a duplicated tab: the whole source title is the family base, and the copy gets a
/// " N" suffix, N starting at 1 and incrementing until the result is free (titles must stay
/// unique — see `uniqueTitle`). Duplicating "Query A" yields "Query A 1", "Query A 2", …
///
/// The full source title is always used as the base — a trailing " N" is never stripped — so a
/// user-authored numeric ending is preserved and the duplicate lineage stays unambiguous:
/// duplicating "Incident 2025" yields "Incident 2025 1" (not "Incident 1"), and "Release 24 7"
/// yields "Release 24 7 1". A title-only heuristic cannot tell a user's trailing digits from a
/// duplicate counter — e.g. with both "Incident" and "Incident 2025" open, stripping " 2025"
/// would wrongly collapse the copy into the unrelated "Incident" family — so we do not strip.
function duplicateTitle(title) {
    const taken = new Set(tabs.map(t => t.title));
    for (let i = 1; ; ++i) {
        const candidate = title + ' ' + i;
        if (!taken.has(candidate)) return candidate;
    }
}

function makeTab(title, query) {
    return {
        id: 't' + (++tabSeq),
        title: title || nextDefaultTitle(),
        query: query || '',
        params: {},
        result: null,          /// last result snapshot (history-state shape) or null
        lastSavedQuery: undefined,
        ...tabRuntimeDefaults(),
    };
}

function getActiveTab() {
    return tabs.find(t => t.id === activeTabId) || null;
}

/// Create (once) this tab's persistent result panel and <query-result>, append it (hidden), and
/// wire its live-progress routing. The panel and its rendered result survive tab switches.
function getOrCreatePanel(tab) {
    if (tab.panel) return tab.panel;
    const panel = document.createElement('div');
    panel.className = 'tab-panel';
    panel.dataset.id = tab.id;
    panel.hidden = true;
    const el = document.createElement('query-result');
    el._colorModes = tab.colorModes;
    el._pinnedColumns = tab.pinnedColumns;
    panel.appendChild(el);
    resultPanelsEl.appendChild(panel);
    tab.panel = panel;
    tab.resultEl = el;
    el.addEventListener('query-progress', (e) => handleResultProgress(tab, e.detail));
    return panel;
}

/// Show only the given tab's panel (creating it if needed), hide the rest, and repoint the
/// active-result aliases (`resultEl`/`multiQueryContainer`) at it. Result content is untouched.
function setActivePanel(tab) {
    getOrCreatePanel(tab);
    for (const t of tabs) if (t.panel) t.panel.hidden = (t !== tab);
    resultEl = tab.resultEl;
    multiQueryContainer = tab.multiContainer;
}

/// Clear a tab's own result element and multi container (its logo state resets to visible). Only
/// touches the shared progress bar / logo when the tab is active; a background clear stays local.
function clearPanel(tab) {
    if (tab.resultEl) { tab.resultEl.clear(); tab.resultEl.style.display = ''; }
    if (tab.multiContainer) { tab.multiContainer.innerHTML = ''; tab.multiContainer.style.display = 'none'; }
    tab.logoVisible = true;
    if (tab.id === activeTabId) { progressEl.clear(); logoEl.style.display = 'block'; elapsed_ns = 0; }
}

/// Point the shared download/copy buttons at a tab's stored state.
function paintDownloadCopy(tab) {
    document.getElementById('download-div').style.display = tab.downloadVisible ? 'block' : 'none';
    document.getElementById('copy-div').style.display = tab.copyVisible ? 'block' : 'none';
    last_query_for_download = tab.downloadQuery || '';
    last_params_for_download = tab.downloadParams || {};
    /// Target the download at the database and connection that produced this tab's result (see the
    /// download handler / `last_url_for_download`), so switching tabs and downloading reproduces the
    /// active tab's own result rather than whatever the previous tab or the live inputs point at.
    last_database_for_download = tab.downloadDatabase || '';
    last_url_for_download = tab.downloadUrl || '';
    last_user_for_download = tab.downloadUser || '';
}

/// Repaint the shared chrome (Run/Stop button, favicon, progress bar, logo, download/copy) from
/// the ACTIVE tab's stored state, so switching to a tab shows exactly what its own query left
/// behind — including a still-running background query's live bar. Also clears its check-mark.
function syncActiveTabChrome() {
    const tab = getActiveTab();
    if (!tab) return;
    tab.completed = false;   /// opening a tab clears its "finished while away" check-mark

    if (tab.inFlight) {
        document.getElementById('run').innerText = 'Stop';
        document.getElementById('run-all').style.display = 'none';
    } else {
        updateRunButtons(isMultiQuery);
    }
    refreshFavicon();

    /// Fully reset the shared widget, then rebuild BOTH of its halves from this tab's own state:
    /// the live "Read ..." stats + bar (`updateProgress`) and the "N rows in result" line
    /// (`updateText`). Resetting first is what keeps a half we do not repaint from leaking the
    /// previously active tab's content (a stale "still running" bar under a done tab, or a stale
    /// "Read ..." line under a running one).
    progressEl.clear();
    if (tab.progressPhase === 'running') {
        progressEl.start();
        if (tab.progress) {
            progressEl.updateProgress(tab.progress);
            progressEl.updateText(tab.progress.rowCount, tab.progress.elapsed_ns, tab.progress.incomplete);
        }
    } else if (tab.progressPhase === 'done' && tab.finalStats) {
        progressEl.finish();
        if (tab.progress) progressEl.updateProgress(tab.progress);
        progressEl.updateText(tab.finalStats.rowCount, tab.finalStats.elapsedNs, tab.finalStats.incomplete);
        progressEl.style.setProperty('--progress', '0');
    }

    logoEl.style.display = tab.logoVisible ? 'block' : 'none';
    paintDownloadCopy(tab);
}

/// Serialize the live editor (query text + parameter values) into the active tab.
/// The result snapshot is written separately by `saveHistory` after a run.
function captureActiveTab() {
    const tab = getActiveTab();
    if (!tab) return;
    tab.query = query_area.value;
    /// While an activation is restoring this tab's parameter inputs (after the `updateQueryParams`
    /// await in `restoreEditor`, before `setParamValues`), the `param_*` DOM inputs still hold the
    /// previously active tab's values. Snapshotting them now would overwrite this tab's own
    /// parameters with the previous tab's. Skip the capture until a restore commits (which nulls
    /// the token); `tab.query` is safe (set before the await). A run that supersedes the restore
    /// keeps the guard armed only until that restore's tail commits (its tail runs even when a
    /// same-tab run superseded the activation, so the guard is not latched indefinitely); a switch
    /// to another tab hands the guard to that tab's own restore.
    if (params_restore_pending_token === null) tab.params = getParamValues();
}

/// Abort a tab's in-flight query (if any) and supersede its run generation so its late responses
/// bail. Touches only that tab. Used by cancel/close and by Back/Forward re-materialization.
function abortTabQuery(tab) {
    ++tab.reqNum;
    if (tab.controller) tab.controller.abort();
    for (const ac of tab.multiControllers) ac.abort();
    tab.multiControllers = [];
    tab.inFlight = false;
}

/// Activate a tab: reveal its persistent panel, restore the shared editor from it, materialize its
/// stored result the FIRST time it is opened (lazily), and repaint the shared chrome from its
/// state. It does NOT abort a query running in the tab we leave or the one we open — a background
/// query keeps streaming into its own panel, and returning to it shows its live progress.
/// `guard_paste` is set when a middle-click new-tab gesture opened this tab, so the activation
/// swallows the X11 PRIMARY paste that follows focusing the editor.
async function activateTab(id, guard_paste = false) {
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;
    activeTabId = id;
    ++activation_num;
    const token = activation_num;

    setActivePanel(tab);

    /// Restore the shared editor (query text + params) from the tab; the result DOM stays put.
    await restoreEditor({ query: tab.query, params: tab.params }, token);
    if (token !== activation_num) return; /// a newer activation/run superseded this one

    /// Lazily materialize the stored result into this tab's element the first time it is opened,
    /// unless a query is running in it (the live stream owns the element) or it is already built.
    if (!tab.materialized && !tab.inFlight) {
        await materializeResult(tab);
        if (token !== activation_num) return;
    }

    /// Apply any layout passes deferred while this tab's result rendered in the background (its
    /// panel was hidden, so column widths measured 0). The panel is visible now, so measurements
    /// are valid; covers the single result element and every multi-query statement element.
    for (const el of tab.panel.querySelectorAll('query-result')) el.applyDeferredLayout();

    syncActiveTabChrome();
    document.documentElement.style.setProperty('--background-color-rotate', queryToColor(tab.query));
    renderTabBar();
    /// A middle-click duplicate or new-tab open arms the X11 PRIMARY paste guard right around this
    /// focus, so the paste Linux delivers to the freshly-focused editor is swallowed - and only that
    /// one. Anchoring the guard here, rather than at the original `auxclick`, means a slow activation
    /// can never let it expire before focus. It is cleared by the swallowed paste, by a real
    /// paste-shortcut keydown (which must never be eaten - see `suppress_middleclick_paste`), or by
    /// the short fallback below in case no paste fires at all (non-Linux, empty selection), so the
    /// flag can never linger. Re-arming here cancels any previous open's pending fallback timer, so
    /// an overlapping middle-click open cannot have its guard cleared by an earlier open's timeout.
    if (guard_paste) {
        clearTimeout(middleclick_paste_timeout);
        suppress_middleclick_paste = true;
    }
    query_area.focus();
    if (guard_paste) middleclick_paste_timeout = setTimeout(disarmMiddleclickPaste, 250);
}

/// Switch tabs in response to a user click: capture the current tab, activate the
/// target, and push a browser-history entry so Back/Forward moves between tabs.
async function switchToTab(id) {
    if (id === activeTabId) return;
    /// `reconcileStartup`'s deferred auto-run and URL-driven parameter restore act on
    /// `getActiveTab()`/`activeTabId` AFTER awaiting (`updateQueryParams`, the lexer preflight in
    /// `postAll`); a tab switch during one of those awaits would otherwise silently retarget them
    /// at the newly active tab instead of the URL-authoritative one. Bootstrap-dirty makes
    /// reconciliation yield to it, same as any other genuine interaction during the load window.
    markBootstrapDirty();
    captureActiveTab();
    /// Fold the captured editor state of the tab we are leaving back into its own history
    /// entry, so a later Back/Forward to it restores the latest edit rather than the stale
    /// last-run/URL snapshot.
    refreshCurrentHistoryEntry(getActiveTab());
    await activateTab(id);
    syncHistory();
}

function addTab() {
    markBootstrapDirty();   /// user created a tab; reconciliation must preserve it
    captureActiveTab();
    refreshCurrentHistoryEntry(getActiveTab());
    const tab = makeTab();
    tabs.push(tab);
    activeTabId = tab.id;
    /// A brand new tab has no result; its panel materializes empty on activation.
    activateTab(tab.id).then(syncHistory);
    scheduleSave();
}

/// Duplicate a tab: copy its query and parameters into a new tab inserted right after the
/// source, then switch to the copy. Triggered by a middle-click, Shift+click, or the platform's
/// new-tab modifier click (Cmd+click on macOS, Ctrl+click elsewhere) on the title — the browser
/// gesture for "open in a new tab" (macOS Ctrl+click is the secondary/context-menu click and is
/// left to the browser, not a duplicate gesture). `guard_paste` is set for a genuine middle click,
/// so the activation swallows the X11 PRIMARY paste that follows focusing the editor.
function duplicateTab(id, guard_paste = false) {
    const src = tabs.find(t => t.id === id);
    if (!src) return;
    /// Flush any in-progress inline title rename here, before `duplicateTitle(src.title)` reads the
    /// title below, so a copy of the tab being renamed reflects the new name rather than the stale
    /// one. `renderTabBar` also flushes on every rebuild, but that runs later (via `activateTab`),
    /// after the title has already been read. The editor is always the active tab.
    if (activeTitleCommit) activeTitleCommit(true);
    markBootstrapDirty();   /// user created a tab; reconciliation must preserve it
    /// Fold live editor edits into the (possibly source) tab first, so the copy reflects them.
    captureActiveTab();
    refreshCurrentHistoryEntry(getActiveTab());

    const tab = makeTab(duplicateTitle(src.title), src.query);
    tab.params = { ...src.params };
    const idx = tabs.findIndex(t => t.id === id);
    tabs.splice(idx + 1, 0, tab);
    activeTabId = tab.id;
    activateTab(tab.id, guard_paste).then(syncHistory);
    scheduleSave();
}

/// Like `addTab`, but the new tab starts pre-filled with `query` and becomes active.
/// Used by the databases panel when a table is opened with a new-tab gesture: middle
/// click, Shift+click, or the platform's new-tab modifier click - Cmd+click on macOS,
/// Ctrl+click elsewhere (on macOS `Ctrl+Click` is the context-menu click, not a new-tab
/// gesture; see the manual matrix above `onTableActivate`). `guard_paste` is set for a
/// genuine middle click, so the activation swallows the X11 PRIMARY paste that follows
/// focusing the editor.
function openQueryInNewTab(query, guard_paste = false) {
    markBootstrapDirty();   /// user created a tab; reconciliation must preserve it
    captureActiveTab();
    refreshCurrentHistoryEntry(getActiveTab());
    const tab = makeTab(undefined, query);
    tabs.push(tab);
    activeTabId = tab.id;
    activateTab(tab.id, guard_paste).then(syncHistory);
    scheduleSave();
}


function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const closing = tabs[idx];
    const wasActive = id === activeTabId;
    /// Closing a tab is a genuine user action that can change `activeTabId` (when the active tab is
    /// closed and a neighbour is activated below). During `reconcileStartup`'s await window this is
    /// the same class of interaction that `switchToTab`/`addTab`/`openQueryInNewTab` already mark
    /// dirty: without it, closing the URL-authoritative tab would leave `bootstrap_dirty === false`,
    /// and the deferred URL param-restore / `run=1` auto-run would retarget the newly activated tab,
    /// executing a different tab's query without an explicit Run.
    markBootstrapDirty();
    /// Stop the closed tab's query and drop its panel from the DOM (freeing its result/images).
    abortTabQuery(closing);
