/// Stop the ACTIVE tab's query (the Run→Stop button / Ctrl+Enter while running).
async function cancel()
{
    const tab = getActiveTab();
    if (!tab) return;
    /// Bump the tab's run generation and abort its requests so postImpl/postSingle/postMulti
    /// see a stale run token and bail out before saving history.
    abortTabQuery(tab);
    endFlight(tab);
    /// The query was stopped, not completed: drop the 'running' progress state and its live
    /// snapshot, so reopening this tab does not replay a spinning hourglass / stale "still
    /// running" bar via `syncActiveTabChrome`. Cancel always targets the active tab, so also
    /// clear the shared progress widget right away (it still shows the running spinner).
    tab.progressPhase = 'idle';
    tab.progress = null;
    progressEl.clear();
}

function storeCredentials() {
    if (password_elem.value) {
        const cred = new PasswordCredential({
            id: user_elem.value,
            password: password_elem.value,
            name: url_elem.value,
        });
        navigator.credentials.store(cred);
    }
}

/// The "Run" / "Run one" button submits the form; handle it here.

{

    markBootstrapDirty(e);   /// a manual run before reconciliation must keep this tab's state
    if (activeInFlight()) {
        cancel();

        postOne();
        storeCredentials();
    }
});

/// The "Run all" button.
document.getElementById('run-all').addEventListener('click', e =>

/// On Mac, the shortcut is Cmd+Enter; elsewhere it is Ctrl+Enter. Show only the relevant modifier in the hint.
/// Match case-insensitively: UA Client Hints reports macOS as "macOS" and iOS as "iOS",
/// while the legacy navigator.platform reports "MacIntel", "iPhone", "iPad", etc.
const isMac = /mac|iphone|ipad|ipod|ios/i.test(navigator.userAgentData?.platform || navigator.platform || '');
document.getElementById('hint-modifier').innerText = isMac ? 'Cmd' : 'Ctrl';

document.addEventListener('keydown', event => {
    /// Firefox has code 13 for Enter and Chromium has code 10.
    if ((event.metaKey || event.ctrlKey) && (event.keyCode == 13 || event.keyCode == 10)) {
        markBootstrapDirty(event);
        if (activeInFlight()) {
            cancel();
        } else if (event.shiftKey && isMultiQuery) {
            /// Ctrl/Cmd+Shift+Enter runs all queries in multi-query mode.
            postAll();
            storeCredentials();
        } else {
            postOne();
            storeCredentials();
        }
        event.preventDefault();
    }
});

/// Pressing Tab in textarea will increase indentation.
/// But for accessibility reasons, we will fall back to tab navigation if the user already used Tab for that.

let user_prefers_tab_navigation = false;

[...document.querySelectorAll('input')].map(elem => {
    elem.onkeydown = (e) => {
        if (e.key == 'Tab') { user_prefers_tab_navigation = true; }
    };
});

query_area.onkeydown = (e) => {
    if (e.key == 'Tab' && !event.shiftKey && !user_prefers_tab_navigation) {
        document.execCommand('insertText', false, '    ');
        e.preventDefault();
        return false;
    } else if (e.key === 'Enter' && !(event.metaKey || event.ctrlKey)) {
        // If the user presses Enter, and the previous line starts with spaces,
        // then we will insert the same number of spaces.
        const elem = e.target;
        if (elem.selectionStart !== elem.selectionEnd) {
            // If there is a selection, then we will not insert spaces.
            return;
        }
        const cursor_pos = elem.selectionStart;

        const elem_value = elem.value;
        const text_before_cursor = elem_value.substring(0, cursor_pos);
        const text_after_cursor = elem_value.substring(cursor_pos);
        const prev_lines = text_before_cursor.split('\n');
        const prev_line = prev_lines.pop();
        const lead_spaces = prev_line.match(/^\s*/)[0];
        if (!lead_spaces) {
            return;
        }

        // Add leading spaces to the current line.
        elem.value = text_before_cursor + '\n' + lead_spaces + text_after_cursor;
        elem.selectionStart = cursor_pos + lead_spaces.length + 1;
        elem.selectionEnd = elem.selectionStart;
        // Notify listeners (e.g. the syntax-highlighting backdrop) that the textarea
        // value changed — direct assignment to `value` does not fire `input`.
        elem.dispatchEvent(new Event('input', { bubbles: true }));

        e.preventDefault();
        return false;
    } else if ((e.ctrlKey || e.metaKey) && e.key === '/' && !e.shiftKey) {
        // Comment/uncomment selected lines on Ctrl+/ or Cmd+/
        const elem = e.target;
        const start = elem.selectionStart;
        const end = elem.selectionEnd;
        const value = elem.value;

        let lineStart = value.lastIndexOf('\n', start - 1) + 1;
        let lineEnd = value.indexOf('\n', end);
        if (lineEnd === -1) lineEnd = value.length;

        let selectedText = value.substring(lineStart, lineEnd);
        let lines = selectedText.split('\n');

        // Comment out each line, or uncomment if all lines are already commented
        const allCommented = lines.every(line => /^\s*--/.test(line));

        // If all lines are commented out, uncomment them
        if (allCommented) {
            lines = lines.map(line => line.replace(/^(\s*)-- ?/, '$1'));
        } else {
            lines = lines.map(line => {
                if (/^\s*$/.test(line)) {
                    return line;
                }
                return line.replace(/^(\s*)/, '$1-- ');
            });
        }

        const replacedText = lines.join('\n');
        elem.value = value.slice(0, lineStart) + replacedText + value.slice(lineEnd);

        // Adjust selection to keep the user in flow and enable quick reversal
        elem.selectionStart = lineStart;
        elem.selectionEnd = lineStart + replacedText.length;
        // Notify listeners (e.g. the syntax-highlighting backdrop) that the textarea
        // value changed — direct assignment to `value` does not fire `input`.
        elem.dispatchEvent(new Event('input', { bubbles: true }));

        e.preventDefault();
        return false;
    }
};

function formatReadable(number = 0, decimals = 2, units = []) {
    const k = 1000;
    const i = number ? Math.floor(Math.log(number) / Math.log(k)) : 0;
    const unit = units[i];
    const dm = unit ? decimals : 0;
    return Number(number / Math.pow(k, i)).toFixed(dm) + unit;
}

function formatReadableBytes(bytes) {
    const units = [' B', ' KB', ' MB', ' GB', ' TB', ' PB', ' EB', ' ZB', ' YB'];

    return formatReadable(bytes, 2, units);
}

function formatReadableRows(rows) {
    const units = ['', ' thousand', ' million', ' billion', ' trillion', ' quadrillion'];

    return formatReadable(rows, 2, units);
}

function appendTextareaResizer() {
    const queryDiv = document.getElementById('query_div');
    const textarea = document.getElementById('query');

    let drag_state = {
        elem: null,
        is_dragging: false,
        offset_y: null,
        offset_height: null
    };

    const start = (e) => {
        if (e.button !== 0) { return; }

        drag_state.offset_y = e.clientY;
        drag_state.offset_height = textarea.offsetHeight;
        drag_state.is_dragging = true;
        drag_state.elem = e.target;
        drag_state.elem.classList.add('textarea-resizer-dragging');

        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
        document.addEventListener('pointercancel', stop);
    }

    const move = (e) => {
        if (!drag_state.is_dragging) { return; }

        const dy = e.clientY - drag_state.offset_y;
        const newHeight = drag_state.offset_height + dy;

        textarea.style.height = `${newHeight}px`;
    }

    const stop = (e) => {
        drag_state.is_dragging = false;
        drag_state.elem.classList.remove('textarea-resizer-dragging');

        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', stop);
        document.removeEventListener('pointercancel', stop);
    }

    const resizer = document.createElement('div');
    resizer.className = 'textarea-resizer';
    resizer.addEventListener('pointerdown', start);
    resizer.addEventListener('touchstart', (e) => e.preventDefault());

    queryDiv.appendChild(resizer);
}

function resizeQueryAreaIfSlightlyOverflowing()
{
    const textarea = document.getElementById('query');
    const current_height = textarea.offsetHeight;
    if (!current_height) { return; }

    const style = window.getComputedStyle(textarea);
    const vertical_border = parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
    const required_height = textarea.scrollHeight + vertical_border;
    const max_auto_resize_height = current_height * 1.3;

    if (required_height > current_height && required_height <= max_auto_resize_height)
    {
        textarea.style.height = `${required_height}px`;
    }
}

async function tokenize(query) {
    await loadLexer();

    let exports = lexer_module.instance.exports;
    let buffer = exports.memory.buffer;
    let memory_offset = 0;

    /// Allocate memory for the lexer object
    const lexer = new Uint8Array(buffer, memory_offset, exports.clickhouse_lexer_size);
    memory_offset += exports.clickhouse_lexer_size;

    /// Allocate the query
    const bytes = new TextEncoder().encode(query);
    const query_array = new Uint8Array(buffer, memory_offset, bytes.length);
    query_array.set(bytes);
    const query_begin = memory_offset;
    memory_offset += bytes.length;
    const query_end = memory_offset;

    /// Initialize the lexer
    exports.clickhouse_lexer_create(lexer, query_begin, query_end, 65536);

    /// Allocate the out ptrs
    const token_begin = memory_offset;
    memory_offset += 4;
    const token_end = memory_offset;
    memory_offset += 4;

    let result = [];

    while (true) {
        const token_type = exports.clickhouse_lexer_next_token(lexer, token_begin, token_end);
        if (exports.clickhouse_lexer_token_is_error(token_type) || exports.clickhouse_lexer_token_is_end(token_type)) {
            break;
        }

        const view = new DataView(buffer);
        const begin = view.getUint32(token_begin, true);
        const end = view.getUint32(token_end, true);

        const token_bytes = new Uint8Array(buffer, begin, end - begin);
        let token = new TextDecoder().decode(token_bytes);

        result.push({type: token_type, significant: exports.clickhouse_lexer_token_is_significant(token_type), token: token});
    }

    return result;
}

/// Regression coverage for this function lives in
/// `src/Parsers/tests/gtest_play_get_query_under_cursor.cpp` (a port of the token-walking
/// algorithm on top of the same `DB::Lexer`). Keep the two in sync when changing the logic.
/// Pure w.r.t. the DOM: it takes a snapshot of the editor (`all_queries` + `cursor_position`,
/// captured by the caller before any await) and RETURNS the query to run plus the editor range to
/// highlight and the query's start offset (`{ query, selStart, selEnd, queryStart, isMulti }`).
/// `isMulti` reports whether the SNAPSHOTTED text contains more than one statement, so the caller
/// can decide multi-query behavior (e.g. what to record as the tab's full draft) from the launched
/// text itself rather than from the global `isMultiQuery` flag, which a tab switch during the
/// caller's awaits rewrites to describe another tab's content. `selStart` is
/// null when nothing should be selected (single query, or the WebAssembly-less fallback). `queryStart`
/// is the absolute character offset of the query in the editor, threaded into `highlightQueryError`
/// so a server-reported error position maps back to the statement that actually ran, even when the
/// same query text appears more than once. The caller applies the selection/focus, and only when its
/// tab is still active — so a background run cannot move the foreground editor.
async function getQueryUnderCursor(all_queries, cursor_position) {
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function') {
        return { query: all_queries, selStart: null, selEnd: null, queryStart: 0, isMulti: false };
    }

    const tokens = await tokenize(all_queries);
    const should_select_query = getQueryBoundaries(tokens, all_queries).length > 1;

    let current_query_start = 0;
    let current_offset = 0;
    /// Track the most recently completed non-empty query so that if the cursor
    /// is past the last `;` (with only whitespace/comments after it, or only
    /// further delimiter-only segments like `;;`), we run that query instead
    /// of returning an empty string or a bare delimiter.
    let last_query_start = -1;
    let last_query_end = -1;

    for (const elem of tokens) {
        if (current_query_start == current_offset && !elem.significant) {
            current_query_start += elem.token.length;
        }
        const offset_before_token = current_offset;
        current_offset += elem.token.length;
        if (elem.token == ';') {
            /// If `current_query_start == offset_before_token`, the segment up
            /// to this `;` has no significant content (only whitespace/comments
            /// that the leading-skip above has consumed, or nothing at all).
            /// Treat such a delimiter-only segment as empty: do not run it and
            /// do not record it as the last completed query.
            const has_content = current_query_start < offset_before_token;
            if (has_content && current_offset >= cursor_position) {
                return {
                    query: all_queries.substring(current_query_start, current_offset),
                    selStart: should_select_query ? current_query_start : null,
                    selEnd: should_select_query ? current_offset : null,
                    queryStart: current_query_start,
                    isMulti: should_select_query,
                };
            }
            if (has_content) {
                last_query_start = current_query_start;
                last_query_end = current_offset;
            }
            current_query_start = current_offset;
        }

    }

    /// The cursor is past the last `;`. If the tail has no significant content
    /// (only whitespace/comments, which the leading-skip loop above will have
    /// advanced `current_query_start` past until it equals `current_offset`),
    /// fall back to the query that ended at the last `;` rather than returning
    /// an empty string. This is what handles the "single query ending in `;`
    /// with the cursor placed after it" case.
    if (current_query_start === current_offset && current_offset === all_queries.length && last_query_end >= 0) {
        return {
            query: all_queries.substring(last_query_start, last_query_end),
            selStart: should_select_query ? last_query_start : null,
            selEnd: should_select_query ? last_query_end : null,
            queryStart: last_query_start,
            isMulti: should_select_query,
        };
    }

    /// Cursor is in the last query (no trailing semicolon).
    return {
        query: all_queries.substring(current_query_start),
        selStart: should_select_query ? current_query_start : null,
        selEnd: should_select_query ? all_queries.length : null,
        queryStart: current_query_start,
        isMulti: should_select_query,
    };
}

const PARALLELIZABLE_KEYWORDS = new Set([
    'SELECT', 'SHOW', 'DESCRIBE', 'DESC', 'EXISTS', 'EXPLAIN', 'WITH'
]);

/// Split the textarea content into individual queries using the lexer.
/// Returns an array of { query, is_select } objects.
/// `is_select` is true for queries that start with a parallelizable keyword
/// (after skipping whitespace, comments, and opening brackets).
async function splitAllQueries(text) {
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function') {
        return [{ query: text, is_select: PARALLELIZABLE_KEYWORDS.has(text.trimStart().split(/\s/)[0].toUpperCase()), start: 0, end: text.length, queryStart: 0 }];
    }

    const tokens = await tokenize(text);
    const queries = [];
    let current_query_start = 0;
    let current_offset = 0;
    let first_keyword = null; /// First significant non-bracket token of the current query.
    let has_significant = false;
    let first_significant_offset = -1;
    let last_significant_end = -1;

    for (const elem of tokens) {
        current_offset += elem.token.length;

        if (elem.token == ';') {
            if (has_significant) {
                const raw = text.substring(current_query_start, current_offset);
                const q = raw.trim();
                if (q && q !== ';') {
                    queries.push({
                        query: q,
                        is_select: first_keyword !== null && PARALLELIZABLE_KEYWORDS.has(first_keyword),
                        start: first_significant_offset,
                        end: last_significant_end,
                        /// Exact character offset where the trimmed query text begins in `text`,
                        /// so a server-reported error position can be mapped to this statement even
                        /// when the same text appears more than once (e.g. `SELECT 1; SELECT 1`).
                        queryStart: current_query_start + (raw.length - raw.trimStart().length),
                    });
                }
            }
            current_query_start = current_offset;
            first_keyword = null;
            has_significant = false;
            first_significant_offset = -1;
            last_significant_end = -1;
        } else if (elem.significant) {
            if (!has_significant) {
                first_significant_offset = current_offset - elem.token.length;
            }
            last_significant_end = current_offset;
            has_significant = true;
            if (first_keyword === null && elem.token !== '(') {
                first_keyword = elem.token.toUpperCase();
            }
        }
    }

    /// Last query (no trailing semicolon)
    if (has_significant) {
        const raw = text.substring(current_query_start);
        const last = raw.trim();
        if (last && last !== ';') {
            queries.push({
                query: last,
                is_select: first_keyword !== null && PARALLELIZABLE_KEYWORDS.has(first_keyword),
                start: first_significant_offset,
                end: last_significant_end,
                queryStart: current_query_start + (raw.length - raw.trimStart().length),
            });
        }
    }

    return queries;
}

/// Return an array of { start, end } character offsets for each non-empty query.
/// Includes surrounding whitespace/semicolons so spans cover the full text without gaps.
/// Used by updateQueryParams to detect multi-query mode and to highlight query regions.
function getQueryBoundaries(tokens, text) {
    const boundaries = [];
    let current_query_start = 0;
    let current_offset = 0;
    let has_significant = false;

    let first_significant_offset = -1;
    let last_significant_end = -1;

    for (const elem of tokens) {
        current_offset += elem.token.length;
        if (elem.token == ';') {
            if (has_significant) {
                boundaries.push({ start: first_significant_offset, end: last_significant_end });
            }
            current_query_start = current_offset;
            has_significant = false;
            first_significant_offset = -1;
            last_significant_end = -1;
        } else if (elem.significant) {
            if (!has_significant) {
                first_significant_offset = current_offset - elem.token.length;
            }
            last_significant_end = current_offset;
            has_significant = true;
        }
    }

    /// Last query (no trailing semicolon).
    if (has_significant) {
        boundaries.push({ start: first_significant_offset, end: last_significant_end });
    }

    return boundaries;
}

/// Show/hide the "Run all" button and relabel "Run" depending on multi-query mode and selection.
let isMultiQuery = false;
function updateRunButtons(multi) {
    isMultiQuery = multi;
    const runBtn = document.getElementById('run');
    const runAllBtn = document.getElementById('run-all');
    const has_selection = query_area.selectionStart !== query_area.selectionEnd;
    const selects_all = has_selection
        && query_area.selectionStart === 0
        && query_area.selectionEnd >= query_area.value.length;

    if (!activeInFlight()) {
        if (!multi) {
            runBtn.innerText = 'Run';
        } else {
            runBtn.innerText = has_selection ? 'Run selected' : 'Run one';
        }
    }
    runAllBtn.style.display = (multi && !selects_all) ? 'inline-block' : 'none';
    document.getElementById('hint-run-all').style.display = multi ? '' : 'none';
}

/// Update the backdrop div behind the textarea: paint per-query active backgrounds
/// and per-token syntax-highlighting colors. The textarea above is in
/// `mix-blend-mode: difference`, so the colors here mix with the user's text.
const queryBackdrop = document.getElementById('query-backdrop');

function escapeHTML(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/// Numeric TokenType values, matching the order of the C++ enum in src/Parsers/Lexer.h.
/// Only the categories we actually classify are named; everything else is treated as
/// "default" (unstyled) and renders in the canonical text color via the diff blend.
const TT = {
    Whitespace: 0, Comment: 1, BareWord: 2, Number: 3, StringLiteral: 4, QuotedIdentifier: 5,
    OpeningRoundBracket: 6, ClosingRoundBracket: 7,
    OpeningSquareBracket: 8, ClosingSquareBracket: 9,
    OpeningCurlyBrace: 10, ClosingCurlyBrace: 11,
    Semicolon: 13, Asterisk: 16, HereDoc: 17, DollarSign: 18,
    Plus: 19, Minus: 20, Slash: 21, Percent: 22, Arrow: 23,
    QuestionMark: 24, Colon: 25, Caret: 26, DoubleColon: 27,
    Equals: 28, NotEquals: 29, Less: 30, Greater: 31,
    LessOrEquals: 32, GreaterOrEquals: 33, Spaceship: 34,
    PipeMark: 35, Concatenation: 36, At: 37, DoubleAt: 38,
};

/// SQL keywords recognized for highlighting. The lexer reports them as BareWord, so we
/// disambiguate identifiers from keywords here. Comparisons are case-insensitive.
const SQL_KEYWORDS = new Set([
    'ADD', 'AFTER', 'ALL', 'ALTER', 'AND', 'ANTI', 'ANY', 'ARRAY', 'AS', 'ASC', 'ASCENDING',
    'ASOF', 'AST', 'ASYNC', 'ATTACH', 'BACKUP', 'BEGIN', 'BETWEEN', 'BOTH', 'BY',
    'CACHE', 'CASCADE', 'CASE', 'CAST', 'CHANGE', 'CHANGED', 'CHECK', 'CLEAR', 'CLUSTER',
    'CODEC', 'COLLATE', 'COLUMN', 'COLUMNS', 'COMMENT', 'COMMIT', 'CONSTRAINT', 'CREATE',
    'CROSS', 'CUBE', 'CURRENT',
    'DATABASE', 'DATABASES', 'DAY', 'DEDUPLICATE', 'DEFAULT', 'DELETE', 'DESC', 'DESCENDING',
    'DESCRIBE', 'DETACH', 'DICTIONARIES', 'DICTIONARY', 'DISK', 'DISTINCT', 'DISTRIBUTED',
    'DROP', 'ELSE', 'END', 'ENGINE', 'ESTIMATE', 'EVENTS', 'EXCEPT', 'EXCHANGE', 'EXISTS',
    'EXPLAIN', 'EXPRESSION', 'EXTENDED', 'EXTRACT',
    'FALSE', 'FETCH', 'FETCHES', 'FILE', 'FILESYSTEM', 'FINAL', 'FIRST', 'FLUSH', 'FOLLOWING',
    'FOR', 'FOREIGN', 'FORMAT', 'FREEZE', 'FROM', 'FULL', 'FUNCTION',
    'GLOBAL', 'GRANT', 'GROUP', 'GROUPS', 'HAVING', 'HIERARCHICAL', 'HOUR',
    'ID', 'IDENTIFIED', 'IF', 'ILIKE', 'IN', 'INDEX', 'INF', 'INHERIT', 'INJECTIVE',
    'INNER', 'INSERT', 'INTERSECT', 'INTERVAL', 'INTO', 'INVISIBLE', 'IS', 'IS_OBJECT_ID',
    'JOIN', 'KEY', 'KEYED', 'KILL',
    'LAST', 'LATERAL', 'LAYOUT', 'LEADING', 'LEFT', 'LIFETIME', 'LIKE', 'LIMIT', 'LIMITS',
    'LIVE', 'LOCAL', 'LOGS',
    'MATERIALIZE', 'MATERIALIZED', 'MAX', 'MERGES', 'MICROSECOND', 'MILLISECOND', 'MIN',
    'MINUTE', 'MODIFY', 'MONTH', 'MOVE', 'MUTATION',
    'NAN_SQL', 'NEXT', 'NO', 'NONE', 'NOT', 'NULL', 'NULLS',
    'OFFSET', 'ON', 'ONLY', 'OPTIMIZE', 'OPTION', 'OR', 'ORDER', 'OUTER', 'OUTFILE', 'OVER',
    'PARTITION', 'PASTE', 'PERMANENTLY', 'PLAN', 'POPULATE', 'PRECEDING', 'PRECISION',
    'PREWHERE', 'PRIMARY', 'PROFILE', 'PROJECTION', 'QUARTER', 'QUERY', 'QUOTA',
    'RANDOMIZED', 'RANGE', 'RECURSIVE', 'REFRESH', 'REGEXP', 'RELOAD', 'REMOTE', 'RENAME',
    'REPLACE', 'REPLICA', 'REPLICAS', 'RESET', 'RESTORE', 'RESTRICT', 'RESTRICTIVE',
    'RETURNS', 'REVOKE', 'RIGHT', 'ROLE', 'ROLLBACK', 'ROLLUP', 'ROW', 'ROWS',
    'SAMPLE', 'SECOND', 'SELECT', 'SEMI', 'SENDS', 'SET', 'SETS', 'SETTINGS', 'SHARD',
    'SHOW', 'SIGNED', 'SOURCE', 'SQL_SECURITY', 'START', 'STEP', 'STORAGE', 'STRICT',
    'STRICTLY_ASCENDING', 'SUBPARTITION', 'SUBSTRING', 'SUSPEND', 'SYNC', 'SYNTAX', 'SYSTEM',
    'TABLE', 'TABLES', 'TEMPORARY', 'TEST', 'THEN', 'TIES', 'TIMESTAMP', 'TO', 'TOP',
    'TOTALS', 'TRACKING', 'TRAILING', 'TRANSACTION', 'TRIGGER', 'TRIM', 'TRUE', 'TRUNCATE',
    'TYPE',
    'UNBOUNDED', 'UNFREEZE', 'UNION', 'UNIQUE', 'UNSIGNED', 'UPDATE', 'USE', 'USING',
    'UUID', 'VALUES', 'VARYING', 'VIEW', 'VIRTUAL', 'VISIBLE',
    'WATCH', 'WEEK', 'WHEN', 'WHERE', 'WINDOW', 'WITH', 'WORK', 'WRITABLE',
    'XOR', 'YEAR', 'ZKPATH',

/// Bracket token types, grouped by kind. Used for rainbow parentheses (coloring by
/// nesting depth) and matched-bracket highlighting.
const OPENING_BRACKETS = new Set([TT.OpeningRoundBracket, TT.OpeningSquareBracket, TT.OpeningCurlyBrace]);
const CLOSING_BRACKETS = new Set([TT.ClosingRoundBracket, TT.ClosingSquareBracket, TT.ClosingCurlyBrace]);
/// The closing type that matches each opening type.
const BRACKET_PAIR = {
    [TT.OpeningRoundBracket]:  TT.ClosingRoundBracket,
    [TT.OpeningSquareBracket]: TT.ClosingSquareBracket,
    [TT.OpeningCurlyBrace]:    TT.ClosingCurlyBrace,
};
/// Number of distinct rainbow colors before the cycle repeats (see the --syntax-bracket-* vars).
const RAINBOW_BRACKET_COUNT = 7;

/// Compute, for every token, its rainbow-bracket depth (-1 for non-brackets and for
/// unmatched brackets) and the set of bracket tokens to embolden as the matched pair around
/// the cursor.
///
/// Depth is assigned with a type-aware stack, but only once a bracket has a real mate: the
/// matching opening and closing brackets both take the pair's nesting depth so they share a
/// color. A bracket without a counterpart — a lone `(`, a stray `)`, or a mismatched pair —
/// is left at depth -1 so it keeps the default color instead of a rainbow one, mirroring
/// `clickhouse-client`, which colors a bracket only after it finds its match.
///
/// Once the nesting is broken (a closer that does not match the innermost opener), the
/// outstanding openers are discarded so a later closer cannot reach over the break and
/// retroactively match an opener that was never properly closed — e.g. `SELECT ([)]` colors
/// nothing. A `;` is not treated as a statement boundary: like `clickhouse-client` (whose
/// rainbow loop skips `;` without clearing its bracket stack), brackets still match across it,
/// so `SELECT (; SELECT )` pairs the `(` with the later `)`.
///
/// The matched pair is the bracket adjacent to the cursor (preferring the one immediately
/// before the caret, as most editors do) together with its counterpart.
function computeBracketInfo(tokens, cursor, focused) {
    const depth = new Array(tokens.length).fill(-1);
    const matchOf = new Array(tokens.length).fill(-1);
    const starts = new Array(tokens.length).fill(0);

    const stack = [];
    let offset = 0;
    for (let i = 0; i < tokens.length; ++i) {
        starts[i] = offset;
        offset += tokens[i].token.length;
        const type = tokens[i].type;
        if (OPENING_BRACKETS.has(type)) {
            /// Depth stays -1 until a matching closing bracket is found below.
            stack.push(i);
        } else if (CLOSING_BRACKETS.has(type)) {
            const top = stack.length ? stack[stack.length - 1] : -1;
            if (top >= 0 && BRACKET_PAIR[tokens[top].type] === type) {
                stack.pop();
                matchOf[i] = top;
                matchOf[top] = i;
                /// The pair's nesting depth is the stack size after popping; the opening and
                /// closing brackets share it so they render with the same rainbow color.
                depth[top] = depth[i] = stack.length;
            } else if (top >= 0) {
                /// A closing bracket that does not match the innermost opener breaks the
                /// nesting (e.g. the `)` in `([)]`). Discard every outstanding opener so a
                /// later closer cannot reach over the mismatch and retroactively "match" an
                /// opener that was never properly closed. The mismatched closer itself keeps
                /// depth -1.
                stack.length = 0;
            }
            /// A closing bracket with no match keeps depth -1 (rendered with the default color).
        }
    }

    const bold = new Set();
    if (focused) {
        /// Prefer the bracket ending at the cursor (the char just before the caret), then
        /// fall back to the bracket starting at the cursor (the char just after).
        let found = -1;
        for (let i = 0; i < tokens.length; ++i) {
            const type = tokens[i].type;
            if (!OPENING_BRACKETS.has(type) && !CLOSING_BRACKETS.has(type)) continue;
            if (starts[i] + tokens[i].token.length === cursor) { found = i; break; }
        }
        if (found < 0) {
            for (let i = 0; i < tokens.length; ++i) {
                const type = tokens[i].type;
                if (!OPENING_BRACKETS.has(type) && !CLOSING_BRACKETS.has(type)) continue;
                if (starts[i] === cursor) { found = i; break; }
            }
        }
        if (found >= 0 && matchOf[found] >= 0) {
            bold.add(found);
            bold.add(matchOf[found]);
        }
    }

    return { depth, bold };
}

/// Map a single token to a CSS class. For BareWords we also peek at the next
/// non-whitespace, non-comment token to distinguish a function call (`foo(`) from a plain
/// identifier — the lexer alone cannot tell them apart. Skipping comments as well as
/// whitespace matches `highlightWithLexer` in `src/Client/ClientBaseHelpers.cpp`, so
/// `sum/*c*/(x)` is a function name here too.
function tokenClass(tokens, i) {
    const elem = tokens[i];
    switch (elem.type) {
        case TT.Comment: return 'q-com';
        case TT.Number: return 'q-num';
        case TT.StringLiteral:
        case TT.HereDoc: return 'q-str';
        case TT.QuotedIdentifier: return 'q-qid';
        case TT.BareWord: {
            if (SQL_KEYWORDS.has(elem.token.toUpperCase())) return 'q-kw';
            for (let j = i + 1; j < tokens.length; ++j) {
                if (tokens[j].type === TT.Whitespace || tokens[j].type === TT.Comment) continue;
                return tokens[j].type === TT.OpeningRoundBracket ? 'q-fn' : 'q-id';
            }
            return 'q-id';
        }
        case TT.Asterisk: case TT.Plus: case TT.Minus: case TT.Slash: case TT.Percent:
        case TT.Arrow: case TT.QuestionMark: case TT.Colon: case TT.DoubleColon: case TT.Caret:
        case TT.Equals: case TT.NotEquals:
        case TT.Less: case TT.Greater: case TT.LessOrEquals: case TT.GreaterOrEquals:
        case TT.Spaceship: case TT.PipeMark: case TT.Concatenation:
        case TT.At: case TT.DoubleAt: case TT.DollarSign:
            return 'q-op';
        default:
            return '';
    }
}

/// A token is a matchable identifier if it renders as a plain identifier (`q-id`) or a
/// quoted identifier (`q-qid`) — i.e. not a keyword, function name, number, etc.
function isMatchableIdentifier(tokens, i) {
    const cls = tokenClass(tokens, i);
    return cls === 'q-id' || cls === 'q-qid';
}

/// If the cursor is inside an identifier, return the set of token indices of every identifier
/// with the same text, so they can be underlined together (as `clickhouse-client` does).
function computeMatchingIdentifiers(tokens, cursor, focused) {
    const result = new Set();
    if (!focused) return result;

    let offset = 0;
    let target = -1;
    for (let i = 0; i < tokens.length; ++i) {
        const start = offset;
        offset += tokens[i].token.length;
        /// The caret must be strictly inside the token (`start <= cursor < end`), matching the
        /// CLI: sitting right after an identifier does not trigger the highlight.
        if (start <= cursor && cursor < offset && isMatchableIdentifier(tokens, i)) {
            target = i;
            break;
        }
    }
    if (target < 0) return result;

    const text = tokens[target].token;
    for (let i = 0; i < tokens.length; ++i) {
        if (tokens[i].token === text && isMatchableIdentifier(tokens, i)) result.add(i);
    }
    return result;
}

/// For a plain decimal number token, return the set of character indices to underline as
/// digit-group separators. Mirrors `clickhouse-client`: only the integer part of a regular
/// base-10 number (no exponent, hex/bin prefix, or `_` separators) is considered, and only
/// when it has at least 5 digits; then one digit is underlined at each group-of-three boundary
/// counting from the right (before the decimal point).
function digitGroupUnderlines(token) {
    const result = new Set();
    let is_regular = true;
    let finished = false; /// Passed the decimal point.
    let first = -1;
    let last = -1;

    for (let i = 0; i < token.length; ++i) {
        const c = token[i];
        if (c === '-') {
            /// Skip (the lexer emits `-` as a separate token, but be safe).
        } else if (c >= '0' && c <= '9') {
            if (!finished) {
                if (first < 0) first = i;
                last = i;
            }
        } else if (c === '.') {
            finished = true;
        } else {
            /// Exponent, hex/bin, or `_` separators: not a plain number, do not highlight.
            is_regular = false;
            break;
        }
    }

    if (is_regular && first >= 0 && last >= 0) {
        const length = 1 + last - first;
        if (length >= 5) {
            for (let off = length - 4; off >= 0; off -= 3) result.add(first + off);
        }
    }
    return result;
}

/// Render a number token's inner HTML, underlining the digit-group separators.
function renderNumberContent(token) {
    const underlines = digitGroupUnderlines(token);
    if (underlines.size === 0) return escapeHTML(token);

    let html = '';
    for (let i = 0; i < token.length; ++i) {
        const ch = escapeHTML(token[i]);
        html += underlines.has(i) ? '<span class="q-underline">' + ch + '</span>' : ch;
    }
    return html;
}

/// Cached state for cursor-tracking re-renders that do not re-tokenize.
let currentTokens = [];
let currentBoundaries = [];
let currentBackdropText = '';

/// Absolute character offset (into the textarea) of the position the server reported a syntax
/// error at, or -1 when there is no error to highlight. The token containing this offset is
/// painted with a red background in the backdrop until the user returns focus to the editor.
let queryErrorPos = -1;

/// True when the error was reported at the end of the query — the server writes a "(end of query)"
/// suffix for both an unexpected end of stream and a `;` separator (see `writeCommonErrorMessage`
/// in `src/Parsers/parseQuery.cpp`). Such an error points at the statement *boundary*, not at a
/// token, so `renderQueryBackdrop` draws a thin marker at `queryErrorPos` instead of filling the
/// `;`/whitespace token that happens to start there.
let queryErrorAtEnd = false;

/// Monotonic counter bumped whenever the user returns to the editor (refocus, typing, caret
/// movement, or a click inside it — including the synthetic events a tab switch dispatches while
/// restoring the editor). `beginFlight` snapshots it into the launching tab's
/// `runEditorInteraction` at run start; if it advances before the error response arrives,
/// `postImpl` suppresses the (now stale) syntax-error highlight. Without this, a late error
/// response could repaint the marker after the user has already resumed editing, because the
/// clear handlers only remove an already-visible marker and would not fire again on their own.
/// The run-launch snapshot and the error-marker owner offset (`queryErrorOwnerStart`) are
/// PER-TAB fields (see `tabRuntimeDefaults`): runs execute concurrently across tabs, so as
/// globals whichever run began last would overwrite the arbitration state of the others.
let editorInteractionGen = 0;

/// True only while `getQueryUnderCursor` performs its internal `query_area.focus()` to run a query.
/// That programmatic refocus happens *after* `beginFlight` has snapshotted the generation, so if it
/// were counted as the user returning to the editor it would advance `editorInteractionGen` past the
/// snapshot and suppress the syntax-error highlight for runs started from the "Run" / "Run all"
/// buttons (where the textarea was not already focused, so `focus()` really does fire a `focus`
/// event). Use `focusEditorForRun` to set this around that focus; `onReturnToEditor` then ignores it.
let suppressReturnToEditor = false;

/// Clear the syntax-error highlight and repaint. Called when the user returns to the editor
/// (focus, typing, cursor movement) or when a new query run starts.
function clearQueryError() {
    if (queryErrorPos < 0) return;
    queryErrorPos = -1;
    queryErrorAtEnd = false;
    renderQueryBackdrop();
}

/// Record that the user has interacted with the editor and clear any visible highlight. Bound to
/// the same focus/keydown/pointerdown/input events; the generation bump is what lets a late error
/// response know the user has already returned to editing (see `editorInteractionGen`).
function onReturnToEditor() {
    /// A programmatic refocus performed to start a run is not a user return to the editor; ignore it
    /// so it does not suppress the very highlight the run is about to produce (see `suppressReturnToEditor`).
    if (suppressReturnToEditor) return;
    ++editorInteractionGen;
    clearQueryError();
}

/// Focus the editor the way `getQueryUnderCursor` does when it selects the query to run, without
/// letting the resulting `focus` event count as the user returning to the editor (see
/// `suppressReturnToEditor`). Other `focus` listeners (e.g. the backdrop repaint) still run.
function focusEditorForRun() {
    suppressReturnToEditor = true;
    try {
        query_area.focus();
    } finally {
        suppressReturnToEditor = false;
    }
}

/// Convert a 0-based UTF-8 byte offset into a JS (UTF-16) string index. ClickHouse reports the
/// syntax-error position as a byte offset; for ASCII queries it coincides with the character
/// index, but non-ASCII text needs this conversion so the highlight lands on the right token.
function byteOffsetToCharIndex(str, byteOffset) {
    if (byteOffset <= 0) return 0;
    let bytes = 0;
    let i = 0;
    while (i < str.length) {
        const cp = str.codePointAt(i);
        const units = cp > 0xFFFF ? 2 : 1;
        let b;
        if (cp <= 0x7F) b = 1;
        else if (cp <= 0x7FF) b = 2;
        else if (cp <= 0xFFFF) b = 3;
        else b = 4;
        bytes += b;
        i += units;
        if (bytes >= byteOffset) return i;
    }
    return str.length;
}

/// Parse the server's error message for a "failed at position N" hint (see
/// `writeCommonErrorMessage` in `src/Parsers/parseQuery.cpp`) and, if found, highlight that
/// position in the editor. `query` is the exact text that was sent to the server; the reported
/// position is a 1-based byte offset into it, which we map back to the full textarea contents.
/// `queryStart` is the absolute character offset in the textarea where `query` began when the run
/// started (the caller captured it), used to disambiguate identical statements. `tab` is the tab
/// the run was launched in (the caller has already verified it is still the active one); it holds
/// the per-run marker-ownership state.
function highlightQueryError(errorText, query, queryStart, tab) {
    if (typeof errorText !== 'string' || typeof query !== 'string') return;

    const match = errorText.match(/failed at position (\d+)/);
    if (!match) return;

    /// 1-based byte offset -> 0-based.
    const byteOffset = parseInt(match[1], 10) - 1;
    if (!(byteOffset >= 0)) return;

    /// Locate the sent query within the textarea. Prefer the exact start offset the caller
    /// captured when the run began, so duplicate statements (e.g. `SELECT 1; SELECT 1`) map to the
    /// one that actually failed. If the editor changed while the request was in flight and the
    /// query is no longer at that offset, fall back to its first occurrence; if it is gone
    /// entirely, do not paint a stale position at all.
    const text = query_area.value;
    let base;
    if (typeof queryStart === 'number' && queryStart >= 0
        && text.substring(queryStart, queryStart + query.length) === query) {
        base = queryStart;
    } else {
        base = text.indexOf(query);
    }
    if (base < 0) return;

    /// Run-level arbitration for the single editor marker: several statements of one run can fail
    /// concurrently (`postMulti` executes parallelizable groups with `Promise.all`), and their
    /// error responses arrive in an arbitrary order. The leftmost failing statement wins
    /// deterministically: a response may take the marker only if no statement has claimed it yet
    /// in this run, or if its statement starts earlier in the editor than the current owner's.
    /// The owner offset lives on the launching tab (reset by `beginFlight`), so the arbitration
    /// is scoped to that tab's run and a concurrent run in another tab cannot interfere with it.
    if (tab.queryErrorOwnerStart >= 0 && base >= tab.queryErrorOwnerStart) return;
    tab.queryErrorOwnerStart = base;

    const charIndex = byteOffsetToCharIndex(query, byteOffset);
    const absolute = base + charIndex;

    queryErrorPos = Math.min(absolute, text.length);
    /// "(end of query)" means the parser reached the end of the statement or its `;` separator
    /// (see `writeCommonErrorMessage`). The reported position then falls on the `;` (or on the
    /// end of a trimmed statement); paint the statement boundary rather than the separator token.
    queryErrorAtEnd = / \(end of query\)/.test(errorText);
    renderQueryBackdrop();
}
/// Guard so that the backdrop re-renders triggered by the completion code (to update the
/// reserved spacer) do not recurse back into `updateCompletions`.
let inRenderBackdrop = false;

function updateQueryBackdrop(text, tokens, boundaries) {
    currentTokens = tokens || [];
    currentBoundaries = boundaries || [];
    currentBackdropText = text || '';
    renderQueryBackdrop();
}

function renderQueryBackdrop() {
    const text = currentBackdropText;
    const tokens = currentTokens;
    const boundaries = currentBoundaries;

    /// Update button labels to reflect current selection state.
    updateRunButtons(boundaries.length > 1);

    /// No content, or the WASM lexer is not available — fall back to the unstyled textarea.
    if (!text || tokens.length === 0) {
        queryBackdrop.style.display = 'none';
        query_area.classList.remove('has-backdrop');
        if (!inRenderBackdrop) updateCompletions();
        return;
    }

    /// When the completion list is open, reserve blank space at the cursor for the selected
    /// candidate's suffix, so the text to the right shifts as if it had been typed.
    const spacerText = completionCandidates.length
        ? completionCandidates[completionSelected].substring(completionPrefix.length)
        : null;
    const spacerOffset = completionPrefixStart + completionPrefix.length;

    const cursor = query_area.selectionStart;
    const focused = document.activeElement === query_area;

    /// Find which query contains the cursor (only when textarea is focused and we are
    /// actually in multi-query mode).
    let activeStart = -1;
    let activeEnd = -1;
    if (focused && boundaries.length > 1) {
        for (let i = 0; i < boundaries.length; ++i) {
            if (cursor >= boundaries[i].start && cursor <= boundaries[i].end) {
                activeStart = boundaries[i].start;
                activeEnd = boundaries[i].end;
                break;
            }
        }
    }

    /// Rainbow-parentheses depths and the matched-bracket pair around the cursor.
    const { depth: bracketDepth, bold: bracketBold } = computeBracketInfo(tokens, cursor, focused);
    /// Every occurrence of the identifier under the cursor (underlined together).
    const matchingIdentifiers = computeMatchingIdentifiers(tokens, cursor, focused);

    let html = '';
    let offset = 0;
    let activeOpen = false;
    /// Whether the "(end of query)" boundary marker has already been emitted (see below).
    let errMarkerEmitted = false;

    for (let i = 0; i < tokens.length; ++i) {
        const elem = tokens[i];
        const tokStart = offset;
        const tokEnd = offset + elem.token.length;
        offset = tokEnd;

        /// An "(end of query)" error points at a statement boundary, not a token. Draw a thin
        /// marker at that boundary — right before the token that starts there — rather than
        /// filling the following `;`/whitespace token. A boundary at the end of the text has no
        /// following token and is emitted after the loop instead.
        if (queryErrorAtEnd && !errMarkerEmitted && queryErrorPos <= tokStart) {
            html += '<span class="q-err-pos-end"></span>';
            errMarkerEmitted = true;
        }

        const inActive = activeStart >= 0 && tokEnd > activeStart && tokStart < activeEnd;
        if (inActive && !activeOpen) {
            html += '<span class="q-active">';
            activeOpen = true;
        } else if (!inActive && activeOpen) {
            html += '</span>';
            activeOpen = false;
        }

        /// Brackets are colored by nesting depth (rainbow) rather than by the generic
        /// token class; the matched pair around the cursor is additionally emboldened.
        let cls;
        if (bracketDepth[i] >= 0) {
            cls = 'q-br' + (bracketDepth[i] % RAINBOW_BRACKET_COUNT);
        } else {
            cls = tokenClass(tokens, i);
        }
        if (bracketBold.has(i)) {
            cls = cls ? cls + ' q-br-match' : 'q-br-match';
        }
        /// Every occurrence of the identifier under the cursor is underlined.
        if (matchingIdentifiers.has(i)) {
            cls = cls ? cls + ' q-underline' : 'q-underline';
        }
        /// The token at the reported syntax-error position gets a red background — except for an
        /// "(end of query)" error, which marks the statement boundary above rather than a token.
        const isErrPos = queryErrorPos >= 0 && !queryErrorAtEnd && queryErrorPos >= tokStart && queryErrorPos < tokEnd;
        if (isErrPos) {
            cls = cls ? cls + ' q-err-pos' : 'q-err-pos';
        }

        /// Numbers get per-digit-group underlines; everything else is plain escaped text.
        const content = elem.type === TT.Number ? renderNumberContent(elem.token) : escapeHTML(elem.token);
        if (cls) {
            html += '<span class="' + cls + '">' + content + '</span>';
        } else {
            html += content;
        }

        /// The cursor sits at the end of the prefix identifier (a token boundary); insert the
        /// reserved spacer right there.
        if (spacerText !== null && offset === spacerOffset) {
            html += '<span class="completion-spacer">' + escapeHTML(spacerText) + '</span>';
        }
    }
    if (activeOpen) {
        html += '</span>';
    }

    /// Any tail not covered by tokens (lexer hit an error or reached the size limit)
    /// is shown with the error style.
    if (offset < text.length) {
        html += '<span class="q-err">' + escapeHTML(text.substring(offset)) + '</span>';
    }

    /// A statement-boundary ("(end of query)") error whose boundary falls at the very end of the
    /// text has no following token, so emit its marker here. `errMarkerEmitted` guards against a
    /// double marker when the boundary already matched a token inside the loop.
    if (queryErrorAtEnd) {
        if (!errMarkerEmitted) {
            html += '<span class="q-err-pos-end"></span>';
            errMarkerEmitted = true;
        }
    } else if (queryErrorPos >= 0 && queryErrorPos >= text.length) {
        /// A non-boundary error past the last token (e.g. the lexer stopped early on an
        /// incomplete tail): fall back to the trailing filled marker.
        html += '<span class="q-err-pos"> </span>';
    }

    /// Trailing newline fix: browsers collapse a trailing \n in a div.
    if (html.endsWith('\n')) html += ' ';

    queryBackdrop.innerHTML = html;
    queryBackdrop.style.display = 'block';
    query_area.classList.add('has-backdrop');

    /// Match the scrollbar: reserve extra right padding so text wraps identically.
    /// clientWidth excludes borders and scrollbar; offsetWidth includes borders.
    /// The border is 1px on each side, so scrollbar = offsetWidth - clientWidth - 2.
    const scrollbarWidth = query_area.offsetWidth - query_area.clientWidth - 2;
    queryBackdrop.style.paddingRight = scrollbarWidth > 0 ? 'calc(0.25rem + ' + scrollbarWidth + 'px)' : '';

    queryBackdrop.scrollTop = query_area.scrollTop;
    queryBackdrop.scrollLeft = query_area.scrollLeft;

    /// Keep autocompletion in sync with the freshly rendered text/cursor (unless this render
    /// was itself triggered by the completion code, which would recurse).
    if (!inRenderBackdrop) updateCompletions();
}

/// Re-render backdrop when cursor moves or selection changes.
query_area.addEventListener('click', renderQueryBackdrop);
query_area.addEventListener('keyup', renderQueryBackdrop);
query_area.addEventListener('select', renderQueryBackdrop);
query_area.addEventListener('focus', renderQueryBackdrop);
query_area.addEventListener('blur', renderQueryBackdrop);
/// Hide autocompletion when the textarea loses focus.
query_area.addEventListener('blur', closeCompletions);

/// Clear the syntax-error highlight as soon as the user returns to the editor: refocusing it,
/// typing, moving the cursor with the keyboard, or clicking inside it. `onReturnToEditor` also
/// bumps the interaction generation so a late error response will not repaint a stale highlight.
query_area.addEventListener('focus', onReturnToEditor);
query_area.addEventListener('keydown', onReturnToEditor);
query_area.addEventListener('pointerdown', onReturnToEditor);
query_area.addEventListener('input', onReturnToEditor);

/// Keep backdrop scroll in sync with textarea.
query_area.addEventListener('scroll', () => {
    queryBackdrop.scrollTop = query_area.scrollTop;
    queryBackdrop.scrollLeft = query_area.scrollLeft;
    /// Reposition the completion overlay to follow the scrolled caret.
    renderCompletionOverlay();
});

/// ----------------------------------------------------------------------------
/// Autocompletion.
///
/// Completions are loaded lazily from `system.completions` the first time the user
/// focuses the textarea (mirroring how `clickhouse-client` loads its suggestions).
/// The feature only activates when the WASM lexer is available, because we reuse the
/// token stream to find the identifier under the cursor and the backdrop/mirror
/// machinery to position the ghost text.
/// ----------------------------------------------------------------------------

/// The visible window around the selected candidate: up to this many above and below (so up to
/// 1 + 4 + 4 entries are shown at once). The rest are reachable by navigating; a "…" marks more.
const MAX_COMPLETIONS_ABOVE = 4;
const MAX_COMPLETIONS_BELOW = 4;
const MAX_COMPLETION_CANDIDATES = 100; /// Upper bound on the full candidate list we keep.
const MIN_COMPLETION_PREFIX = 1;

const completionMirror = document.getElementById('completion-mirror');
const completionOverlay = document.getElementById('completion-overlay');

/// Sorted (by lowercased word) array of { w, lw } for prefix lookup.
let completionWords = [];
let completionsLoadStarted = false;
/// Bumped whenever the connection settings change, to invalidate anything loaded for the previous
/// connection. Both `system.completions` (filtered by the connected user's privileges) and the set
/// of expanded databases are connection-scoped, so an in-flight load must not apply its result
/// after the connection it was started for is gone.
let connectionGeneration = 0;
/// How many times each completion was accepted in this session — accepted completions
/// bubble to the top of the candidate list on subsequent uses.
let completionUsage = new Map();

/// Currently displayed candidates and which one is selected.
let completionCandidates = [];
let completionSelected = 0;
let completionPrefix = '';
let completionPrefixStart = -1;
/// When the user dismisses with Esc, suppress re-opening for the exact same caret state.
let completionSuppressedKey = null;
/// Set when the user types a word character; gates *opening* the completion list so that
/// clicks, focus, and cursor navigation do not pop it up on their own.
let completionOpenRequested = false;
/// True while `acceptCompletion` is inserting text, so the resulting `input` event is not
/// mistaken for the user typing a new word (which would reopen the list on the accepted word).
let completionAccepting = false;

function wasmAvailable() {
    return typeof WebAssembly === 'object' && typeof WebAssembly.instantiate === 'function';
}

/// Build the request URL the same way `postImpl` does, but for the completion query.
function buildCompletionUrl() {
    const user = user_elem.value;
    const password = password_elem.value;
    const server_address = url_elem.value;
    let url = server_address + (server_address.indexOf('?') >= 0 ? '&' : '?') + 'add_http_cors_header=1';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&default_format=TSVRaw';
    return url;
}

/// The completion query mirrors `getLoadSuggestionQueryUsingSystemCompletionsTable` in
/// `src/Client/Suggest.cpp`: static contexts are loaded in full, while the catalog-sized
/// contexts (database/table/column/dictionary) are capped per context so that focusing the
/// editor does not enumerate and transfer the whole catalog on large installations. Then it
/// extracts identifier-like words from the resulting completion entries.
const COMPLETION_SUGGESTION_LIMIT = 10000;
const COMPLETION_QUERY =
    "SELECT DISTINCT arrayJoin(extractAll(word, '[\\\\w]{2,}')) AS res FROM (" +
        "SELECT word FROM system.completions WHERE context IN " +
        "('function', 'table engine', 'format', 'table function', 'data type', 'merge tree setting', " +
        "'setting', 'aggregate function combinator pair', 'keyword', 'cluster', 'macro', 'policy') " +
        "UNION ALL SELECT word FROM (" +
            "SELECT word, ROW_NUMBER() OVER (PARTITION BY context ORDER BY word) AS rn FROM " +
            "(SELECT DISTINCT word, context FROM system.completions WHERE context IN " +
            "('database', 'table', 'column', 'dictionary'))" +
        ") WHERE rn <= " + COMPLETION_SUGGESTION_LIMIT +
    ") WHERE notEmpty(res)";

async function loadCompletions() {
    if (completionsLoadStarted || !wasmAvailable()) {
        return;
    }
    completionsLoadStarted = true;
    const generation = connectionGeneration;

    try {
        const response = await fetch(buildCompletionUrl(), {
            method: "POST",
            body: COMPLETION_QUERY,
            headers: { 'Authorization': 'never' },
        });
        /// The connection settings changed while loading — discard this stale result.
        if (generation !== connectionGeneration) {
            return;
        }
        if (!response.ok) {
            /// Older servers without `system.completions`, or no connection — the feature
            /// simply stays inactive. This is an optional enhancement, not a fallback that
            /// hides an error from a primary operation. Allow a retry on a later focus (e.g.
            /// once the user has filled in the connection details).
            completionsLoadStarted = false;
            return;
        }
        const text = await response.text();
        if (generation !== connectionGeneration) {
            return;
        }
        const seen = new Set();
        const words = [];
        for (const line of text.split('\n')) {
            const w = line.trim();
            if (w && !seen.has(w)) {
                seen.add(w);
                words.push({ w, lw: w.toLowerCase() });
            }
        }
        words.sort((a, b) => (a.lw < b.lw ? -1 : a.lw > b.lw ? 1 : 0));
        completionWords = words;

        /// The user may have already typed something — show completions right away.
        updateCompletions();
    } catch (e) {
        /// Network error or aborted — allow a retry on a later focus.
        if (generation === connectionGeneration) {
            completionsLoadStarted = false;
        }
        console.error('Failed to load completions:', e);
    }
}

/// Invalidate the connection-scoped state when the connection settings change.
/// Cached completions are reloaded (with the new privileges) on the next focus and any
/// in-flight load is discarded. The remembered set of expanded databases is also cleared:
/// it describes what the user expanded on the previous connection, so keeping it would
/// auto-expand same-named databases (and fire `system.tables` queries) on a different
/// server or user when the panel is reopened.
function resetConnectionScopedState() {
    connectionGeneration++;
    completionsLoadStarted = false;
    completionWords = [];
    closeCompletions();
    opened_databases.clear();
    /// The selected database is a namespace on the SEMANTIC connection identity
    /// (`sameServerAddress` + `effectiveConnectionUser`) — the same identity the `window.onpopstate`
    /// restore gate uses. This handler fires on every `input` in a connection field, including edits
    /// that do NOT change that identity: a cosmetic URL normalization (a root-path trailing slash or
    /// a default port — the query string stays significant) or a password-only change (the password is
    /// authentication, not part of the resource identity). Dropping the selection then would retarget
    /// the next unqualified `Run` to the server default while history navigation still treats the
    /// entry as valid — the two would disagree. So clear it only when the identity actually changed
    /// relative to where it was chosen (`selected_database_connection`); keep it otherwise. An unset
    /// stamp (no selection) fails the check the safe way, matching the previous unconditional clear.
    const identity_changed = selected_database_connection === null
        || !sameServerAddress(selected_database_connection.server, url_elem.value)
        || effectiveConnectionUser(selected_database_connection.server, selected_database_connection.user)
            !== effectiveConnectionUser(url_elem.value, user_elem.value);
    const cleared_selection = selected_database !== null && identity_changed;
    if (cleared_selection) {
        selected_database = null;
        selected_database_connection = null;
    }
    server_current_database = null;
    /// A panel that is already open keeps showing the previous connection's databases, and every
    /// row handler closes over the url/user/password captured when the list was loaded, so
    /// clicking a row (or its refresh button) would keep querying the previous server. Close the
    /// panel so it is rebuilt against the new connection on the next open; this also detaches the
    /// rows, dropping any in-flight table load through its `isConnected` check.
    if (databases_toggle.dataset['opened']) closeDatabases();
    /// Restamp the current history entry whenever the live connection moved, so its URL stops
    /// describing the previous target. Two ways it can go stale:
    ///   - A selection was just cleared above: the entry/URL may still carry the old `database=` (and
    ///     its `run=1` marker), so a reload or copied link would resurrect the selection we just
    ///     invalidated (and possibly auto-run it against the new connection).
    ///   - No selection was set, but the entry is a run entry (`run=1`) stamped for the previous
    ///     server (`connectionServer`), which is the case even for a server-default run that carries
    ///     no `database=` at all. Editing the connection from server A to server B then leaves the
    ///     live page on B while the current entry still says `run=1`/`url=A`; reloading or sharing it
    ///     would auto-execute the old query against A — the same stale-target hazard the `database=`
    ///     restamp addresses. The database-clear branch never fires here (there is nothing to clear),
    ///     so detect the connection divergence directly from the entry's stamp.
    /// Compared with the SAME (`sameServerAddress`, `effectiveConnectionUser`) identity as the restore
    /// gate (`window.onpopstate`) and `writeHistoryEntry`'s `live_diverged`, so a cosmetic URL edit (a
    /// root-path trailing slash, a default port) or a password-only change keeps the identity and does
    /// NOT churn the entry. An entry without a `connectionServer` stamp (one written by a play.html
    /// predating the stamp) gives no producing connection to compare against here; it is covered by
    /// the bootstrap term below instead. When it did diverge, restamp from the active tab exactly as
    /// `commitSelectedDatabase` does — `writeHistoryEntry` then drops `run=1` and rewrites `url=`/`user=`
    /// for the live target (or, for a still-matching run entry, keeps the producing snapshot verbatim).
    const current_entry = history.state;
    const connection_diverged = current_entry
        && current_entry.connectionServer !== undefined
        && (!sameServerAddress(current_entry.connectionServer, url_elem.value)
            || effectiveConnectionUser(current_entry.connectionServer, current_entry.connectionUser)
                !== effectiveConnectionUser(url_elem.value, user_elem.value));
    /// Before the first history write there is no entry to compare against, yet a deferred startup
    /// auto-run may already be armed (`defer_run_for_reconcile`) against the connection the page
    /// loaded with (`initial_connection`). A trusted connection edit in that window must cancel the
    /// run just as it would once an entry existed — otherwise a fresh server-default `?run=1#...`
    /// link (no `database=`, so `cleared_selection` stays false; no `history.state`, so
    /// `connection_diverged` stays false) would auto-execute the shared query against the just-edited
    /// server/user the link never named. An entry that EXISTS but carries no `connectionServer`
    /// stamp — `history.state` survives a reload, so a `?run=1#...` reload from an entry written by
    /// a play.html predating the stamp lands here — is the same case: there is no authoritative
    /// connection stamp yet, only the connection the page loaded with, so fall back to
    /// `initial_connection` for it too. Without that, neither term fires (`connection_diverged` by
    /// its `connectionServer !== undefined` guard, this one by `!current_entry`) and the deferred
    /// run would still execute against the edited connection. Compared with the SAME
    /// (`sameServerAddress`, `effectiveConnectionUser`) identity, so a cosmetic edit (a root-path
    /// trailing slash, a default port) or a password-only change neither churns the entry nor
    /// suppresses the legitimate auto-run.
    const bootstrap_connection_diverged = (!current_entry || current_entry.connectionServer === undefined)
        && (!sameServerAddress(initial_connection.server, url_elem.value)
            || effectiveConnectionUser(initial_connection.server, initial_connection.user)
                !== effectiveConnectionUser(url_elem.value, user_elem.value));
    /// A Back/Forward restore replays these connection changes synthetically to reproduce the popped
    /// entry; it must NOT restamp history here. `history.state` is already that popped entry and
    /// `activeTabId` still points at the tab being left, so a restamp would overwrite the time-travel
    /// target with the leaving tab's state (`restoring_connection_from_history`). `onpopstate` does the
    /// authoritative entry/URL restore itself.
    if ((cleared_selection || connection_diverged || bootstrap_connection_diverged)
        && !restoring_connection_from_history) {
        captureActiveTab();
        /// The restamp seeds/refreshes the current entry through `refreshCurrentHistoryEntry` →
        /// `writeHistoryEntry`, which drops `run=1` while the bootstrap tab has no result yet and
        /// thereby cancels a still-deferred startup auto-run (see `deferred_run_cancelled` and
        /// `writeHistoryEntry`) — left uncancelled, it would still execute the shared query against
        /// the just-edited server/user rather than the one the link specified.
        refreshCurrentHistoryEntry(getActiveTab());
    }
}

[url_elem, user_elem, password_elem].forEach(el => el.addEventListener('input', (e) => {
    /// A genuine connection edit during the startup window must gate the deferred URL restore and
    /// `run=1` auto-run the same way query/parameter edits and tab switches do: `postAll` snapshots
    /// these same inputs at launch, so a deferred auto-run started after the user changed the
    /// server/identity would execute against the edited target without an explicit Run. Trusted edits
    /// only — reconciliation's own programmatic changes dispatch `isTrusted === false` events, which
    /// `markBootstrapDirty` ignores.
    markBootstrapDirty(e);
    resetConnectionScopedState();
}));

/// Lower-bound binary search for the first word whose lowercased form is >= `key`.
function completionLowerBound(key) {
    let lo = 0;
    let hi = completionWords.length;
    while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (completionWords[mid].lw < key) lo = mid + 1;
        else hi = mid;
    }
    return lo;
}

/// Find the bare-word identifier that ends exactly at the cursor (so the cursor is at the
/// end of the identifier), using the cached lexer tokens. Returns { prefix, start } or null.
function getIdentifierBeforeCursor() {
    /// Only valid when the cached tokens describe the current textarea contents.
    if (currentBackdropText !== query_area.value) {
        return null;
    }
    const cursor = query_area.selectionStart;
    let offset = 0;
    for (let i = 0; i < currentTokens.length; ++i) {
        const elem = currentTokens[i];
        const start = offset;
        const end = offset + elem.token.length;
        offset = end;
        if (elem.type === TT.BareWord && end === cursor && start < cursor) {
            return { prefix: elem.token, start };
        }
    }
    return null;
}

/// Collect the identifier-like words already present in the query (aliases, column/table names,
/// etc.), excluding the identifier currently being typed at `excludeStart`. These are both a
/// priority signal and a source of candidates, so a word introduced in the query can be
/// completed even if it is not in `system.completions`. Returns unique words in original case.
function queryIdentifierWords(excludeStart) {
    const words = [];
    const seen = new Set();
    let offset = 0;
    for (const elem of currentTokens) {
        const start = offset;
        offset += elem.token.length;
        if (elem.type !== TT.BareWord) continue;
        if (start === excludeStart) continue; /// The identifier being typed is not a suggestion.
        if (elem.token.length < 2) continue;  /// Match the `{2,}` convention used for completions.
        if (seen.has(elem.token)) continue;
        seen.add(elem.token);
        words.push(elem.token);
    }
    return words;
}

/// Compute the candidate list for the given prefix (up to MAX_COMPLETION_CANDIDATES), applying priorities:
///   1. an exact match (a word equal to what was typed) — shown as an empty completion, always first
///   2. previously accepted completions (usage count, desc)
///   3. identifier-like words already present in the query
///   4. case-exact prefix match (so the ghost text continues the typed casing)
///   5. shorter words first, then alphabetical
function findCandidates(prefix, prefixStart) {
    const lprefix = prefix.toLowerCase();
    const queryWords = queryIdentifierWords(prefixStart);
    const present = new Set(queryWords.map(w => w.toLowerCase()));
    const matches = [];
    for (let i = completionLowerBound(lprefix); i < completionWords.length; ++i) {
        const entry = completionWords[i];
        if (!entry.lw.startsWith(lprefix)) break;
        /// A word equal to the prefix is kept as an "empty completion" (its suffix is empty),
        /// rather than skipped, so the user sees their typed word is a recognized one.
        matches.push(entry.w);
    }

    /// Also offer identifier-like words from the query itself (deduplicated by suffix below).
    for (const w of queryWords) {
        if (w.toLowerCase().startsWith(lprefix)) {
            matches.push(w);
        }
    }

    /// Do not open a popup that would only offer the already-typed word (an empty completion
    /// on its own has nothing to show and would needlessly capture Tab/Enter). The empty
    /// completion is shown only alongside at least one real extension.
    if (!matches.some(w => w.length > prefix.length)) {
        return [];
    }

    const score = (w) => ({
        exact: w.length === prefix.length ? 1 : 0,
        usage: completionUsage.get(w) || 0,
        present: present.has(w.toLowerCase()) ? 1 : 0,
        caseExact: w.startsWith(prefix) ? 1 : 0,
    });

    matches.sort((a, b) => {
        const sa = score(a);
        const sb = score(b);
        if (sa.exact !== sb.exact) return sb.exact - sa.exact;
        if (sa.usage !== sb.usage) return sb.usage - sa.usage;
        if (sa.present !== sb.present) return sb.present - sa.present;
        if (sa.caseExact !== sb.caseExact) return sb.caseExact - sa.caseExact;
        if (a.length !== b.length) return a.length - b.length;
        return a < b ? -1 : a > b ? 1 : 0;
    });

    /// Deduplicate by the displayed suffix so that, e.g., case variants of the exact match
    /// (`array`/`ARRAY`/`Array`, all an empty completion) collapse into a single entry and do
    /// not crowd out the real extensions.
    const result = [];
    const seenSuffix = new Set();
    for (const w of matches) {
        const suffix = w.substring(prefix.length);
        if (seenSuffix.has(suffix)) continue;
        seenSuffix.add(suffix);
        result.push(w);
        if (result.length >= MAX_COMPLETION_CANDIDATES) break;
    }
    return result;
}

/// Pixel coordinates (relative to the overlay's padding box) of the caret at `pos`.
function getCaretCoordinates(pos) {
    const text = query_area.value;
    completionMirror.textContent = text.substring(0, pos);
    const marker = document.createElement('span');
    marker.textContent = '​';
    completionMirror.appendChild(marker);
    completionMirror.appendChild(document.createTextNode(text.substring(pos)));

    /// Match the scrollbar reservation the backdrop uses, so wrapping is identical.
    const scrollbarWidth = query_area.offsetWidth - query_area.clientWidth - 2;
    completionMirror.style.paddingRight = scrollbarWidth > 0 ? 'calc(0.25rem + ' + scrollbarWidth + 'px)' : '';

    const top = marker.offsetTop;
    const left = marker.offsetLeft;
    const height = marker.offsetHeight;
    return { top, left, height };
}

/// Recompute whether completions should be shown and update the overlay.
///
/// Completions only *open* right after the user types a word character (tracked by
/// `completionOpenRequested`). Cursor-only events — clicks, focus, arrow navigation — may
/// reposition or close an already-open list, but never open a new one.
function updateCompletions() {
    /// Completions are not loaded yet (the lazy `system.completions` load may still be in
    /// flight). Keep any pending "just typed a word" request so it can fire once
    /// `loadCompletions` finishes and calls back here — otherwise the first word typed during
    /// the initial load would get no suggestions.
    if (!completionWords.length) {
        return;
    }
    if (document.activeElement !== query_area
        || query_area.selectionStart !== query_area.selectionEnd) {
        completionOpenRequested = false;
        closeCompletions();
        return;
    }

    /// The cached tokens do not yet describe the current text (tokenization is still in
    /// flight after an edit). Leave any pending open request intact so the follow-up call,
    /// made once tokens are fresh, can act on it.
    if (currentBackdropText !== query_area.value) {
        return;
    }

    /// Consume the "just typed a word character" request now that we have fresh tokens.
    const allowOpen = completionOpenRequested;
    completionOpenRequested = false;

    const id = getIdentifierBeforeCursor();
    if (!id || id.prefix.length < MIN_COMPLETION_PREFIX) {
        closeCompletions();
        return;
    }

    /// Respect an Esc dismissal for this exact caret state.
    const key = id.start + ':' + id.prefix;
    if (completionSuppressedKey === key) {
        closeCompletions();
        return;
    }
    completionSuppressedKey = null;

    const candidates = findCandidates(id.prefix, id.start);
    if (!candidates.length) {
        closeCompletions();
        return;
    }

    /// Do not pop up the list on a mere cursor move; only open after a typed word character.
    if (!completionCandidates.length && !allowOpen) {
        return;
    }

    /// Preserve the selection if the candidate list is unchanged (e.g. on a cursor-only event).
    const sameList = candidates.length === completionCandidates.length
        && candidates.every((c, i) => c === completionCandidates[i]);
    if (!sameList || id.prefix !== completionPrefix || id.start !== completionPrefixStart) {
        completionSelected = 0;
    }

    completionCandidates = candidates;
    completionPrefix = id.prefix;
    completionPrefixStart = id.start;
    renderCompletions();
}

/// Redraw both the backdrop (to refresh the reserved spacer for the selected candidate) and
/// the overlay. The backdrop render is guarded so it does not recurse into `updateCompletions`.
function renderCompletions() {
    inRenderBackdrop = true;
    renderQueryBackdrop();
    inRenderBackdrop = false;
    renderCompletionOverlay();
}

function renderCompletionOverlay() {
    if (!completionCandidates.length) {
        completionOverlay.style.display = 'none';
        return;
    }

    /// `caretEnd` is the cursor (end of the typed prefix); `caretStart` is the start of the
    /// identifier. The selected candidate shows only its suffix at the cursor (its prefix is
    /// the real typed text). The other candidates show the full word aligned at the identifier
    /// start, so their shared prefix lines up with the typed prefix and their suffixes line up
    /// at the cursor column.
    const caretEnd = getCaretCoordinates(completionPrefixStart + completionPrefix.length);
    const caretStart = getCaretCoordinates(completionPrefixStart);
    const scrollTop = query_area.scrollTop;
    const scrollLeft = query_area.scrollLeft;
    const total = completionCandidates.length;

    /// A window around the selection: up to MAX_COMPLETIONS_ABOVE items above and
    /// MAX_COMPLETIONS_BELOW below. Navigating moves the selection (and the window) through the
    /// full list; the selected item always stays on the cursor line.
    const winStart = Math.max(0, completionSelected - MAX_COMPLETIONS_ABOVE);
    const winEnd = Math.min(total - 1, completionSelected + MAX_COMPLETIONS_BELOW);

    const rowTop = (row) => (caretEnd.top + row * caretEnd.height - scrollTop) + 'px';

    completionOverlay.innerHTML = '';
    for (let i = winStart; i <= winEnd; ++i) {
        const word = completionCandidates[i];
        const selected = i === completionSelected;

        const entry = document.createElement('div');
        entry.className = 'completion-entry' + (selected ? ' completion-selected' : '');
        entry.textContent = selected ? word.substring(completionPrefix.length) : word;
        /// The selected candidate is always shown right at the cursor; the others are placed
        /// above/below by their distance from the selection, so navigating moves the whole
        /// block vertically while the selected one stays on the cursor line.
        entry.style.top = rowTop(i - completionSelected);
        entry.style.left = ((selected ? caretEnd.left : caretStart.left) - scrollLeft) + 'px';
        entry.dataset.index = i;

        /// Use mousedown (not click) and preventDefault so the textarea keeps focus.
        entry.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            acceptCompletion(i);
        });

        completionOverlay.appendChild(entry);
    }

    /// "…" at the bottom when there are more candidates below the visible window.
    if (winEnd < total - 1) {
        const more = document.createElement('div');
        more.className = 'completion-entry completion-more';
        more.textContent = '…';
        more.style.top = rowTop(winEnd - completionSelected + 1);
        more.style.left = (caretStart.left - scrollLeft) + 'px';
        completionOverlay.appendChild(more);
    }

    completionOverlay.style.display = 'block';
}

function closeCompletions() {
    if (completionCandidates.length) {
        completionCandidates = [];
        completionSelected = 0;
        completionPrefix = '';
        completionPrefixStart = -1;
        completionOverlay.style.display = 'none';
        completionOverlay.innerHTML = '';
        /// Redraw the backdrop to drop the reserved spacer (unless we are already inside a
        /// backdrop render).
        if (!inRenderBackdrop) {
            inRenderBackdrop = true;
            renderQueryBackdrop();
            inRenderBackdrop = false;
        }
    }
}

function acceptCompletion(index) {
    if (index === undefined) index = completionSelected;
    if (index < 0 || index >= completionCandidates.length) return;

    const word = completionCandidates[index];
    /// Capture the prefix and its position before closeCompletions() resets them.
    const prefix = completionPrefix;
    const start = completionPrefixStart;

    closeCompletions();

    /// Nothing to do when the completion is the already-typed word itself: either the exact
    /// same text, or the same word in a different canonical case (an "empty completion" whose
    /// suffix is empty — every candidate starts with the prefix, so an equal length means an
    /// equal word ignoring case). Accepting it must not rewrite the user's casing, e.g. typing
    /// `hash` and pressing Right/Tab/Enter (with `HASH` offered) must leave `hash` unchanged.
    if (word.length === prefix.length) {
        return;
    }

    /// Record the acceptance only when we actually replace text, so the equal-word no-op
    /// above stays a true no-op: accepting `HASH` for a typed `hash` must not bump its usage
