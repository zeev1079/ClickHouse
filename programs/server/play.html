    /// and thus re-rank later suggestions (e.g. make `HASH` win the next time `ha` is typed).
    completionUsage.set(word, (completionUsage.get(word) || 0) + 1);

    /// Replace the whole typed identifier with the canonical-cased completion word, so the
    /// already-typed prefix also takes the suggestion's case (e.g. "se" + accept -> "SELECT").
    /// Done via a selection + execCommand so it participates in the undo history and fires an
    /// `input` event (which refreshes the backdrop and recomputes completions).
    ///
    /// The `input` event from this programmatic insertion carries the inserted word as
    /// `e.data`, which would otherwise re-arm the open request and reopen the list (e.g.
    /// accepting `count` would reopen on `countIf`). Suppress that for the duration of the edit.
    completionAccepting = true;
    query_area.focus();
    query_area.setSelectionRange(start, start + prefix.length);
    document.execCommand('insertText', false, word);
    completionAccepting = false;
}

/// Force the completion list to open at the current cursor (used as a manual Tab trigger),
/// bypassing the "only open after typing a word character" and Esc-dismissal gates. Returns
/// true if it opened.
function tryOpenCompletions() {
    completionSuppressedKey = null;
    completionOpenRequested = true;
    updateCompletions();
    if (!completionCandidates.length) {
        completionOpenRequested = false;
        return false;
    }
    return true;
}

/// Indent (or, with `dedent`, unindent) every line touched by the current selection by 4
/// spaces. Uses `execCommand('insertText')` on the whole line block so the change is a single
/// undo step and fires an `input` event (which refreshes the backdrop and completions).
function indentSelection(elem, dedent) {
    const INDENT = '    ';
    const value = elem.value;

    /// Expand the selection to whole lines (same line semantics as the comment shortcut).
    const blockStart = value.lastIndexOf('\n', elem.selectionStart - 1) + 1;
    let blockEnd = value.indexOf('\n', elem.selectionEnd);
    if (blockEnd === -1) blockEnd = value.length;

    const block = value.substring(blockStart, blockEnd);
    const newBlock = block.split('\n').map((line) => {
        if (dedent) {
            /// Remove up to 4 leading spaces, or a single leading tab.
            const m = line.match(/^( {1,4}|\t)/);
            return m ? line.substring(m[0].length) : line;
        }
        /// Do not add trailing whitespace to blank lines (empty or whitespace-only).
        return /^\s*$/.test(line) ? line : INDENT + line;
    }).join('\n');

    if (newBlock === block) return; /// Nothing to unindent — leave the selection untouched.

    elem.setSelectionRange(blockStart, blockEnd);
    document.execCommand('insertText', false, newBlock);
    /// Reselect the whole (re)indented block so repeated Tab / Shift+Tab keeps working.
    elem.setSelectionRange(blockStart, blockStart + newBlock.length);
}

/// Capture-phase key handling so it runs before the textarea's own `onkeydown` (which would
/// otherwise treat Tab as "insert spaces").
query_area.addEventListener('keydown', (e) => {
    /// This handler runs in the capture phase and calls `stopImmediatePropagation` for the keys it
    /// consumes (Tab, Enter, ArrowUp/ArrowDown, ArrowRight, Escape). At the event target, a
    /// capture-phase listener fires before the bubble-phase one and its `stopImmediatePropagation`
    /// prevents the bubble-phase `onReturnToEditor` (bound below) from firing at all. So record the
    /// editor interaction here too: pressing a key to open, navigate, or dismiss completions is a
    /// return to the editor, and without this a late error response for an in-flight query would
    /// repaint a stale syntax-error highlight (see `editorInteractionGen`). Bump it before the
    /// selection-indent early return below, which also `stopImmediatePropagation`s and returns.
    ///
    /// Also clear any *already visible* highlight here. Bumping the generation only suppresses a
    /// future late response; because this handler `stopImmediatePropagation`s the keys it consumes
    /// (Tab, Enter, arrows, Escape), the bubble-phase `onReturnToEditor` — which would clear the
    /// marker — never runs for them, so a stale highlight would otherwise linger while the user
    /// navigates completions. `clearQueryError` is idempotent when there is nothing to clear.
    ++editorInteractionGen;
    clearQueryError();
    /// Tab / Shift+Tab with a non-empty selection indents / unindents the selected lines by 4
    /// spaces. Handled here (before the completion logic and the space-insert `onkeydown`) so a
    /// selection takes priority.
    if (e.key === 'Tab' && !e.ctrlKey && !e.metaKey && !e.altKey && !user_prefers_tab_navigation
        && query_area.selectionStart !== query_area.selectionEnd) {
        e.preventDefault();
        e.stopImmediatePropagation();
        indentSelection(query_area, e.shiftKey);
        return;
    }
    if (!completionCandidates.length) {
        /// Completions are closed: Tab at the end of a word manually opens them if a
        /// continuation is possible; otherwise let the default Tab (indentation) happen.
        if (e.key === 'Tab' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
            if (tryOpenCompletions()) {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
        }
        return;
    }
    /// The selected candidate whose full text equals the already-typed word (an "empty
    /// completion" — same length as the prefix, since every candidate starts with it) would
    /// accept to a no-op. In that case Right / Enter must keep their native meaning — move the
    /// caret one character, or insert a newline — instead of being swallowed by a completion
    /// that changes nothing. This matters e.g. after typing `f()` with the caret between `f`
    /// and `(`: Right should step into the parens, not "accept" the already-complete `f`.
    const selectedIsNoop = completionCandidates[completionSelected].length === completionPrefix.length;

    /// Plain Enter accepts the completion; Ctrl/Cmd+Enter is left alone so it still runs the query.
    if (e.key === 'ArrowRight' || (e.key === 'Enter' && !e.ctrlKey && !e.metaKey)) {
        if (selectedIsNoop) {
            /// Nothing to accept — dismiss the list and let the key act natively.
            closeCompletions();
            return;
        }
        e.preventDefault();
        e.stopImmediatePropagation();
        acceptCompletion(completionSelected);
    } else if (e.key === 'Tab') {
        e.preventDefault();
        e.stopImmediatePropagation();
        acceptCompletion(completionSelected);
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSelected = (completionSelected + 1) % completionCandidates.length;
        renderCompletions();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSelected = (completionSelected - 1 + completionCandidates.length) % completionCandidates.length;
        renderCompletions();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSuppressedKey = completionPrefixStart + ':' + completionPrefix;
        closeCompletions();
    }
}, true);

/// Arm the completion list to open only when the user actually types word characters.
/// This listener is registered before the one that drives tokenization, so the flag is set
/// by the time the post-tokenize `updateCompletions` runs. `e.data` holds the inserted text
/// (null for deletions); composition input also carries the composed text.
query_area.addEventListener('input', (e) => {
    if (completionAccepting) {
        /// Programmatic insertion from accepting a completion — do not treat as typing.
        completionOpenRequested = false;
        return;
    }
    const typed = e.data;
    completionOpenRequested = typeof typed === 'string' && /^\w+$/.test(typed);
});

/// Clicking outside the completion entries closes the list.
document.addEventListener('mousedown', (e) => {
    if (completionCandidates.length && !e.target.closest('.completion-entry')) {
        closeCompletions();
    }
});

/// Load completions the first time the textarea is focused.
query_area.addEventListener('focus', loadCompletions);

/// Query parameters support: detect {name:Type} placeholders and show input fields.

let queryParamsContainer = document.getElementById('query-params');
let currentQueryParams = [];
let updateQueryParamsGeneration = 0;

function extractQueryParams(tokens)
{
    const params = [];
    const seen = new Set();
    const significant = tokens.filter(t => t.significant);

    for (let i = 0; i < significant.length - 3; i++)
    {
        if (significant[i].token === '{' && significant[i + 2].token === ':')
        {
            const name = significant[i + 1].token;
            if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name) && !seen.has(name))
            {
                for (let j = i + 3; j < significant.length; j++)
                {
                    if (significant[j].token === '}')
                    {
                        const type = significant.slice(i + 3, j).map(t => t.token).join('');
                        params.push({name: name, type: type});
                        seen.add(name);
                        break;
                    }
                }
            }
        }
    }

    return params;
}

function getParamValues()
{
    const values = {};
    for (const param of currentQueryParams)
    {
        const input = document.getElementById('param-' + param.name);
        if (input)
        {
            values[param.name] = input.value;
        }
    }
    return values;
}

function setParamValues(values)
{
    if (!values) return;
    for (const [name, value] of Object.entries(values))
    {
        const input = document.getElementById('param-' + name);
        if (input)
        {
            input.value = value;
            input.dispatchEvent(new Event('input'));
        }
    }
}

/// Snapshot the parameter VALUES a run launches with, and keep the `param_*` inputs in sync.
/// Called by `postOne`/`postAll` for the launching `tab` BEFORE any await, so the whole background
/// run stays bound to one launch-time snapshot (see the call sites): re-reading the shared
/// `param_*` inputs / `getActiveTab` after an await would let a tab switch during it rebind the
/// run to another tab's parameter values (a correctness bug for parameterized queries).
///
/// Normally the live DOM inputs are authoritative. But while a tab activation / Back-Forward
/// restore has not committed yet, the launching tab's saved parameters
/// have not been written to the inputs — that write happens only after `restoreEditor`'s
/// tokenization await, which the `++activation_num` in `postOne`/`postAll` has just superseded — so the
/// inputs still hold the previously active tab's values. Sourcing them would execute this tab's
/// query against the wrong bindings (a correctness bug, not just a stale UI). Take the values
/// from the launching tab's own saved `params` instead (parameters are tab-owned), and write
/// them back so the inputs reflect what actually ran.
///
/// The parameter NAMES this snapshot enumerates (via `currentQueryParams` / the tab's saved keys)
/// can themselves lag the editor: both are rebuilt only after an asynchronous tokenization
/// (`updateQueryParams` on edits, `restoreEditor` on activation), so right after a quick edit they
/// may still describe the PREVIOUS text — e.g. for `SELECT {x}` -> `SELECT {y}` they would send
/// `param_x` and drop `param_y`. `postOne`/`postAll` therefore re-derive the names from the RUN's
/// own tokenization of the launched text (`extractRunParamNames`) and bind them to the values
/// snapshotted here (`pickRunParams`). When that derivation is unavailable (no lexer / text too
/// large) the caller falls back to the merged `param_sources` (this result over `tab.params`), so
/// a saved tab whose parameter inputs could not be rebuilt still runs with its persisted bindings.
function resolveRunParams(params_restore_pending, tab)
{
    if (!params_restore_pending) return getParamValues();
    const saved = (tab && tab.params) || {};
    const values = {};
    for (const name of Object.keys(saved))
    {
        values[name] = saved[name] !== undefined ? saved[name] : '';
    }
    setParamValues(values);
    return values;
}

/// Extract the `{name:Type}` parameter placeholders from the RUN's own snapshot of the editor
/// text, tokenizing it independently of the keystroke-driven `updateQueryParams` pipeline (whose
/// `currentQueryParams` may still describe an older edit). Returns the extracted list, or null
/// when it cannot be derived (no WASM lexer, or the text is too large to tokenize) — the caller
/// then falls back to the launch-time snapshot.
async function extractRunParamNames(text)
{
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function') return null;
    try
    {
        return extractQueryParams(await tokenize(text));
    }
    catch (e)
    {
        return null;
    }
}

/// Bind a run's own parameter list (`params`, extracted from the launched text) to the values
/// known for the launching tab at launch (`sources`). A name with no known value is omitted —
/// exactly like a parameter whose input never existed — so the server reports it as not set
/// instead of the run silently executing with a stale or foreign binding.
function pickRunParams(params, sources)
{
    const values = {};
    for (const param of params)
    {
        if (sources[param.name] !== undefined) values[param.name] = sources[param.name];
    }
    return values;
}

/// Rebuild the syntax highlighting, run buttons and query-parameter inputs from the current
/// editor text. Returns `true` when `currentQueryParams` now reflects that text (tokenized
/// successfully, or the query is empty), and `false` when it could not be rebuilt (WASM lexer
/// unavailable, the query too large to tokenize, or a newer generation superseded this call).
/// Callers that then read `currentQueryParams` to restore a tab's parameters (`restoreEditor`
/// and the startup URL reconciliation) MUST honor a `false` result: on failure the list may still
/// describe the PREVIOUS tab, so deriving params from it would attach that tab's placeholder names
/// to this one and persist them into history / `IndexedDB`.
async function updateQueryParams()
{
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function')
    {
        return false;
    }

    /// Bump the generation up-front so that any in-flight older runs (which only
    /// check this counter after their `await tokenize`) see a newer value and bail
    /// out — including the empty-query fast path below, where we would otherwise
    /// clear state and return, and a stale older run could then overwrite it.
    const generation = ++updateQueryParamsGeneration;

    const query = query_area.value;
    if (!query)
    {
        queryParamsContainer.innerHTML = '';
        currentQueryParams = [];
        updateRunButtons(false);
        updateQueryBackdrop('', [], []);
        return true;   /// the empty list correctly reflects a query with no parameters
    }

    /// If tokenization or rendering throws (e.g. the query is larger than the WASM
    /// memory window currently allocated to the lexer), fall back to the unstyled
    /// textarea instead of leaving the previous `.has-backdrop` state in place —
    /// otherwise `#query.has-backdrop` keeps the real text invisible
    /// (`color: transparent`) while the stale backdrop is shown.
    let tokens;
    try
    {
        tokens = await tokenize(query);
    }
    catch (e)
    {
        if (generation !== updateQueryParamsGeneration) { return false; }
        console.error('Tokenization failed, disabling syntax highlighting:', e);
        updateQueryBackdrop('', [], []);
        return false;   /// `currentQueryParams` was NOT rebuilt; it may still describe another query
    }
    if (generation !== updateQueryParamsGeneration) { return false; }
    const params = extractQueryParams(tokens);

    /// Detect multi-query mode from the same token stream.
    const boundaries = getQueryBoundaries(tokens, query);
    updateRunButtons(boundaries.length > 1);
    try
    {
        updateQueryBackdrop(query, tokens, boundaries);
    }
    catch (e)
    {
        console.error('Rendering syntax highlighting failed, disabling backdrop:', e);
        updateQueryBackdrop('', [], []);
    }

    if (JSON.stringify(params) === JSON.stringify(currentQueryParams))
    {
        return true;   /// unchanged, but `currentQueryParams` already reflects this query
    }

    const oldValues = getParamValues();
    currentQueryParams = params;
    queryParamsContainer.innerHTML = '';

    for (const param of params)
    {
        const wrapper = document.createElement('span');
        wrapper.className = 'query-param';

        const label = document.createElement('label');
        label.textContent = param.name + ':';
        label.setAttribute('for', 'param-' + param.name);
        wrapper.appendChild(label);

        let placeholder = param.type;
        if (/^Date$/.test(param.type)) placeholder = 'YYYY-MM-DD';
        else if (/^DateTime/.test(param.type)) placeholder = 'YYYY-MM-DD hh:mm:ss';

        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'param-' + param.name;
        input.className = 'monospace shadow';
        input.spellcheck = false;
        input.placeholder = placeholder;
        if (oldValues[param.name] !== undefined)
        {
            input.value = oldValues[param.name];
        }
        input.addEventListener('input', function(e)
        {
            /// Resize to fit the value, clamped between 10em and 20em.
            this.style.width = '10em';
            if (this.scrollWidth > this.clientWidth)
            {
                this.style.width = Math.min(this.scrollWidth, this.clientWidth * 2) + 'px';
            }
            /// Only react to genuine user edits: `updateQueryParams` (on query edits) and
            /// `setParamValues` (on restore) dispatch synthetic input events for the resize
            /// above, and syncing on those would spam history / fight the restore.
            if (!e.isTrusted) return;
            markBootstrapDirty(e);   /// user edited a parameter before reconciliation
            /// While a restore is rebuilding these inputs for a just-activated tab (see
            /// `params_restore_pending_token` in `restoreEditor`), the DOM elements here still
            /// hold the tab being LEFT — `updateQueryParams`'s rebuild has not landed yet. Writing
            /// them into `getActiveTab().params` now would attribute the previous tab's values to
            /// the newly active tab (and drop the values the new tab was actually restoring).
            /// `captureActiveTab` applies the same guard for the same reason; the restore's own
            /// commit sets `tab.params` correctly once it resolves.
            if (params_restore_pending_token !== null) return;
            /// Parameters are tab-owned: persist edited values into the active tab, and keep
            /// the URL/history entry in sync (replaceState, since the query is unchanged) so a
            /// reload's URL params are never stale relative to the saved tab.
            const tab = getActiveTab();
            if (tab) { tab.params = getParamValues(); syncHistory(); }
        });
        wrapper.appendChild(input);

        queryParamsContainer.appendChild(wrapper);

        /// Trigger resize after the element is in the DOM so scrollWidth is valid.
        input.dispatchEvent(new Event('input'));
    }
    return true;   /// `currentQueryParams` now reflects the current query
}

query_area.addEventListener('input', (e) =>
{
    /// A real keystroke/paste into the editor before reconciliation completes means the live
    /// query is newer than the saved workspace; keep it. `restoreEditor`/bootstrap dispatch
    /// synthetic input events (`isTrusted === false`), which `markBootstrapDirty` ignores.
    markBootstrapDirty(e);

    resizeQueryAreaIfSlightlyOverflowing();

    /// Run the update synchronously instead of with a setTimeout: the heavy work
    /// (WASM tokenize, building backdrop HTML) is fast, and the await chain inside
    /// `updateQueryParams` runs in microtasks — i.e. it finishes before the browser
    /// paints the next frame. If we deferred this with `setTimeout`, the browser
    /// would render one frame with the textarea's own text hidden (`color:
    /// transparent` from `.has-backdrop`) and the backdrop still showing the
    /// pre-edit contents, so the freshly typed characters would be invisible.
    updateQueryParams();

    /// Keep the active tab and its persisted copy in sync with the editor. The hue of
    /// the active tab follows the page background, so no per-tab recolor is needed here.
    const tab = getActiveTab();
    if (tab) {
        tab.query = query_area.value;
        /// Fold the edit into the current browser-history entry (and its URL) right away, not
        /// only on a click-driven tab switch (`switchToTab`/`addTab`). Otherwise the entry keeps
        /// the query last written by a run/switch, and browser Back/Forward away from this tab and
        /// back — or closing it and pressing Back to recreate it — restores that stale text from
        /// `history.state` over the newer unrun edit (both `window.onpopstate` and
        /// `resolveTabForState` read `event.state.query`). Refreshing here keeps the entry the tab
        /// would be restored from in sync with the latest keystroke. Only genuine keystrokes do it:
        /// the synthetic 'input' events `restoreEditor`/bootstrap dispatch merely replay
        /// already-recorded state (`isTrusted === false`, as `markBootstrapDirty` relies on) and
        /// must not rewrite the entry. `refreshCurrentHistoryEntry` only touches the current entry
        /// when it belongs to this tab (or seeds the page's initial entry when a fresh load has not
        /// written one yet — this first trusted edit), always via replaceState, so it never spams
        /// new entries, and it drops `run=1` once the edit diverges the editor from the produced
        /// result (`tabReflectsRun`) — a genuine keystroke does — so an unrun edit never becomes
        /// auto-runnable on reload.
        if (e.isTrusted) refreshCurrentHistoryEntry(tab);
        scheduleSave();
    }
});

function setColorTheme(new_theme, update_preference) {
    theme = new_theme;
    if (update_preference) {
        window.localStorage.setItem('theme', theme);
    }
    document.documentElement.setAttribute('data-theme', theme);
    /// Recolor every materialized tab's chart(s), not just the active one, so a background tab's
    /// chart matches the theme when it is next opened. Runs before any panel exists at startup, so
    /// the query is safe (empty).
    for (const el of resultPanelsEl.querySelectorAll('query-result')) el.redrawChart();
}
/// First we check if theme is set via the 'theme' GET parameter, if not, we check localStorage, otherwise we check OS preference.
let theme = current_url.searchParams.get('theme');
if (['dark', 'light'].indexOf(theme) === -1) {
    theme = window.localStorage.getItem('theme');
}

if (theme) {
    document.documentElement.setAttribute('data-theme', theme);
} else {
    /// Obtain system-level user preference
    const media_query_list = window.matchMedia('(prefers-color-scheme: dark)');
    if (media_query_list.matches) {
        setColorTheme('dark');
    } else {
        setColorTheme('light');
    }

    /// There is a rumor that on some computers, the theme is changing automatically on day/night.
    media_query_list.addEventListener('change', function(e) {
        setColorTheme(e.matches ? 'dark' : 'light');
    });
}

/// ----- Tab bootstrap & startup reconciliation -----------------------------------
/// Build the initial in-memory tab from whatever the synchronous load produced (the
/// URL hash query, if any). A single result-less tab keeps the tab bar hidden, so the
/// first paint is identical to the pre-tabs UI (no layout shift).
tabs = [makeTab(undefined, query_area.value)];
activeTabId = tabs[0].id;
/// Seed the bootstrap tab's color modes and pinned columns from the URL (a shared/bookmarked link
/// may carry them).
tabs[0].colorModes = url_color_modes;
tabs[0].pinnedColumns = url_pinned_columns;
/// Build the active tab's panel now (synchronously), so the `resultEl` alias exists before any
/// connection check / early render runs, matching the pre-tabs invariant that it always existed.
setActivePanel(tabs[0]);

const url_tab_name = current_url.searchParams.get('tab');
/// Whether the URL actually carries a query fragment (`#<base64>`), as opposed to no
/// fragment or a bare `#`. `url_query` is '' in all those cases, so we must not treat an
/// absent query the same as an empty one: a bare `?tab=Name` must not wipe the saved query.
const has_url_query = window.location.hash.length > 1;
const url_query = query_area.value;          /// already decoded from the hash; may be ''
/// Defer the startup auto-run (`run=1`) until after IndexedDB reconciliation for EVERY URL, not
/// only ones carrying a `#<query>` hash. Two reasons: (1) reconciliation may switch the active tab,
/// and a switch would abort an in-flight run, so the run must happen in the reconciled tab; (2) a
/// bare `?tab=<blank>&run=1` reload must not auto-run at the top level before reconciliation has
/// read `history.state`: that early `postAll` writes `history.state` for the bootstrap tab, after
/// which `stale_blank_reload` stops matching the pruned blank tab and the authoritative path
/// resurrects and re-persists it. The deferred run below is gated on a non-empty `query_area.value`,
/// so a bare `run=1` with nothing to run is simply dropped — as before, when it auto-ran an empty
/// query that produced nothing.
const defer_run_for_reconcile = run_immediately;

/// Reconcile the freshly loaded URL (query + tab name) against tabs saved in IndexedDB.
async function reconcileStartup() {
    const loaded = await loadFromDb();
    /// `bootstrap_settled` is deliberately NOT set here: reconciliation still awaits `activateTab`
    /// and `updateQueryParams` below (and may fire a deferred auto-run), and a genuine user edit
    /// during any of those awaits must still mark the workspace dirty so it is neither overwritten
    /// by the URL-driven restore nor auto-run. Reconciliation's own synthetic input events carry
    /// `isTrusted === false`, so they never set the flag. The flag is closed at each terminal path.
    let activated = false;
    /// Set when the matched tab's saved query/params are newer than the URL (a stale reload
    /// of an edited-but-not-resynced tab). In that case the URL is NOT authoritative, so we
    /// keep the saved query and skip the URL-driven parameter reconciliation below.
    let preserve_local_query = false;
    /// Set when the URL is authoritative for the reconciled tab's result (its query was
    /// substituted from a fresh/shared link, or a new tab was opened for it). In that case the
    /// URL's `color_modes` payload must be applied to that tab; see the re-apply after activation.
    let url_authoritative_colors = false;
    /// Set by the no-saved-tabs adopt branch when it recreates the bootstrap tab for an
    /// authoritative URL. The current entry is re-owned for that tab at the tail, AFTER the URL
    /// parameters are reconciled into it, so the rebuilt entry/URL carry the adopted title, query
    /// and `param_*` together (see the tail's `refreshCurrentHistoryEntry` call).
    let reown_adopted_entry = false;

    /// Reconstruct the saved workspace from IndexedDB, ordered by the persisted order,
    /// and restore the id/title counters.
    let savedTabs = [];
    /// Stable ids of the blank tabs dropped by the pruning below. Used — together with the reloaded
    /// history entry's provenance (see `stale_blank_reload`) — to recognize a bare `?tab=Name` URL
    /// (no query) that is only a stale echo of a tab this load just dropped. A plain reload echoes
    /// the (now pruned) active tab's history entry, while a shared bare link names a tab this pruning
    /// never saw. Keying the distinction on whether IndexedDB had any records at all would not work:
    /// the trailing `scheduleSave` persists the blank bootstrap tab even on a first-ever visit, so
    /// every later visit would look like an all-blank reload and shared bare links would stop opening
    /// the named tab. The pruned tab's title is likewise not a reliable key: renaming a tab rewrites
    /// the current history entry (`?tab=` + `history.state.tabName`) synchronously, but the record is
    /// only re-persisted by the debounced `scheduleSave`, so a reload right after a rename echoes the
    /// NEW title while `IndexedDB` still holds the OLD one — a title match would miss it and resurrect
    /// the blank tab. The tab id is stable across an unsaved rename, so match on it instead.
    /// The titles are additionally kept for LEGACY history entries that predate `tabId` (see
    /// `stale_blank_reload`): for those the title is the only key available, and the rename
    /// race above cannot affect them — any history write under the current code (including a
    /// rename's synchronous rewrite) stamps `tabId`, so an entry without one was never
    /// rewritten since the upgrade and still carries the same title `IndexedDB` holds.
    const pruned_blank_ids = new Set();
    const pruned_blank_titles = new Set();
    if (loaded && loaded.records.length) {
        const order = (loaded.meta && loaded.meta.tabOrder) || [];
        const byId = new Map(loaded.records.map(r => [r.id, r]));
        const ordered = [];
        for (const id of order) if (byId.has(id)) { ordered.push(byId.get(id)); byId.delete(id); }
        for (const r of byId.values()) ordered.push(r);
        /// Do not restore blank scratch tabs left over from a previous session: on reload they
        /// would reappear as empty tabs the user never asked to keep. A tab counts as blank only
        /// when its query is empty AND it carries no genuine run result: a tab whose editor was
        /// cleared after a run still holds a `result.ran` snapshot, which `renderTabBar` treats as
        /// meaningful persisted state, so it must be preserved (dropping it would silently erase a
        /// run-backed tab from `IndexedDB`). Dropping the truly-blank tabs here lets the workspace
        /// fall back to a single fresh tab when every saved tab was blank (as on a first-ever
        /// visit), and the trailing `persist` prunes them from storage.
        for (const r of ordered) {
            if ((r.query || '').trim() !== '' || (r.result && r.result.ran)) {
                savedTabs.push({
                    id: r.id, title: r.title, query: r.query || '',
                    params: r.params || {}, result: r.result || null, lastSavedQuery: r.lastSavedQuery,
                    /// Attach fresh transient runtime state (panels/queries are materialized lazily on
                    /// first activation), seeding color modes and pinned columns from the persisted
                    /// result snapshot.
                    ...tabRuntimeDefaults(),
                    colorModes: (r.result && r.result.color_modes) || {},
                    pinnedColumns: (r.result && r.result.pinned_columns) || {},
                });
            } else {
                pruned_blank_ids.add(r.id);
                pruned_blank_titles.add(r.title);
            }
        }
        if (loaded.meta) {
            tabSeq = Math.max(tabSeq, loaded.meta.tabSeq || 0);
            tabTitleSeq = Math.max(tabTitleSeq, loaded.meta.tabTitleSeq || 0);
        }
    }

    /// A bare `?tab=Name` URL is a stale echo of a blank tab this load just pruned — and so NOT
    /// authoritative — only when the reloaded history entry still describes one of those pruned
    /// tabs. Every `?tab=` in the URL was written by `writeHistoryEntry` together with a
    /// `history.state` carrying the tab's stable `tabId`, and a reload preserves that state, so a
    /// plain reload of a dropped blank tab has `history.state.tabId` equal to that tab's id. Match
    /// on the id, not the title: the id survives an unsaved rename (see `pruned_blank_ids`), whereas
    /// the title in the URL/`history.state` can already be the new name while `IndexedDB` still holds
    /// the old one — a title match would miss the pruned record and let the blank tab come back. A
    /// genuine external shared bare link (typed, pasted, or followed from elsewhere) begins a fresh
    /// navigation with `history.state === null`, so it stays authoritative and opens the named tab
    /// even when its title happens to collide with a locally pruned blank tab. The
    /// `history.state.tabName === url_tab_name` guard keeps this scoped to an entry that actually
    /// describes the URL's named tab. `history.state` is still the reloaded value here: nothing has
    /// rewritten it yet because the startup `run=1` auto-run — whose `postAll`/`saveHistory` would
    /// stamp the bootstrap tab's state over it — is deferred to the end of this function for EVERY
    /// URL (see `defer_run_for_reconcile`), not run at the top level before reconciliation.
    /// A LEGACY entry predating `tabId` (supported by `resolveTabForState` via its title fallback)
    /// carries only `tabName`, so for it the pruned set is matched by title instead: the title is
    /// the only key such an entry has, and it is reliable here precisely because the entry is
    /// legacy — every history write under the current code stamps `tabId`, so an entry without one
    /// was never rewritten by a rename and cannot be affected by the rename race described at
    /// `pruned_blank_ids`. Without this fallback, reloading an upgraded pre-`tabId` session whose
    /// URL names a pruned blank tab would recreate and re-persist that tab.
    const stale_blank_reload = !!(url_tab_name
        && history.state
        && history.state.tabName === url_tab_name
        && (history.state.tabId
            ? pruned_blank_ids.has(history.state.tabId)
            : pruned_blank_titles.has(history.state.tabName)));

    /// A `stale_blank_reload` can still leave a query fragment in the URL: the pruned tab's own
    /// text was encoded into the hash by the last `writeHistoryEntry`, so `has_url_query` is true
    /// even for a tab the pruning counted as blank. When that text is itself blank (whitespace-only,
    /// by the same `trim()` rule the pruning uses) the hash is only a stale echo of the dropped
    /// blank tab — NOT a query the user wants restored — so it must be treated exactly like a bare
    /// `?tab=`: non-authoritative everywhere below, never allowed to recreate or re-adopt the blank
    /// tab. Otherwise the branches keyed on `has_url_query` would rebuild it and the trailing
    /// `scheduleSave` would write it straight back to `IndexedDB`, defeating the pruning. A NON-blank
    /// hash on a stale reload is instead a genuine unsaved edit that never reached `IndexedDB` before
    /// the reload, so it stays authoritative and the tab is recreated with that real query,
    /// preserving the edit.
    const stale_blank_reload_bare = stale_blank_reload && (url_query || '').trim() === '';

    /// A `stale_blank_reload_bare` URL is only a stale echo of a blank tab this load just pruned, so
    /// it is non-authoritative in every respect — including its `run=1` directive, which was written
    /// for that pruned tab, not for whichever surviving/bootstrap tab the reconciliation below falls
    /// back to. The deferred auto-run is already skipped for it (see the `!stale_blank_reload_bare`
    /// guard on `postAll` below), but the directive must also be dropped from the global
    /// `run_immediately`: the trailing `syncHistory` recomputes `run=1` as `run_immediately &&
    /// tabReflectsRun(tab)`, so a clean, run-backed fallback tab (e.g. a surviving `Report`) would
    /// otherwise be re-stamped with `run=1` and auto-execute on the NEXT reload, inheriting an
    /// auto-run the user never asked of it. `defer_run_for_reconcile` was captured before startup
    /// ran, so clearing the flag here leaves that guard's behavior intact and only closes the leak.
    if (stale_blank_reload_bare) run_immediately = false;

    if (savedTabs.length) {
        if (bootstrap_dirty) {
            /// The user interacted with the bootstrap workspace while IndexedDB was still
            /// loading, so the live tabs are NEWER than the saved ones. Do not overwrite them.
            /// Merge instead: keep the live workspace (and its active tab) and bring the saved
            /// tabs alongside it, so neither the fresh work nor the persisted tabs are lost.
            /// Merely skipping the restore is not enough: the trailing `scheduleSave` would
            /// `clear()` the store (see `persist`) and drop the saved tabs permanently.
            ///
            /// Once the live bootstrap workspace wins, the startup `run=1` directive is spent: it
            /// was meant to auto-run the URL's original query in the bootstrap tab, but the user's
            /// live interaction superseded it and the deferred auto-run is skipped for a dirty
            /// startup (see the `!bootstrap_dirty` guard on `postAll` below). It must also be
            /// dropped from the global `run_immediately`, exactly as for `stale_blank_reload_bare`
            /// above: otherwise the flag survives, and the next `syncHistory`/`saveHistory`
            /// recomputes `run=1` as `run_immediately && tabReflectsRun(tab)`, so switching into a
            /// clean, run-backed tab (e.g. a restored `Report`) would re-stamp `run=1` onto its URL
            /// and auto-execute it on the NEXT reload — an auto-run the user never asked of it.
            run_immediately = false;
            captureActiveTab();
            const liveTabs = tabs;
            /// Both id sequences start at `t1`, so the saved ids can collide with the live ids.
            /// Keep the LIVE ids stable and re-id the colliding restored (saved) tabs instead:
            /// any browser-history entries created during the load window reference the live
            /// bootstrap ids, and Back/Forward must keep resolving those to the live tabs. The
            /// saved tabs have no history entries in this session (just loaded from IndexedDB),
            /// so re-id'ing them is safe. Re-id'ing the live tabs instead would leave older,
            /// un-remapped live-id entries resolving to same-id saved tabs and overwriting their
            /// persisted query/result state — a worse, durable data loss.
            const liveIds = new Set(liveTabs.map(t => t.id));
            for (const t of savedTabs) {
                if (liveIds.has(t.id)) t.id = 't' + (++tabSeq);
            }
            /// Saved tabs keep their persisted order and come first; the live workspace follows.
            tabs = savedTabs.concat(liveTabs);
            /// The bootstrap tabs default to the same titles as the persisted workspace
            /// (`Query A`, `Query B`, ...), so the merge can leave duplicate titles. Titles double
            /// as the unique `tab=` reconciliation key (see `uniqueTitle`), so de-conflict the live
            /// titles against the saved ones (saved tabs keep theirs). `tabs` is already the merged
            /// list, so `uniqueTitle` sees every title and excludes the tab itself by id.
            for (const t of liveTabs) t.title = uniqueTitle(t.title, t.id);
            /// Re-own the current browser-history entry for the winning live active tab. Renaming a
            /// live tab above changes its title, but the entry can be stale in two ways, and only a
            /// full re-own fixes both. (1) On a plain reload the preserved `history.state`/hash still
            /// describe the previous session's active tab — which may be one of the blank tabs just
            /// pruned — and the live edit typed during the load window could not claim them
            /// (`refreshCurrentHistoryEntry` bails on another tab's entry). Restamping only the `?tab=`
            /// URL param would leave the dropped tab's stale hash and foreign
            /// `history.state` attached: on the NEXT reload startup treats that stale hash as an
            /// authoritative shared URL and overwrites the persisted live query with it. (2) When the
            /// entry does belong to the live tab (a fresh nav whose first trusted edit seeded it under
            /// the tab's pre-rename default title), the `?tab=`/`history.state.tabName` still carry the
            /// old title. Both are fixed exactly as the all-blank dirty branch below does: drop the
            /// foreign state first (unless the ids coincide, where the entry is already the live tab's
            /// to replace in place), then seed the entry wholesale from the live tab via
            /// `refreshCurrentHistoryEntry` — rebuilding the URL, `history.state`, hash and
            /// `lastSavedQuery`, and dropping the stale `?tab=`/hash. (`run_immediately` was cleared
            /// above, so the rebuilt URL cannot re-stamp `run=1`.) Older load-window entries keep the
            /// stable live `tabId` and are restamped lazily by `onpopstate` on Back/Forward.
            const active_live = getActiveTab();
            if (active_live) {
                if (history.state && history.state.tabId !== active_live.id) {
                    history.replaceState(null, document.title, location.href);
                }
                refreshCurrentHistoryEntry(active_live);
            }
            renderTabBar();
            scheduleSave();
            bootstrap_settled = true;   /// reconciliation is done for this path (no further awaits)
            return;   /// skip URL param reconciliation and auto-run: the user is already editing
        }

        /// Replacing the in-memory workspace with the saved one: drop the bootstrap tab's panel
        /// from the DOM so it does not linger (visible) behind the restored active tab's panel.
        for (const t of tabs) if (t.panel) t.panel.remove();
        tabs = savedTabs;
        if (!has_url_query && !url_tab_name) {
            /// Plain load: restore the saved workspace as-is.
            activeTabId = (loaded.meta && savedTabs.some(t => t.id === loaded.meta.activeTabId))
                ? loaded.meta.activeTabId : savedTabs[0].id;
        } else {
            let match = null;
            /// Skip title matching entirely when the URL is a stale reload echo of a just-pruned
            /// blank tab (`stale_blank_reload`): the reloaded history entry (its stable `tabId`,
            /// or the title fallback for a legacy entry predating `tabId`) identifies the pruned
            /// tab, not any surviving tab that merely shares its title, so
            /// the URL is NOT authoritative and must not activate an unrelated same-titled tab.
            /// This matters only in legacy persisted workspaces that still hold duplicate titles
            /// (normally titles are kept unique, see `uniqueTitle`): there `named[0]` below would
            /// otherwise pick a same-titled survivor and make the stale bare `?tab=` authoritative
            /// again, landing a plain reload on an unrelated tab. Leaving `match` null here lets
            /// control reach the non-authoritative fallback (persisted active tab, else the first
            /// saved tab) — the same fall-through the guard already applies further below.
            if (url_tab_name && !stale_blank_reload) {
                /// Tabs are normally kept title-unique (see `uniqueTitle`), but legacy persisted
                /// state could still hold duplicates. Among same-titled tabs, prefer the one the
                /// URL actually came from — its query (or last URL-synced query) equals the URL's
                /// — so a shared/reloaded link lands on its originating tab and stays
                /// non-destructive, instead of clobbering an unrelated tab that shares the name.
                const named = savedTabs.filter(t => t.title === url_tab_name);
                match = named.find(t => t.query === url_query)
                     || named.find(t => t.lastSavedQuery === url_query)
                     || named[0] || null;
            }
            if (match) {
                /// Named URL: substitute the URL query into that tab ONLY when the URL carries
                /// a query; a bare ?tab=Name just activates the tab and keeps its saved query.
                if (has_url_query && match.query !== url_query) {
                    if (match.lastSavedQuery !== url_query) {
                        /// The URL holds a query this tab was never synced to (a fresh/shared
                        /// link for an existing tab name): the URL wins, substitute it. The tab's
                        /// live `colorModes` / `pinnedColumns` (seeded from its snapshot in
                        /// `loadFromDb`) survive the drop of `result`, and when the URL is
                        /// authoritative the re-apply below replaces them with the link's set.
                        match.query = url_query;
                        match.result = null;
                    } else {
                        /// Stale reload: the URL hash is exactly this tab's own last-synced
                        /// query, but the saved tab was edited (and persisted) afterwards
                        /// without re-syncing the URL. The IndexedDB value is newer — keep it,
                        /// and don't let the stale URL parameters override the saved ones.
                        preserve_local_query = true;
                        /// The URL's `run=1` was meant to auto-run the (now stale) URL query, not
                        /// the newer local edit the user never ran. Drop the stale run directive so
                        /// the edit is neither auto-run below nor re-stamped with `run=1` into the
                        /// synced URL (which would auto-run it on the next reload). A destructive
                        /// edit (e.g. `DROP`/`INSERT`) left unrun must stay unrun.
                        run_immediately = false;
                    }
                }
                /// Whenever the URL carries a query and this is not a stale reload, the URL is
                /// authoritative for this tab's color coding — including an EXACT-MATCH reconciliation
                /// (the URL query equals the saved tab's). A shared/bookmarked link's `color_modes`
                /// must then replace the saved palette; otherwise `syncHistory` would rewrite the URL
                /// back to the saved modes and the link would silently lose its encoded colors.
                if (has_url_query && !preserve_local_query) url_authoritative_colors = true;
                activeTabId = match.id;
            } else if (has_url_query && !url_tab_name && (match = savedTabs.find(t => t.query === url_query))) {
                /// Unnamed URL with a query: a tab already holds this exact query, switch to it. The
                /// URL's `color_modes` are still authoritative for it (a shared link), even on this
                /// exact match, so flag it for the re-apply below.
                activeTabId = match.id;
                url_authoritative_colors = true;
            } else if ((has_url_query && !stale_blank_reload_bare) || !url_tab_name || !stale_blank_reload) {
                /// Not found, but the URL is authoritative: it carries a non-blank query (a
                /// fresh/shared link, or a genuine unsaved edit whose tab was pruned before it
                /// reached `IndexedDB`), is unnamed, or its `?tab=` is not a stale reload echo of a
                /// just-pruned blank tab — either the reloaded history entry does not identify one
                /// of the pruned blank tabs (by its stable `tabId`), or there is no history state at
                /// all, showing this is a fresh external navigation rather than a reload (a shared
                /// bare link, even one whose name collides with a pruned blank tab). A whitespace-only
                /// hash echoing a pruned blank tab is excluded by `stale_blank_reload_bare` — it is
                /// handled by the fallback below, not treated as authoritative. Open a new tab
                /// carrying the name (if any) and query. A `stale_blank_reload` reaches here with
                /// title matching skipped (see above), so a surviving tab may already hold
                /// `url_tab_name` (a legacy duplicate-title workspace): disambiguate the recreated
                /// tab's title with `uniqueTitle` so the persisted workspace keeps unique titles and
                /// a later bare/shared `?tab=` can no longer resolve to — or overwrite — the wrong
                /// tab. When the name does not collide (the common fresh/shared-link case)
                /// `uniqueTitle` returns it unchanged, so this stays a no-op there.
                const t = makeTab(url_tab_name ? uniqueTitle(url_tab_name) : undefined, url_query);
                tabs.push(t);
                activeTabId = t.id;
                url_authoritative_colors = true;
            } else {
                /// `?tab=Name` echoing one of the blank tabs pruned above, on a reload (the history
                /// entry still describes that tab — see `stale_blank_reload`), with no query or only
                /// a blank whitespace-only one (`stale_blank_reload_bare`). This is a plain reload
                /// whose active tab was a blank scratch tab we just dropped: the URL only echoes that
                /// tab's title and its blank text, so it is NOT authoritative. Recreating it would
                /// resurrect the blank tab (and the trailing `scheduleSave` would write it back to
                /// `IndexedDB`), defeating the very pruning above. Instead fall back to the persisted
                /// active tab if it survived, otherwise the first saved tab (mirrors the plain-load
                /// branch).
                activeTabId = (loaded.meta && savedTabs.some(t => t.id === loaded.meta.activeTabId))
                    ? loaded.meta.activeTabId : savedTabs[0].id;
            }
        }
        await activateTab(activeTabId);
        activated = true;
        /// `activateTab` → `materializeResult` reset the reconciled tab's `colorModes` from its
        /// snapshot, dropping the URL's payload. When the URL is authoritative, re-apply
        /// `url_color_modes` now — before the deferred auto-run binds them to the result element.
        /// Mutate the modes object IN PLACE (rather than replacing it) so every element that
        /// aliases it — the single result element and any restored multi-query result elements —
        /// stays bound to the same object; then re-run `applyColumnColors` on each so an exact-match
        /// reconciliation (which already materialized its saved result with the saved palette)
        /// recolors with the URL's modes. A substituted/new tab has no rendered result yet, so the
        /// recolor is a no-op there and the modes just carry into its deferred auto-run.
        if (url_authoritative_colors) {
            const t = getActiveTab();
            if (t) {
                for (const k of Object.keys(t.colorModes)) delete t.colorModes[k];
                Object.assign(t.colorModes, url_color_modes);
                /// The pinned columns are persisted and shared the same way as the color modes, so a
                /// shared link is equally authoritative for them: reassert `url_pinned_columns` in
                /// place (keeping every aliasing element bound to the same object) alongside the modes.
                for (const k of Object.keys(t.pinnedColumns)) delete t.pinnedColumns[k];
                Object.assign(t.pinnedColumns, url_pinned_columns);
                const els = t.resultEl ? [t.resultEl] : [];
                if (t.multiContainer) for (const el of t.multiContainer.querySelectorAll('query-result')) els.push(el);
                for (const el of els) {
                    el._colorModes = t.colorModes; el.applyColumnColors();
                    el._pinnedColumns = t.pinnedColumns; el.applyPinnedColumns();
                }
            }
        }
    } else if (url_tab_name && ((has_url_query && !stale_blank_reload_bare) || !stale_blank_reload)) {
        /// No saved tabs survived, and the URL is authoritative: it carries a non-blank query (a
        /// fresh/shared link, or a genuine unsaved edit whose tab was pruned before it reached
        /// `IndexedDB`), or its `?tab=` is not a stale reload echo of a just-pruned blank tab (a
        /// first-ever visit, or a shared bare `?tab=Name` link — including one whose name collides
        /// with a pruned blank tab, since a fresh navigation carries no history state). A
        /// whitespace-only hash echoing a pruned blank tab is excluded by `stale_blank_reload_bare`,
        /// falling to the stale-echo branch below instead. Adopt the name for the bootstrap tab.
        const t = getActiveTab();
        if (t) {
            t.title = url_tab_name;
            /// Re-own the current browser-history entry for this recreated bootstrap tab. The entry
            /// can be stale in two ways, and only a full re-own fixes both. (1) On a
            /// `stale_blank_reload` whose non-blank hash is authoritative (a genuine unsaved edit
            /// whose tab was pruned before it reached `IndexedDB`), the reloaded `history.state` still
            /// carries the dropped blank tab's stable `tabId`, which differs from this bootstrap tab's.
            /// Restamping only `?tab=` would leave that foreign state and hash attached, so the
            /// recreated tab could never re-own the entry — a later trusted edit bails in
            /// `refreshCurrentHistoryEntry` (`cur.tabId !== tab.id`) — and a quick edit-then-reload
            /// before the debounced save would restore the stale hash/query and lose the edit. (2) When
            /// the entry does belong to this tab (a live edit before reconciliation, `bootstrap_dirty`,
            /// seeded it under the tab's PRE-rename default title `Query A`), the `?tab=`/
            /// `history.state.tabName` still carry the old title, so a reload of that entry would
            /// recreate a second tab under the old name alongside the one actually saved. Both are
            /// fixed exactly as the dirty all-blank and dirty merge branches do: drop the foreign state
            /// first (unless the ids coincide — a pruned legacy `t1` record vs. the `t1` bootstrap tab
            /// — where the entry is already this tab's to replace), then seed the entry wholesale from
            /// the tab via `refreshCurrentHistoryEntry`. The seed is deferred to the tail
            /// (`reown_adopted_entry`) so it runs AFTER the URL parameters below are reconciled into
            /// the tab, letting the rebuilt entry/URL carry the authoritative `param_*` too (seeding
            /// here would rebuild the URL from the tab's not-yet-reconciled params and drop them).
            /// `run_immediately` is untouched: a `run=1` URL takes the tail `postAll` path instead,
            /// whose own history write then owns the entry.
            if (history.state && history.state.tabId !== t.id) {
                history.replaceState(null, document.title, location.href);
            }
            reown_adopted_entry = true;
            /// Seed lastSavedQuery (= the query the URL is authoritative for) so a later reload of
            /// this same shared link is recognized as a stale reload — the URL hash equals this
            /// tab's own last-synced query — rather than a fresh external query. Without it, editing
            /// this bootstrap tab and reloading the same URL would discard the edit: the named-tab
            /// branch above would see `undefined !== url_query` and overwrite the saved query. The
            /// tail re-own (`reown_adopted_entry`) also sets `lastSavedQuery` (to the same value, since
            /// `t.query` equals `url_query` here), but do it eagerly so it holds even before that runs.
            if (has_url_query) t.lastSavedQuery = url_query;
        }
        renderTabBar();
    } else {
        /// Either a plain load with no `?tab=` at all (e.g. a first-ever visit), or a plain
        /// reload whose every saved tab was blank and got pruned above. In the latter case the
        /// URL still carries a `?tab=<dropped title>` (with no query, or only the dropped tab's own
        /// blank whitespace one) — recognized as a stale reload echo by `stale_blank_reload` (the
        /// reloaded history entry's stable `tabId` matches a blank tab this load pruned) and, when a
        /// whitespace hash is present, kept non-authoritative by `stale_blank_reload_bare` — but it
        /// is only a stale echo of a tab we just dropped and is
        /// NOT authoritative: adopting it (the branch above) would rename the fresh bootstrap tab
        /// back to the dropped blank title, and the trailing `scheduleSave` would persist it again,
        /// resurrecting the very blank tab the pruning removed. Keep the default fresh bootstrap
        /// tab, and strip the stale `?tab=` from the URL so it matches a first-ever visit (an
        /// all-blank workspace falls back to a single fresh tab). The tab bar stays hidden for the
        /// lone result-less tab, so `syncHistory` is deliberately not called here (it would re-add
        /// a `?tab=` for the default title); a targeted `replaceState` drops the `tab` key. The
        /// reloaded entry's state must go too: it still carries the dropped tab's `tabId`/`tabName`
        /// (history state survives a reload), and keeping it would make the bootstrap tab's first
        /// unrun edit bail out of `refreshCurrentHistoryEntry` (`cur.tabId !== tab.id`), never
        /// seeding the entry/URL/`lastSavedQuery` until a run or tab switch. Clear it to null —
        /// exactly the state of a first-ever visit, whose first trusted edit seeds a fresh entry
        /// owned by the bootstrap tab. When the stale echo carried a whitespace-only hash
        /// (`stale_blank_reload_bare`), the pruned tab's own blank text was decoded into the editor
        /// and the bootstrap tab's query at load (`query_area.value`, `makeTab` above) and left in
        /// the URL fragment, so stripping only `?tab=` is not enough: that blank text would stay in
        /// the hash, the editor, and the bootstrap tab, and the trailing `scheduleSave` would
        /// persist it straight back to `IndexedDB` as the sole tab — resurrecting the pruned blank
        /// tab (now nameless). Reset the bootstrap tab to a genuinely fresh empty one: drop the hash
        /// as well, and clear the editor exactly as `restoreEditor` does (blank the textarea
        /// and dispatch a synthetic 'input' event, which resyncs the syntax backdrop and parameter
        /// inputs and mirrors the empty text into the active tab's query). This matches a first-ever
        /// visit precisely, so the next reload sees a single blank tab with no `?tab=` or hash and
        /// prunes it again.
        ///
        /// This cleanup assumes the bootstrap tab still holds only the pruned tab's own blank text —
        /// true unless the user typed into it while `IndexedDB` was still opening (`bootstrap_dirty`).
        /// In that case the live tab is NEWER than the stale echo, exactly as for the merge branch
        /// above: `query_area.value = ''` below would silently wipe the live edit (and the
        /// dispatched 'input' event would fold that blank text into the tab, discarding it for good
        /// before the trailing `scheduleSave` persists it). Keep the live workspace, exactly as the
        /// dirty-startup merge above does; the tail of this function already skips URL-param
        /// reconciliation and auto-run for a dirty startup, so nothing below re-applies the stale
        /// URL over the live edit. But merely skipping the cleanup is not enough: the current
        /// entry/URL still belong to the DROPPED blank tab — the live edit could not claim them,
        /// because `refreshCurrentHistoryEntry` bails on another tab's entry — while what gets
        /// persisted is the live tab under its own id/title. On the NEXT reload nothing is pruned
        /// (the live tab holds a real query), so `stale_blank_reload` no longer recognizes the
        /// leftover `?tab=`/`history.state` as stale, the named-URL path treats them as
        /// authoritative, and a fresh blank tab under the dropped name is recreated alongside the
        /// persisted live one. So re-own the entry for the live active tab instead: drop the
        /// foreign state first (unless the ids happen to coincide — a pruned legacy `t1` record vs.
        /// the `t1` bootstrap tab — where the entry is already the live tab's to replace), then
        /// seed it exactly as a first trusted edit on a first-ever visit would, via the same
        /// `refreshCurrentHistoryEntry` — which rebuilds the URL, `history.state` and
        /// `lastSavedQuery` wholesale from the live tab, dropping the stale `?tab=`, `run=1` and
        /// hash along the way (`run_immediately` was already cleared above, so the rebuilt URL
        /// cannot re-stamp `run=1` either).
        if (url_tab_name) {
            if (bootstrap_dirty) {
                const live = getActiveTab();
                if (live) {
                    if (history.state && history.state.tabId !== live.id) {
                        history.replaceState(null, document.title, location.href);
                    }
                    refreshCurrentHistoryEntry(live);
                }
            } else {
                const cleaned_url = new URL(location.href);
                cleaned_url.searchParams.delete('tab');
                /// Drop the stale `run=1` too (`run_immediately` was likewise cleared above): it was
                /// the pruned blank tab's directive, and leaving it in the persisted URL would
                /// auto-run the fresh bootstrap tab on the next reload (the no-hash case takes the
                /// synchronous bottom-of-script `postAll`, so this replaceState is what stops it
                /// recurring).
                cleaned_url.searchParams.delete('run');
                if (stale_blank_reload_bare) {
                    cleaned_url.hash = '';
                    query_area.value = '';
                    query_area.dispatchEvent(new Event('input'));
                }
                history.replaceState(null, document.title, cleaned_url.href);
            }
        }
        renderTabBar();
    }

    /// Rebuild the active query's parameters from the URL for ANY URL carrying a query (not
    /// only run=1): activateTab above restored the saved tab's params, but when the URL is
    /// authoritative its parameter list must REPLACE them, not merely overlay the values it
    /// happens to carry. Otherwise a shared `?tab=Name#<query>` URL with no `param_x` would
    /// inherit the matched tab's stale `param_x` and auto-run with it. So each placeholder
    /// detected in the query takes its URL value when present and is cleared to empty (its
    /// default) when absent. Skipped on a stale reload, where the saved params are newer, and on a
    /// blank stale-reload echo (`stale_blank_reload_bare`), whose whitespace hash is not
    /// authoritative and must not overwrite the surviving/bootstrap tab's own parameters.
    /// Done after reconciliation so it targets the reconciled active tab; the auto-run itself
    /// is still gated on run=1 below. Also skipped when the user already edited the bootstrap
    /// workspace during the load window (`bootstrap_dirty`): their live params are newer and
    /// must not be replaced by the URL's.
    if (url_query && !stale_blank_reload_bare && !preserve_local_query && !bootstrap_dirty) {
        const params_ok = await updateQueryParams();
        /// The tokenization above is another await: a real edit during it makes the live params
        /// newer than the URL's, so re-check the flag and yield to the user rather than overwriting.
        if (bootstrap_dirty) {
            /// user is editing; leave their live params in place
        } else if (params_ok) {
            const urlParamValues = {};
            for (const param of currentQueryParams) {
                const value = current_url.searchParams.get('param_' + param.name);
                urlParamValues[param.name] = value !== null ? value : '';
            }
            setParamValues(urlParamValues);
            const tab = getActiveTab();
            if (tab) tab.params = getParamValues();
        } else {
            /// The URL query could not be tokenized, so `currentQueryParams` may describe a
            /// different query; rebuilding from it would attach the wrong placeholder names to
            /// the reconciled tab (and auto-run with them). Clear the stale inputs/list and leave
            /// the tab's own reconciled params in place rather than deriving bogus ones.
            queryParamsContainer.innerHTML = '';
            currentQueryParams = [];
        }
    }

    /// Auto-run only when the URL is still authoritative. On a stale reload
    /// (`preserve_local_query`), the persisted local edit is newer than the URL and was never
    /// run by the user, so the stale `run=1` must not execute it; just sync the restored tab
    /// into the URL instead (with the `run=1` directive already dropped above). Likewise on a
    /// blank stale-reload echo (`stale_blank_reload_bare`): the URL is a stale echo of a pruned
    /// blank tab, so its `run=1` must not auto-run whatever query the fallback tab restored. Any
    /// trusted action during the startup window that made `writeHistoryEntry` drop `run=1` from the
    /// live entry — a database selection, a connection edit, a query/param edit, a tab switch — also
    /// cancels the run (`deferred_run_cancelled`): running anyway would execute the shared query
    /// against a target or edit the live URL no longer requests it for.
    if (defer_run_for_reconcile && !deferred_run_cancelled && !stale_blank_reload_bare && query_area.value && !preserve_local_query && !bootstrap_dirty) {
        postAll();   /// saves history itself on completion
    } else if (activated) {
        syncHistory();   /// reflect the restored active tab in the URL (replaceState)
    } else if (reown_adopted_entry) {
        /// The no-saved-tabs adopt branch recreated the bootstrap tab for an authoritative URL. Re-own
        /// the current entry for it now, after the URL parameters above have been reconciled into the
        /// tab, so the rebuilt URL/`history.state`/hash reflect the adopted title, query AND params.
        /// The foreign state (if any) was already dropped in that branch, so `refreshCurrentHistoryEntry`
        /// seeds the entry in place rather than bailing on another tab's entry. A `run=1` URL took the
        /// `postAll` path above instead, whose `saveHistory` owns the entry itself.
        refreshCurrentHistoryEntry(getActiveTab());
    }
    scheduleSave();
    /// Reconciliation has fully finished: any later edit is ordinary post-bootstrap interaction,
    /// so stop recording it as bootstrap-dirty. (`postAll` above is fire-and-forget and never
    /// marks the flag itself, so closing it here does not affect the deferred auto-run.)
    bootstrap_settled = true;
}

/// Render the syntax highlighting and parameter inputs for the URL query on page load.
/// `query_area.value` is populated only from a `#<query>` hash, so reaching this branch means
/// the URL carries a query (`has_url_query`). In that case `reconcileStartup` below is the
/// SOLE owner of URL parameter restoration and the auto-run: it reconciles the URL against the
/// IndexedDB workspace first and, on a stale reload, deliberately preserves a newer saved tab
/// (`preserve_local_query`) and drops the stale `run=1`. Applying the URL `param_*` values or
/// auto-running here as well would race that reconciliation: this callback resumes after
/// tokenization, which can land after `activateTab` has restored the preserved tab, overwriting
/// its params with stale URL values that the scheduled `persist` would then save. So only
/// refresh the editor here and let reconciliation apply the parameters and trigger the run.
if (query_area.value)
{
    resizeQueryAreaIfSlightlyOverflowing();
    updateQueryParams();
}
/// No top-level auto-run: every startup `run=1` is deferred to `reconcileStartup` (see
/// `defer_run_for_reconcile`). Running it here would fire before the workspace is reconciled —
/// in the wrong (bootstrap) tab, and, for a bare `?tab=<blank>&run=1` reload, early enough to
/// overwrite the `history.state` that `stale_blank_reload` relies on and resurrect the blank tab.

dbReady = openDb();
reconcileStartup();

/// Make the icon "buttons" (copy, download) and the theme switcher reachable and
/// operable from the keyboard: Tab focuses them, Enter/Space activates them.
/// (Real <button> elements like Run already get this for free.)
function makeButtonLike(elem, action)
{

}

// Copy raw result to clipboard
document.getElementById('copy-div').addEventListener('click', function() {
    let text = resultEl.rawText;
    if (!text) return;

    let button = this;
    let showBalloon = function(message) {
        let balloon = document.createElement('span');
        balloon.className = 'copy-balloon';
        balloon.textContent = message;
        button.appendChild(balloon);
        balloon.addEventListener('animationend', () => balloon.remove());
    };

});

// Download functionality
let last_query_for_download = '';
let last_params_for_download = {};
/// The default database that produced the downloadable result (snapshotted at run time and on
/// restore), so Download stays tied to the displayed result even if the panel selection changes.
let last_database_for_download = '';
/// The server address and user that produced the downloadable result, snapshotted alongside the
/// query/params/database (at run time and on history restore) so Download reproduces the shown
/// result against the connection that produced it, not the current live connection: after running
/// on one server and then switching the connection — or navigating Back to an entry produced on
/// another server while the live connection stays elsewhere — Download would otherwise re-run the
/// query on the live server and could export different data than the result on screen. The
/// password is intentionally not snapshotted (it must never be stored in browser history); the
/// live password is used, so a mismatched connection surfaces as a visible authentication error
/// rather than silently exporting data from the wrong server.
let last_url_for_download = '';
let last_user_for_download = '';

// Toggle download dropdown
document.getElementById('download-div').addEventListener('click', function(e) {
    e.stopPropagation();
    const dropdown = document.getElementById('download-dropdown');
    const button = document.getElementById('download-div');
    const context = document.getElementById('main');

    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
    } else {
        // Position the dropdown relative to the button
        dropdown.classList.add('show');
        const button_rect = button.getBoundingClientRect();
        const context_rect = context.getBoundingClientRect();
        const dropdown_rect = dropdown.getBoundingClientRect();

        dropdown.style.top = (button_rect.top - context_rect.top) + 'px';
        dropdown.style.left = (button_rect.left - context_rect.left + button_rect.width - dropdown_rect.width) + 'px';

        // Move focus into the menu so keyboard users land on the format selection.
        document.getElementById('download-format').focus();
    }
});

// Prevent dropdown from closing when clicking inside it
document.getElementById('download-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});

// Close dropdown when clicking outside
document.addEventListener('click', function() {
    const dropdown = document.getElementById('download-dropdown');
    dropdown.classList.remove('show');
});

/// Keep the open download menu contiguous with the download button in the tab
/// order. The dropdown lives at the end of the DOM (so it is positioned without
/// being clipped), so without this its controls would otherwise land at the very
/// end of the tab sequence. Tab/Shift+Tab flow:
///   download button -> format select -> [other format] -> Download button
/// and leaving either end closes the menu. Escape also closes it.
function downloadTabSequence() {
    const seq = [document.getElementById('download-div'), document.getElementById('download-format')];
    const other = document.getElementById('download-format-other');
    if (other.classList.contains('show')) seq.push(other);
    seq.push(document.getElementById('download-button'));
    return seq;
}

document.getElementById('main').addEventListener('keydown', e => {
    const dropdown = document.getElementById('download-dropdown');
    if (!dropdown.classList.contains('show')) return;

    if (e.key === 'Escape') {
        e.preventDefault();
        dropdown.classList.remove('show');
        document.getElementById('download-div').focus();
        return;
    }

    if (e.key !== 'Tab') return;

    const seq = downloadTabSequence();
    const idx = seq.indexOf(document.activeElement);
    if (idx < 0) return;

    if (!e.shiftKey) {
        if (idx < seq.length - 1) {
            e.preventDefault();
            seq[idx + 1].focus();
        } else {
            /// Past the last item: close the menu and continue to the next toolbar control.
            dropdown.classList.remove('show');
            e.preventDefault();
            document.getElementById('theme').focus();
        }
    } else {
        if (idx > 0) {
            e.preventDefault();
            seq[idx - 1].focus();
        } else {
            /// Before the download button: close the menu and let focus move naturally.
            dropdown.classList.remove('show');
        }
    }
});
