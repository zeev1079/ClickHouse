    /// Refresh the `href` before navigation so an open uses the current server URL and user. `#user` is a
    /// browser-autofillable credential field, and autofilling a saved login does not always fire `input`,
    /// which would otherwise leave `docs_icon.href` stale. `pointerdown` fires before the middle-button
    /// `auxclick` navigation (which produces no `click`), while `click` also covers keyboard activation
    /// (tab to the link, then Enter) where no pointer event fires at all. Together they refresh the `href`
    /// on every navigation path, matching how the Web Terminal link refreshes its `href`.
    docs_icon.addEventListener('pointerdown', updateDocsURL);
    docs_icon.addEventListener('click', updateDocsURL);
    updateDocsURL();
}

/// `quiet` runs a background panel-maintenance query without touching the main result pane:
/// a failure must not wipe the current result and replace it with this query's error, and a
/// success must not clear an error the user's own query left on screen. It is used for the
/// automatic database-restore loads that fire merely because the panel was reopened; explicit
/// panel actions keep reporting their errors in the result pane as before.
///
/// `generation` is the `connectionGeneration` captured by the caller before the request was
/// started. Even a non-quiet request may finish after the connection settings changed (which
/// bumps `connectionGeneration`); reporting its result would then clear or overwrite the main
/// result pane with a response from the previous connection, so the result-pane side effects are
/// skipped once the generation no longer matches. Pass `null` for requests that are not
/// connection-scoped and should always report.
/// `quiet` suppresses touching the shared result pane (used by background panel-maintenance
/// queries). `on_error`, when provided, still receives the real server error text in that case,
/// so a quiet caller can surface actionable diagnostics in its own inline UI instead of dropping
/// them - a quiet query hides the error from the result pane, not from the user.
async function auxiliaryQuery(server_address, user, password, query, url_params = '', quiet = false, generation = null, on_error = null) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON' + url_params;
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);

    /// Whether this request still belongs to the active connection. Re-evaluated after the
    /// `await` (not captured up front) because the connection can change while the fetch is in
    /// flight; a stale request must not touch the shared result pane.
    const belongs_to_active_connection = () => generation === null || generation === connectionGeneration;

    let response;
    try {
        response = await fetch(url, { method: "POST", body: query, headers: { 'Authorization': 'never' } });
    } catch (e) {
        if (!quiet && belongs_to_active_connection()) {
            clear();
            resultEl.renderError("Network error");
            logoEl.style.display = 'none';
        }
        if (on_error) on_error("Network error");
        return false;
    }
    if (!response.ok) {
        let error_text = await response.text();
        if (!quiet && belongs_to_active_connection()) {
            clear();
            resultEl.renderError(error_text);
            logoEl.style.display = 'none';
        }
        if (on_error) on_error(error_text);
        return false;
    }
    if (!quiet && belongs_to_active_connection()) {
        resultEl.clearError();
        logoEl.style.display = 'block';
    }
    return await response.json();
}

async function getServerStatus(server_address, user, password) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSONEachRow';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    try {
        let response = await fetch(url, { method: "POST", body: "SELECT version() AS v, uptime() AS t", headers: { 'Authorization': 'never' } });
        if (!response.ok) return false;
        json = await response.json();
        return json;
    } catch (e) {
        return false;
    }
}

/// Names of databases that the user has expanded. Persisted across panel
/// open/close so that reopening the panel restores the previously expanded
/// databases (those that still exist).
let opened_databases = new Set();

/// The database the user selected in the database panel. When set, it is passed as the
/// default database (`&database=`) for queries run from the editor, so unqualified table
/// names resolve against it. It is cleared when the connection identity changes (see
/// `resetConnectionScopedState`), since it refers to a database on the previous connection; a
/// connection-field edit that does not change the semantic identity — a cosmetic URL normalization
/// or a password-only change — keeps it.
/// The selection is committed synchronously on the panel click by `commitSelectedDatabase` (not
/// after the table list finishes loading), so a `Run` issued before the load returns already
/// targets it. It is a connection-scoped setting (like the server address and user), so it is
/// seeded from the URL and serialized back into every history URL by `buildHistoryParams`: a
/// shared or reloaded link — including an auto-run `run=1` link — then resolves unqualified names
/// against the same database, instead of silently falling back to the server default. On a
/// Back/Forward step, `window.onpopstate` restores it from the navigated URL — but only when that
/// entry belongs to the current connection (server/user), since the connection itself is global
/// and is not restored by history navigation; a cross-connection entry's database is left alone
/// rather than imported into the live connection.
let selected_database = current_url.searchParams.get('database');

/// The (server, user) connection the page loaded with, captured after the startup block above
/// seeded the connection fields from the URL and before any user edit. While no history entry
/// with an authoritative connection stamp exists — the bootstrap window before the first history
/// write, or a reload whose surviving `history.state` was written by a play.html predating the
/// stamp — `resetConnectionScopedState` compares against it to decide whether a trusted connection
/// edit must cancel a deferred startup auto-run (`defer_run_for_reconcile`), which is armed against
/// this loaded connection. Once a stamped entry exists, that entry's own
/// `connectionServer`/`connectionUser` stamp is authoritative.
const initial_connection = {server: url_elem.value, user: user_elem.value};

/// The (server, user) connection the current `selected_database` belongs to.
/// `resetConnectionScopedState` compares the live connection against this — via the same
/// `sameServerAddress` / `effectiveConnectionUser` identity the `window.onpopstate` restore gate
/// uses — so an edit to a connection field that does not change the semantic identity keeps the
/// selection instead of silently dropping it (and retargeting the next unqualified `Run` to the
/// server default). It is refreshed wherever `selected_database` is set: here from the URL at load,
/// on a panel click (`commitSelectedDatabase`), and on a Back/Forward restore (`window.onpopstate`).
/// Null when nothing is selected.
let selected_database_connection = null;

/// Record (or clear, when nothing is selected) the connection `selected_database` belongs to. The
/// connection fields are read live: `url_elem`/`user_elem` are already seeded from the URL by the
/// startup block above, so the initial call below captures the connection the URL's `database=`
/// was chosen for.
function stampSelectedDatabaseConnection() {
    selected_database_connection = selected_database === null
        ? null
        : {server: url_elem.value, user: user_elem.value};
}
stampSelectedDatabaseConnection();

/// The server's current database (`currentDatabase()`), recorded while building the database
/// panel. The highlight falls back to it when nothing is selected (e.g. after a history
/// navigation to an entry that carried no `database=`), without re-querying `system.databases`.
let server_current_database = null;

let load_databases_request_num = 0;
async function loadDatabases(server_address, user, password) {
    ++load_databases_request_num;
    const current_load_databases_request_num = load_databases_request_num;
    /// The connection settings (url/user/password) can change while this `system.databases`
    /// query is in flight; `resetConnectionScopedState` then bumps `connectionGeneration`.
    /// Capture it now so a response for the previous connection is discarded instead of
    /// filling the panel with the old server's databases and opening it: every row handler
    /// created below closes over this connection, so a stale result would keep querying the
    /// old server until the panel is closed and reopened.
    const generation = connectionGeneration;

    let json = await auxiliaryQuery(server_address, user, password,
        `SELECT database, database = currentDatabase() AS current
            FROM system.databases WHERE database != 'INFORMATION_SCHEMA'
            ORDER BY
                database = 'information_schema',
                database = 'system',
                database != 'default',
                database`,
        '', false, generation);
    if (!json) return false;

    if (current_load_databases_request_num != load_databases_request_num) return false;
    if (generation !== connectionGeneration) return false;

    let databases_elem = document.getElementById('databases');
    while (databases_elem.firstChild) databases_elem.removeChild(databases_elem.firstChild);

    // Use natural order for database names
    json.data.sort((a, b) => {
        // Maintain original order for default, system, information_schema
        const getPriority = (name) => {
            switch (name) {
                case 'default': return 0;
                case 'system': return 2;
                case 'information_schema': return 3
                default: return 1;
            }
        }

        return getPriority(a.database) - getPriority(b.database)
            || a.database.localeCompare(b.database, undefined, { numeric: true });
    });

    /// Record the server's current database so the highlight can fall back to it (see
    /// `applySelectedDatabaseHighlight`) without re-querying `system.databases`.
    server_current_database = (json.data.find(e => e.current) || {}).database ?? null;

    for (let elem of json.data) {
        let database = document.createElement('div');
        database.className = 'database';
        let database_link = document.createElement('button');
        /// The database name is stamped as a data attribute (not read back from the button text,
        /// which also carries the table-count badge) so `applySelectedDatabaseHighlight` can move
        /// the `.current` class between rows without rebuilding the list.
        database_link.dataset.database = elem.database;
        database_link.append(elem.database);
        database.appendChild(database_link);
        let tables = document.createElement('div');
        tables.className = 'tables';
        database.appendChild(tables);
        databases_elem.appendChild(database);

        /// Refresh button shown to the right of the database name while it is open.
        /// Clicking it reloads the list of tables without collapsing the database.
        let refresh_button = document.createElement('button');
        refresh_button.className = 'database-refresh';
        refresh_button.type = 'button';
        refresh_button.title = 'Refresh the list of tables';
        refresh_button.textContent = '\u21BB';

        /// A per-row generation counter, bumped on every (re)load and on collapse. An in-flight
        /// load captures the current value and, once its query returns, checks whether the row's
        /// state changed in the meantime (it was collapsed, a newer load superseded it, or the
        /// whole panel was closed) so it can bail out before mutating the DOM. This invariant is
        /// local to one database row, complementing the per-container token in `loadTables`.
        let row_load_generation = 0;

        /// Reload the tables of this database, showing the hourglass (and hiding the refresh
        /// button) while loading. `set_current` commits this database as the editor's selected
        /// database (a manual open of a collapsed row); a refresh or a restore of the previously
        /// expanded state passes false, so merely reloading a row's table list never silently
        /// retargets editor queries to it. `quiet` (defaulting to a background restore, i.e.
        /// `!set_current`) suppresses surfacing the load's error in the main result pane; an
        /// explicit refresh overrides it to keep surfacing errors as before.
        const refreshTables = (set_current = true, quiet = !set_current) => {
            const generation = ++row_load_generation;
            /// A load stays relevant only while its generation is still the latest for this row
            /// and the row is still attached to the document. Closing the whole database panel
            /// (or reloading the database list) detaches the row without bumping the generation,
            /// so the `isConnected` check is what makes such a stale load drop quietly instead of
            /// dereferencing a now-detached parent when its query returns.
            const is_current = () => generation == row_load_generation && database.isConnected;
            refresh_button.style.visibility = 'hidden';
            let hourglass = document.createElement('span');
            hourglass.className = 'loading-hourglass';
            hourglass.textContent = '\u29D7';
            database_link.after(hourglass);
            return loadTables(server_address, user, password, elem.database, database, set_current, is_current, quiet).then(ok => {
                hourglass.remove();
                /// Only restore the button while this load is still the current one for the row;
                /// otherwise the row was collapsed (the button is detached) or a newer refresh owns it.
                if (is_current()) refresh_button.style.visibility = '';
                return ok;
            });
        };

        refresh_button.addEventListener('click', e => {
            e.stopPropagation();
            /// A refresh reloads this row's table list only. It must not commit the selection
            /// (`set_current = false`), so refreshing an already-open database never silently
            /// retargets the editor's default database to it; but it still surfaces its errors
            /// (`quiet = false`), since it is an explicit user action, not a background restore.
            if (database.dataset['opened']) refreshTables(false, false);
        });

        /// Open a collapsed database, or restore a previously expanded one on panel reopen.
        /// The database is remembered for the next restore synchronously, as soon as the open
        /// starts, rather than after the `system.tables` load succeeds: otherwise closing the
        /// whole panel while the load is still in flight detaches the row, `loadTables` bails out
        /// through its `isConnected` check, and the user's just-performed open would be forgotten,
        /// so reopening the panel would show it collapsed. Once the load settles, the set is
        /// reconciled with the row's actual state (see below): a brand-new open that failed is
        /// rolled back so a database that never actually expanded is not auto-retried on every
        /// panel reopen, but a database that was already remembered before this open began is
        /// kept, so a transient restore failure does not forget a previously expanded database.
        /// The entry is otherwise removed only on an explicit collapse or a connection change
        /// (`resetConnectionScopedState`, which also clears the set and closes the panel, so a
        /// stale load can no longer resurrect it). On success the row is marked open and the
        /// refresh button is attached. Restoring passes set_current = false so the highlight is
        /// left alone.
        const openDatabase = (set_current = true) => {
            const was_remembered = opened_databases.has(elem.database);
            opened_databases.add(elem.database);
            return refreshTables(set_current).then(ok => {
                if (ok !== false) {
                    database.dataset['opened'] = 1;
                    database_link.after(refresh_button);
                }
                /// Reconcile the restore set with what is actually on screen while the row is
                /// still attached: a genuine success (re-)adds it even if a superseded sibling
                /// load of the same row rolled it back just before. A failed open never expanded
                /// the row, so it is dropped to avoid auto-retrying it on the next panel reopen —
                /// but only if it was not already remembered when this open began: a restore (or
                /// a re-open) of a previously expanded database must survive a transient failure,
                /// otherwise one failed restore would forget a database the user never collapsed.
                /// A panel close instead detaches the row (`isConnected === false`), leaving a
                /// just-performed open in the set so it is still restored on reopen.
                if (database.isConnected) {
                    if (database.dataset['opened']) opened_databases.add(elem.database);
                    else if (!was_remembered) opened_databases.delete(elem.database);
                }
                return ok;
            });
        };

        database_link.addEventListener('click', e => {
            if (!database.dataset['opened']) {
                openDatabase();
            } else {
                /// Collapse: invalidate any in-flight refresh so its late result cannot
                /// repopulate the table list of this now-closed row.
                ++row_load_generation;
                delete database.dataset['opened'];
                opened_databases.delete(elem.database);
                refresh_button.remove();
                while (tables.firstChild) tables.removeChild(tables.firstChild);
                let count_elem = database_link.querySelector('.database-table-count');
                if (count_elem) count_elem.remove();
            }
        });

        /// Restore the expanded state from before the panel was last closed,
        /// without moving the current-database highlight.
        if (opened_databases.has(elem.database)) {
            openDatabase(false);
        }
    }

    /// The selected database survives closing and reopening the panel (it is only cleared on a
    /// connection change) and can be seeded from the URL, but the reopen path never re-runs a
    /// `set_current` load, so the highlight would otherwise snap back to `currentDatabase()` and
    /// the panel would show a different database than the one unqualified names actually resolve
    /// against. Highlight the selected database (or fall back to the server's current one).
    applySelectedDatabaseHighlight();
}

/// Move the `.current` highlight of the database panel to `selected_database` (or, when nothing
/// is selected or the selection no longer exists, to the server's current database), without
/// reloading the list. Used both while building the list in `loadDatabases` and after a history
/// navigation changes `selected_database`, so the open panel always shows the database that the
/// next run and unqualified names actually resolve against. A no-op when the panel is empty.
function applySelectedDatabaseHighlight() {
    const databases_elem = document.getElementById('databases');
    if (!databases_elem) return;
    const buttons = databases_elem.querySelectorAll('button[data-database]');
    const has_selected = selected_database
        && Array.from(buttons).some(b => b.dataset.database === selected_database);
    /// When a database is explicitly selected, highlight it only while it is actually present in
    /// the list, and otherwise highlight nothing: falling back to the server's current database
    /// would make the panel claim one database while `postSingle`/`postMulti` still run against
    /// the (still-set) selection — a stale panel relative to a navigated `database=`, or a
    /// selection that has since disappeared from `system.databases`, would then lie about the next
    /// run. The `null` target matches no row, so nothing is highlighted until an authoritative
    /// reload brings the row back or the selection is cleared (on a connection change). Only fall
    /// back to the server default when nothing is selected at all.
    const target = selected_database ? (has_selected ? selected_database : null) : server_current_database;
    for (const button of buttons) {
        button.classList.toggle('current', button.dataset.database === target);
    }
}

/// Canonicalize a database designation to the effective target it denotes on the live connection:
/// an absent/empty value means "the server's default database" and is represented as `null`, and an
/// explicit name equal to the server's current database denotes that same target — both run the
/// query against the same database — so it collapses to `null` too. A database value can carry the
/// explicit spelling of the current database even though `commitSelectedDatabase` only ever assigns
/// the canonical form: the live selection is seeded verbatim from a shared/restored `?database=` URL
/// (at load and in `window.onpopstate`), `commitSelectedDatabase` preserves that raw spelling on a
/// no-op re-click (it returns early without canonicalizing), and a run snapshot (`tab.result.database`)
/// keeps whatever the selection was at run time — so the `run=1` divergence checks
/// (`writeHistoryEntry`, `tabReflectsRun`) must
/// compare BOTH sides through this canonical form, or a semantically no-op interaction (clicking the
/// already-highlighted current row) would make `null` look different from the snapshot's explicit
/// spelling and spuriously drop `run=1` from a still-reproducible entry.
/// `server_current_database` is `null` until the database list has loaded for the live connection;
/// while it is unknown an explicit value is kept rather than risking a false collapse (fail safe —
/// two spellings then compare raw, never two different databases comparing equal).
function effectiveDatabase(database) {
    const value = database || null;
    return (server_current_database !== null && value === server_current_database) ? null : value;
}

/// Commit a database selection made in the panel: record it as the default database for editor
/// queries (`selected_database`), move the panel highlight to it, and fold it into the current
/// browser-history entry so a reload or shared link carries the new `database=` (and drops `run=1`
/// once the selection no longer matches the database that produced the shown result — see
/// `tabReflectsRun`). Called synchronously on the trusted panel click — before the table list is
/// even requested — so a `Run` issued before the load returns already targets the just-clicked
/// database, and so switching databases restamps the entry the same way a query or parameter edit
/// does (`refreshCurrentHistoryEntry`) instead of leaving a stale `database=`/`run=1` in the URL.
///
/// A semantic no-op — clicking a database that resolves to the same effective target already
/// selected, whether that target is held as `null` (nothing selected) or as an explicit
/// `?database=<current>` spelling seeded verbatim from the URL — returns early WITHOUT touching
/// `selected_database`: it must neither rewrite the current history entry nor canonicalize the live
/// selection.
///   - Not rewriting the entry: on a fresh `?run=1&database=<selected>#...` bootstrap load the tab
///     still has no result, so the rewrite below would drop `run=1` and — via `writeHistoryEntry` —
///     set `deferred_run_cancelled`, cancelling the deferred startup auto-run even though the target
///     database is unchanged, so the shared query would never run.
///   - Keeping the raw `selected_database`: collapsing an explicit `?database=<current>` spelling to
///     `null` here would later, once a same-identity connection edit (a password change, or
///     `http://h:8123` -> `http://h:8123/`) clears `server_current_database` in
///     `resetConnectionScopedState`, make `effectiveDatabase(selected_database)` (now `null`) differ
///     from the run snapshot's still-explicit `effectiveDatabase(tab.result.database)` — so
///     `tabReflectsRun`/`writeHistoryEntry` would spuriously drop `run=1` and `database=` from a
///     still-reproducible entry on the next history sync (e.g. a tab switch).
///
/// On a genuine change the selection is stored in canonical effective form (`effectiveDatabase`):
/// selecting the server's already-current database while a different one was selected is identical
/// to leaving the selection unset, so it collapses back to `null`.
function commitSelectedDatabase(database) {
    const new_selection = effectiveDatabase(database);
    /// Whether the click actually changes the effective target database. Both sides are compared in
    /// canonical form (`effectiveDatabase`) so that re-selecting the already-current database —
    /// whether it is held as `null` (nothing selected) or as its explicit spelling seeded verbatim
    /// from a `?database=` URL — is recognized as a no-op rather than a change. On a no-op nothing
    /// below runs, so the live `selected_database` keeps its raw spelling (see the header comment).
    const selection_changed = new_selection !== effectiveDatabase(selected_database);
    if (!selection_changed) return;
    selected_database = new_selection;
    stampSelectedDatabaseConnection();
    applySelectedDatabaseHighlight();
    captureActiveTab();
    /// The entry rewrite below drops `run=1` while the bootstrap tab has no result yet, which
    /// itself cancels a still-deferred startup auto-run (see `deferred_run_cancelled` and
    /// `writeHistoryEntry`) — firing it anyway would execute the shared query against a database
    /// the link never asked for.
    refreshCurrentHistoryEntry(getActiveTab());
}

function makeSVG(viewBox, ...paths)
{
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', viewBox);
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    svg.classList.add('table-icon');
    for (const d of paths)
    {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        svg.appendChild(path);
    }
    return svg;
}

function getTableIcon(engine)
{
    const e = engine.replace(/^Replicated|^Shared/, '');

    /// Aggregating/Summing - sigma
    if (/^(Summing|Aggregating)MergeTree/.test(e))
    {
        const svg = makeSVG('0 0 24 24',
            'M18 4 H6',     // top bar
            'M6 4 L16 12',  // upper diagonal
            'M16 12 L6 20', // lower diagonal
            'M6 20 H18'     // bottom bar
        );
        return svg;
    }

    /// Memory - microchip
    if (e === 'Memory')
    {
        const svg = makeSVG('0 0 24 24',
            'M6 6 h12 v12 h-12 z',  // chip body
            'M9 6 v-2', 'M12 6 v-2', 'M15 6 v-2',    // top pins
            'M9 18 v2', 'M12 18 v2', 'M15 18 v2',     // bottom pins
            'M6 10 h-2', 'M6 14 h-2',                  // left pins
            'M18 10 h2', 'M18 14 h2'                   // right pins
        );
        return svg;
    }

    /// View - eye
    if (e === 'View')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 12 C5 5, 19 5, 23 12 C19 19, 5 19, 1 12 Z',  // eye outline
            'M12 9 a3 3 0 1 0 0 6 a3 3 0 1 0 0 -6'             // pupil
        );
        return svg;
    }

    /// MaterializedView - eye over table
    if (e === 'MaterializedView')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 8 C5 2, 19 2, 23 8 C19 14, 5 14, 1 8 Z',  // eye
            'M12 5.5 a2.5 2.5 0 1 0 0 5 a2.5 2.5 0 1 0 0 -5', // pupil
            'M4 17 h16', 'M4 21 h16'                        // table lines
        );
        return svg;
    }

    /// Merge - three overlaid tables
    if (e === 'Merge')
    {
        const svg = makeSVG('0 0 24 24',
            'M8 8 h14 v14 h-14 z', 'M8 12 h14',     // back table (bottom-right)
            'M5 5 h14 v14 h-14 z', 'M5 9 h14',      // middle table
            'M2 2 h14 v14 h-14 z', 'M2 6 h14'       // front table (top-left)
        );
        svg.setAttribute('fill', 'var(--element-background-color)');
        return svg;
    }

    /// Distributed - fanout
    if (e === 'Distributed')
    {
        const svg = makeSVG('0 0 24 24',
            'M2 9.5 h6 v5 h-6 z',     // source box
            'M16 1 h6 v5 h-6 z',      // target top
            'M16 9.5 h6 v5 h-6 z',    // target middle
            'M16 18 h6 v5 h-6 z',     // target bottom
            'M8 12 L16 3.5',          // arrow top
            'M8 12 L16 12',           // arrow middle
            'M8 12 L16 20.5'          // arrow bottom
        );
        return svg;
    }

    /// StorageProxy - arrow between two boxes
    if (e === 'Proxy')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 7 h6 v10 h-6 z',    // left box
            'M17 7 h6 v10 h-6 z',   // right box
            'M7 12 h10',            // arrow line
            'M14 9 l3 3 l-3 3'     // arrowhead
        );
        return svg;
    }

    /// Default MergeTree family - table
    const svg = makeSVG('0 0 24 24',
        'M3 4 h18 v16 h-18 z',  // border
        'M3 9 h18',             // header line
        'M3 14 h18',            // middle line
        'M10 9 v11'             // column divider
    );
    return svg;
}

/// Set the query editor to `value` (or run it, if it already holds exactly that query - i.e. on
/// a second click, or open it in a new Web UI tab on a new-tab gesture), then scroll the editor
/// into view. Shared by the table rows and the column rows. Stops the click so it does not
/// bubble to an enclosing row's handler.
function setQueryOrRun(e, value) {
    if (isMac && e.button !== 1 && e.ctrlKey) {
        /// On macOS `Ctrl+Click` is the secondary (context-menu) click, not a query
        /// activation or new-tab gesture. Leave it entirely to the browser (so the native
        /// context menu can appear) and never activate, replace, or run the query - not
        /// even the second-click `postOne` path below. The macOS new-tab modifier is Cmd
        /// (`metaKey`), handled in the new-tab branch. A middle click (button 1) is a
        /// genuine new-tab gesture even with Ctrl held, so it is excluded here.
        return;
    }
    if (query_area.value == value) {
        /// A second click on an already-loaded query runs it - regardless of whether it
        /// was a plain, middle, or modifier click (opening yet another identical tab
        /// would be pointless).
        postOne();
    } else if (e.button === 1 || e.shiftKey || (isMac ? e.metaKey : e.ctrlKey)) {
        /// Middle click, Shift+click, or the platform's new-tab modifier click (Cmd on
        /// macOS, Ctrl elsewhere) - the gestures that open a link in a new tab - open the
        /// query in a new Web UI tab instead of replacing the current one. Only a genuine
        /// middle click (button 1) needs the X11 PRIMARY paste guard.
        openQueryInNewTab(value, e.button === 1);
    } else {
        query_area.value = value;
        query_area.dispatchEvent(new Event('input'));
    }
    /// #main is the scroll container (overflow: auto), so scroll it to bring the query area into view.
    document.getElementById('main').scrollTo(0, 0);
    e.stopPropagation();
}

/// Every data-type icon is an SVG in the same 24x24 viewBox, so they all render at exactly the
/// same dimensions - whether the glyph is a line drawing (Date/DateTime) or a short text label
/// (`09`, `Aa`, `[]`, `{}`, `(,)`, `T`).
function makeColumnSVG() {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.classList.add('column-type-icon');
    return svg;
}

/// A line-drawing data-type icon (no fill, stroked with the current text color).
function makeColumnIcon(...paths) {
    const svg = makeColumnSVG();
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    for (const d of paths)
    {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        svg.appendChild(path);
    }
    return svg;
}

/// A short text label rendered as an SVG glyph, centered in the same box as the line icons.
/// `textLength` pins every label to the same width so 1-, 2- and 3-character labels line up.
function makeColumnBadge(text) {
    const svg = makeColumnSVG();
    svg.classList.add('column-type-badge');
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', '12');
    t.setAttribute('y', '12.5');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('fill', 'currentColor');
    t.setAttribute('textLength', text.length > 1 ? '17' : '9');
    t.setAttribute('lengthAdjust', 'spacingAndGlyphs');
    t.textContent = text;
    svg.appendChild(t);
    return svg;
}

/// Pick an icon for a column from its data type. Modifier wrappers (`Nullable`, `LowCardinality`)
/// are peeled off first so that e.g. `Nullable(Int64)` still reads as numeric, while container
/// types (`Array`, `Map`, `Tuple`) are recognised at the outer level.
function getColumnTypeIcon(type) {
    let t = String(type).trim();
    for (let m; (m = /^(?:Nullable|LowCardinality)\((.*)\)$/.exec(t)); )
        t = m[1].trim();

    if (/^Array\s*\(/.test(t)) return makeColumnBadge('[]');
    if (/^(?:Map\s*\(|JSON\b|Object\b)/.test(t)) return makeColumnBadge('{}');
    if (/^(?:Tuple|Nested)\s*\(/.test(t)) return makeColumnBadge('(,)');

    /// Date - calendar. Drawn within a central region so its visual size matches the text glyphs.
    if (/^Date(?:32)?$/.test(t))
        return makeColumnIcon(
            'M5 7 h14 v12 h-14 z',       // body
            'M5 10.5 h14',                // header separator
            'M9 5 v3', 'M15 5 v3');       // binding rings
    /// DateTime - clock.
    if (/^DateTime/.test(t))
        return makeColumnIcon(
            'M12 6 a6 6 0 1 0 0 12 a6 6 0 1 0 0 -12', // dial
            'M12 9 v3.5 l2.5 1.5');                    // hands

    if (/^(?:U?Int|Float|BFloat|Decimal|Bool)/.test(t)) return makeColumnBadge('09');
    if (/^(?:String|FixedString|Enum|UUID|IPv[46])/.test(t)) return makeColumnBadge('Aa');

    /// Fallback for everything else (e.g. `AggregateFunction`, geo types, `Nothing`).
    return makeColumnBadge('T');
}

/// Anchor a column's balloon to the end of its name, mirroring `positionTableBalloon`, and
/// remember it as the currently visible balloon so `hideTableBalloons` can dismiss it on scroll.
function positionColumnBalloon(column) {
    const name = column.querySelector('.column-name');
    const button = column.querySelector('button');
    const addendum = column.querySelector('.column-addendum');
    if (!name || !button || !addendum) return;
    const rect = name.getBoundingClientRect();
    const btn = button.getBoundingClientRect();
    addendum.style.left = Math.min(rect.right, btn.right) + 'px';
    addendum.style.top = (rect.top + rect.height / 2) + 'px';
    addendum.style.visibility = '';
    visible_balloon = addendum;
}

/// Quote an identifier (database, table, or column name) for safe embedding in a query.
/// ClickHouse's double-quoted identifiers accept both C-style backslash escapes and SQL-style
/// doubling, so escape any backslash and double any embedded quote. A name such as `a"b` or
/// `a\b` then round-trips as a valid `SELECT` instead of producing broken SQL.
function quoteIdentifier(name) {
    return '"' + String(name).replace(/\\/g, '\\\\').replace(/"/g, '""') + '"';
}

/// Quote a string literal for the same reason (used where a name is matched as a value, e.g.
/// `WHERE database = '...'`): escape any backslash and double any embedded single quote.
function quoteString(value) {
    return "'" + String(value).replace(/\\/g, '\\\\').replace(/'/g, "''") + "'";
}

/// Build the column rows (name + type + size bar + hover balloon) into `columns_elem`.
function renderColumns(columns_elem, data, database, table_name_str) {
    if (data.length == 0) {
        let none = document.createElement('div');
        none.className = 'columns-loading';
        none.style.animation = 'none';
        none.textContent = 'no columns';
        columns_elem.appendChild(none);
        return;
    }

    /// The size bar of each column is drawn proportionally to the largest compressed column.
    let max_compressed = Math.max(0, ...data.map(c => +c.compressed || 0));

    for (let col of data) {
        let column = document.createElement('div');
        column.className = 'table-column';

        const compressed = +col.compressed || 0;
        const uncompressed = +col.uncompressed || 0;

        if (max_compressed && compressed) {
            const percent = Number(100 * compressed / max_compressed).toFixed(2);
            column.style.backgroundImage = `linear-gradient(to right,
                var(--table-size-bar-color) 0%,
                var(--table-size-bar-color) ${percent}%,
                transparent ${percent}%)`;
        }

        let button = document.createElement('button');

        let name_elem = document.createElement('span');
        name_elem.className = 'column-name';
        name_elem.append(getColumnTypeIcon(col.type), col.name);

        let type_elem = document.createElement('span');
        type_elem.className = 'column-type';
        type_elem.textContent = col.type;

        button.append(name_elem, type_elem);

        /// Hover balloon. Always shows the full (untruncated) data type, and adds the compressed
        /// and uncompressed size and the compression ratio when they are known. Per-column sizes
        /// are unavailable for some tables (e.g. small tables stored in compact parts, such as
        /// `default.actors`, report zero), so the size lines are simply omitted there rather
        /// than showing a misleading `0 B`.
        let addendum = document.createElement('span');
        addendum.className = 'column-addendum';
        let lines = [col.type];
        if (compressed || uncompressed) {
            lines.push(`Compressed: ${formatReadableBytes(compressed)}`);
            lines.push(`Uncompressed: ${formatReadableBytes(uncompressed)}`);
            if (compressed) lines.push(`Ratio: ${Number(uncompressed / compressed).toFixed(2)}×`);
        }
        addendum.textContent = lines.join('\n');
        button.appendChild(addendum);

        /// Position the balloon whenever the pointer enters the row button, so it opens from both
        /// the name and the (often truncated) type text - which is exactly the element a user hovers
        /// to read a long type - not only from the name span.
        button.addEventListener('mouseenter', () => positionColumnBalloon(column));
        /// Show the balloon when the row is focused via keyboard navigation, too.
        button.addEventListener('focus', () => positionColumnBalloon(column));

        column.appendChild(button);
        /// Activate the column row through the same helper as table rows and their addenda, so a
        /// column shares the full click-like contract: a middle click (`auxclick`) opens the
        /// generated `SELECT` in a new Web UI tab (with autoscroll and the X11 PRIMARY paste
        /// suppressed), and Shift/new-tab-modifier clicks open a new tab too, instead of the row
        /// silently losing those gestures because it only listened for a plain `click`.
        onTableActivate(column, e => setQueryOrRun(e, `SELECT ${quoteIdentifier(col.name)} FROM ${quoteIdentifier(database)}.${quoteIdentifier(table_name_str)} LIMIT 100`));
        columns_elem.appendChild(column);
    }
}

/// Per-table staleness token for column loads, guarding against a stale in-flight load
/// repopulating a list that was collapsed and reopened while the query was in flight.
let toggle_columns_generation = new WeakMap();

/// Toggle the list of columns shown under a table row. Columns are loaded lazily from
/// `system.columns` on first expand and kept in the DOM; collapsing removes them. A late load is
/// dropped if the row was collapsed/reopened, detached, or the connection changed meanwhile.
async function toggleColumns(table, table_icon, database, table_name_str, server_address, user, password) {
    /// The column list is a secondary control, reached by clicking the icon (or pressing Left on
    /// the focused row). The icon carries the visual caret (`expanded` class). The row `<button>`
    /// deliberately does not advertise `aria-expanded`: its normal activation runs `SELECT *`
    /// rather than toggling the list, so announcing it as a disclosure widget would be a false
    /// promise to assistive technology.
    let columns_elem = table.querySelector(':scope > .table-columns');
    if (columns_elem) {
        /// Collapse.
        columns_elem.remove();
        delete table.dataset['columnsOpen'];
        table_icon.classList.remove('expanded');
        return;
    }

    table.dataset['columnsOpen'] = 1;
    table_icon.classList.add('expanded');
    columns_elem = document.createElement('div');
    columns_elem.className = 'table-columns';
    let loading = document.createElement('div');
    loading.className = 'columns-loading';
    loading.textContent = '⧗';
    columns_elem.appendChild(loading);
    table.appendChild(columns_elem);

    const generation = (toggle_columns_generation.get(table) || 0) + 1;
    toggle_columns_generation.set(table, generation);
    const connection_generation = connectionGeneration;

    /// Expanding columns is an explicit user action, so its failures must surface the real
    /// server error (a missing privilege on `system.columns`, a version mismatch, ...) the way
    /// the other user-triggered panel queries do, rather than being swallowed behind a generic
    /// placeholder. The query still runs quietly so it does not clobber the main result pane;
    /// `on_error` captures the error text and we render it here, inline in the side panel.
    let error_text = null;
    let json = await auxiliaryQuery(server_address, user, password,
        `SELECT name, type, data_compressed_bytes AS compressed, data_uncompressed_bytes AS uncompressed
            FROM system.columns WHERE database = {database:String} AND table = {table:String} ORDER BY position`,
        '&param_database=' + encodeURIComponent(database) + '&param_table=' + encodeURIComponent(table_name_str),
        true, connection_generation, (e) => { error_text = e; });

    /// Drop the result if this load is no longer the relevant one for the row.
    if (generation != toggle_columns_generation.get(table)) return;
    if (!columns_elem.isConnected || connection_generation !== connectionGeneration) return;

    loading.remove();
    if (!json) {
        let error_elem = document.createElement('div');
        error_elem.className = 'columns-loading';
        error_elem.style.animation = 'none';
        error_elem.textContent = error_text ? ('unable to load columns: ' + error_text.trim()) : 'unable to load columns';
        columns_elem.appendChild(error_elem);
        return;
    }
    renderColumns(columns_elem, json.data, database, table_name_str);
}

/// Per-container staleness token. Several databases can be loading their tables
/// at the same time (e.g. when restoring previously expanded databases), so the
/// guard must be scoped to each container: a load is only superseded by a newer
/// load of the same database, not by a concurrent load of a different one.
let load_tables_request_nums = new WeakMap();
/// Wire up a click-like activation on a table row or its addendum. Besides an ordinary left
/// click, we also honor the gestures that conventionally open a link in a new tab: a middle
/// click (which fires `auxclick`, not `click`), a Shift+click, or the platform's new-tab
/// modifier click - Cmd on macOS, Ctrl elsewhere (on macOS `Ctrl+Click` is the secondary
/// context-menu click, so it is not a new-tab gesture). The handler inspects the event to
/// decide between replacing the current query and opening a new Web UI tab.
///
/// There is no browser-level test harness for `play.html`, so this gesture-routing and its
/// paste guard are verified by hand. The committed manual matrix below is the behavior
/// contract; re-run it when touching `set_query_or_run`, `openQueryInNewTab`/`activateTab`,
/// or the `suppress_middleclick_paste` guard. Every case applies to a databases-panel table
/// row, its bytes/rows/engine addenda, and the column rows of an expanded table alike, since
/// they all route through the same `set_query_or_run` (below):
///
///   1. Plain left click on a not-yet-loaded query -> replaces the current tab's query
///      (`query_area.value = value`); no new tab is created.
///   2. Click the same row again while its query is already in the editor -> runs it
///      (`postOne`), no new tab - and likewise for a second middle/modifier click, since
///      opening an identical tab would be pointless.
///   3. Middle click (button 1) -> opens the query in a new Web UI tab; on Linux/X11 the
///      synthetic PRIMARY paste into the freshly focused editor is swallowed (the guard is
///      armed around `query_area.focus()` in `activateTab`).
///   4. Shift+click -> opens a new tab on every platform.
///   5. Ctrl+click on Linux/Windows, or Cmd+click on macOS -> opens a new tab.
///   6. Ctrl+click on macOS (the secondary/context-menu click) -> a no-op for query activation:
///      it neither opens a new tab, replaces the editor, nor runs the query (not even the
///      second-click `postOne`). The gesture is left entirely to the browser so the native
///      context menu can appear. (Cmd+click is the macOS new-tab gesture; see case 5.)
///   7. A real keyboard paste (Ctrl+V, Cmd+V, or Shift+Insert) into the editor immediately
///      after a middle-click new-tab open -> the pasted text is kept: the paste-shortcut
///      `keydown` disarms the guard before its `paste` fires, so only the mouse-driven
///      PRIMARY paste (which carries no keystroke) is ever swallowed.
///   8. Two middle clicks in quick succession (open table A, then table B within the guard's
///      fallback window) -> B's PRIMARY paste is still swallowed: re-arming cancels A's pending
///      fallback timer (`middleclick_paste_timeout`), so A's stale timeout cannot clear B's guard.
function onTableActivate(elem, handler) {
    elem.addEventListener('click', handler);
    elem.addEventListener('auxclick', e => {
        if (e.button !== 1) return;
        /// Cancel the middle click's native paste at the click site. The X11 PRIMARY paste that
        /// would otherwise land in the query editor is guarded separately, around the actual
        /// `query_area.focus()` in the new-tab path (see `activateTab`), so the guard cannot
        /// expire before a slow activation focuses the editor.
        e.preventDefault();
        handler(e);
    });
    /// Suppress the browser's middle-click autoscroll so the gesture only opens a new tab.
    elem.addEventListener('mousedown', e => { if (e.button === 1) e.preventDefault(); });
}

async function loadTables(server_address, user, password, database, container, set_current = true, is_current = null, quiet = !set_current) {
    const request_num = (load_tables_request_nums.get(container) || 0) + 1;
    load_tables_request_nums.set(container, request_num);

    /// Commit the database selection synchronously, on the trusted click — before the table list
    /// query is even issued — so a `Run` fired before the load returns already targets the
    /// just-clicked database. The async load below only repaints the list; the latest click always
    /// wins because click handlers run to completion (nothing interleaves before the first await),
    /// so no per-selection token is needed to arbitrate concurrent loads. A restore load
    /// (set_current = false) is background panel maintenance and must not move the selection.
    if (set_current) commitSelectedDatabase(database);

    /// Capture the connection generation before awaiting: an explicit (non-quiet) open/refresh
    /// whose connection is replaced while its `system.tables` query is in flight must not report
    /// its result into the main result pane (see `auxiliaryQuery`).
    const generation = connectionGeneration;

    /// A restore load is a background panel-maintenance query triggered by merely reopening the
    /// panel, so it runs quietly (`quiet = true`): it must not overwrite the main result pane with
    /// its own success or error. An explicit open or refresh keeps surfacing its error as before
    /// (`quiet = false`). `quiet` is decoupled from `set_current` so a refresh can reload the list
    /// without committing the selection yet still report failures.
    let json = await auxiliaryQuery(server_address, user, password,
        `SELECT table, engine, total_rows, total_bytes FROM system.tables WHERE database = {database:String}
            ORDER BY table LIKE '.inner%', table`,
        '&param_database=' + encodeURIComponent(database),
        quiet, generation);
    if (!json) return false;

    if (request_num != load_tables_request_nums.get(container)) return false;
    /// The row this load targets may have been collapsed or superseded by a newer refresh while
    /// the query was in flight; if so, bail out before touching the DOM so we never repopulate
    /// the table list of a row that is no longer open.
    if (is_current && !is_current()) return false;

    let tables_elem = container.querySelector('.tables');
    while (tables_elem.firstChild) tables_elem.removeChild(tables_elem.firstChild);

    /// Show the number of tables in parentheses next to the database name, e.g. `default (123)`.
    let database_link = container.firstChild;
    let count_elem = database_link.querySelector('.database-table-count');
    if (!count_elem) {
        count_elem = document.createElement('span');
        count_elem.className = 'database-table-count';
        database_link.appendChild(count_elem);
    }
    count_elem.textContent = ` (${json.data.length})`;

    let max_total_bytes = Math.max(...json.data.map(elem => +elem.total_bytes));

    // Use natural order for table names; .inner tables go last
    json.data.sort((a, b) => a.table.startsWith('.inner') - b.table.startsWith('.inner')
        || a.table.localeCompare(b.table, undefined, { numeric: true }));

    for (let elem of json.data) {
        let table = document.createElement('div');
        table.className = 'table';
        let table_link = document.createElement('button');
        /// Wrap the icon+name so the balloon opens only when hovering the name, not the
        /// empty right part of the full-width button.
        let table_name = document.createElement('span');
        table_name.className = 'table-name';
        let table_icon = getTableIcon(elem.engine);
        table_icon.setAttribute('title', 'Show columns');
        /// The row `<button>`'s primary action is `SELECT *`, so it must not advertise
        /// `aria-expanded`: that would promise a disclosure widget whose normal activation
        /// (click / Enter / Space) never toggles the column list. Toggling is a secondary
        /// action, reached by clicking the icon or pressing Left on the focused row; the icon
        /// carries the visual caret (its `expanded` class).
        table_name.append(table_icon, elem.table);
        table_link.appendChild(table_name);

        /// Clicking the icon (to the left of the name) toggles the list of columns of this
        /// table, instead of running the default `SELECT *`. Stop the event so it neither
        /// bubbles to the row's click handler nor triggers a hover balloon reposition.
        const toggle_columns = () => toggleColumns(table, table_icon, database, elem.table, server_address, user, password);
        table_icon.addEventListener('click', e => {
            if (isMac && e.ctrlKey && e.button !== 1) {
                /// On macOS `Ctrl+Click` is the secondary (context-menu) click, same as the
                /// guard in `setQueryOrRun`; leave it entirely to the browser instead of
                /// toggling the column list, so the native context menu still appears.
                return;
            }
            e.stopPropagation();
            toggle_columns();
        });
        /// A middle click fires `auxclick`, not `click`, so the handler above never sees it.
        /// Without consuming it here, the middle-click `auxclick` would bubble to the row's
        /// `onTableActivate` and open `SELECT *` in a new tab - a completely different action
        /// from this icon's `Show columns` purpose. Toggle the column list for a middle click
        /// too (a middle click is a genuine gesture even with Ctrl held, so there is no macOS
        /// guard here), and cancel the middle-button defaults at the icon - the X11 PRIMARY
        /// paste on `auxclick` and the autoscroll on `mousedown` - so the disclosure control
        /// behaves consistently for every click type.
        table_icon.addEventListener('auxclick', e => {
            if (e.button !== 1) return;
            e.preventDefault();
            e.stopPropagation();
            toggle_columns();
        });
        table_icon.addEventListener('mousedown', e => { if (e.button === 1) e.preventDefault(); });

        if (max_total_bytes && +elem.total_bytes) {
            const percent = Number(100 * +elem.total_bytes / max_total_bytes).toFixed(2);
            table.style.backgroundImage = `linear-gradient(to right,
                var(--table-size-bar-color) 0%,
                var(--table-size-bar-color) ${percent}%,
                transparent ${percent}%)`;
        }

        let table_addendum = document.createElement('span');
        table_addendum.className = 'table-addendum';

        const set_query_or_run = setQueryOrRun;

        const show_table_properties = e => set_query_or_run(e, `SELECT * FROM system.tables WHERE database = ${quoteString(database)} AND table = ${quoteString(elem.table)}`);

        if (+elem.total_bytes) {
            let bytes_elem = document.createElement('span');
            bytes_elem.className = 'table-addendum-elem';
            bytes_elem.textContent = formatReadableBytes(elem.total_bytes) + '\n';
            onTableActivate(bytes_elem, show_table_properties);
            table_addendum.append(bytes_elem);
        }
        if (+elem.total_rows) {
            let rows_elem = document.createElement('span');
            rows_elem.className = 'table-addendum-elem';
            rows_elem.textContent = formatReadableRows(elem.total_rows) + ' rows\n';
            onTableActivate(rows_elem, show_table_properties);
            table_addendum.append(rows_elem);
        }
        let engine_elem = document.createElement('span');
        engine_elem.textContent = elem.engine;
        engine_elem.className = 'table-addendum-elem';
        onTableActivate(engine_elem, e => set_query_or_run(e, `SHOW TABLE ${quoteIdentifier(database)}.${quoteIdentifier(elem.table)}`));
        table_addendum.append(engine_elem);

        /// Make the balloon links reachable from the keyboard (Right arrow from the row).
        for (const link of table_addendum.querySelectorAll('.table-addendum-elem')) link.tabIndex = -1;

        table_name.addEventListener('mouseenter', () => positionTableBalloon(table));
        /// Show the balloon when the row is focused via keyboard navigation, too.
        table_link.addEventListener('focus', () => positionTableBalloon(table));

        /// Keep the addendum inside the button so the `.table-name ~ .table-addendum` hover
        /// selector works; it is position:fixed, so it is not clipped by the button overflow.
        table_link.appendChild(table_addendum);
        table.appendChild(table_link);
        onTableActivate(table, e => set_query_or_run(e, `SELECT * FROM ${quoteIdentifier(database)}.${quoteIdentifier(elem.table)} LIMIT 100`));
        tables_elem.appendChild(table);
    }

    if (json.data.length == 0) {
        let table = document.createElement('div');
        table.className = 'no-tables';
        table.append('no tables');
        tables_elem.append(table);
    }
}

let databases_toggle = document.getElementById('databases-toggle');

let menu_elem = document.getElementById('menu');

/// Hide the currently visible table-info balloon on any scroll: it uses
/// position:fixed and would detach from its anchor. Use capture phase so the
/// listener fires regardless of which element scrolls (scroll events do not
/// bubble). Only one balloon can be open at a time (the one the cursor most
/// recently entered), so we track that reference instead of scanning the DOM.
///
/// Also set `suppress-balloons` on the body until the next mousemove, so a
/// different table button scrolled under a stationary cursor cannot reveal its
/// balloon at an unset position via the CSS `:hover` rule (`mouseenter` does
/// not fire without actual mouse movement, so JS positioning would be skipped).
let visible_balloon = null;
function hideTableBalloons() {
    if (visible_balloon) {
        visible_balloon.style.visibility = 'hidden';
        visible_balloon = null;
    }
    document.body.classList.add('suppress-balloons');
}

/// Anchor a table's balloon to the end of its name (clamped to the button when the
/// name is truncated), so it sits next to the text rather than the far-right edge.
/// Used on hover, on keyboard focus, and to keep it glued to the row across scrolls.
function positionTableBalloon(table) {
    const table_name = table.querySelector('.table-name');
    const table_link = table.querySelector('button');
    const table_addendum = table.querySelector('.table-addendum');
    if (!table_name || !table_addendum) return;
    const rect = table_name.getBoundingClientRect();
    const btn = table_link.getBoundingClientRect();
    table_addendum.style.left = Math.min(rect.right, btn.right) + 'px';
    table_addendum.style.top = (rect.top + rect.height / 2) + 'px';
    table_addendum.style.visibility = '';
    visible_balloon = table_addendum;
}

document.addEventListener('scroll', () => {
    /// When a table row (or one of its balloon links) is focused via the keyboard,
    /// keep its balloon glued to the row across the scroll instead of hiding it.
    /// A column row is nested inside its `.table`, so match it first: `closest` returns the
    /// nearest ancestor, i.e. the `.table-column` when a column is focused, the `.table` otherwise.
    const focused_row = document.activeElement?.closest?.('.table-column, .table');
    if (focused_row && document.getElementById('databases').contains(focused_row)) {
        /// Still suppress hover-opened balloons on *other* rows: a different table
        /// button scrolled under a stationary cursor would otherwise reveal its
        /// balloon at an unset position via the CSS `:hover` rule (`mouseenter` does
        /// not fire without mouse movement). The focused row's balloon is exempted
        /// from `suppress-balloons` in CSS, so it stays glued to the row.
        document.body.classList.add('suppress-balloons');
        if (focused_row.classList.contains('table-column')) positionColumnBalloon(focused_row);
        else positionTableBalloon(focused_row);
    } else {
        hideTableBalloons();
    }
}, { capture: true, passive: true });
document.addEventListener('mousemove', () => {
    /// Guard so the no-op case does not touch classList on every mouse pixel.
    if (document.body.classList.contains('suppress-balloons')) {
        document.body.classList.remove('suppress-balloons');
    }
}, { passive: true });

/// Close the database panel and remove every row. Detaching the rows also drops any in-flight
/// `loadTables` load through its `isConnected` check, so a late response cannot repopulate a
/// panel that is no longer shown.
function closeDatabases() {
    delete databases_toggle.dataset['opened'];
    menu_elem.style.cursor = 'e-resize';
    menu_elem.classList.remove('databases-opened');
    let databases_elem = document.getElementById('databases');
    while (databases_elem.firstChild) databases_elem.removeChild(databases_elem.firstChild);
}

function toggleDatabases() {
    if (!databases_toggle.dataset['opened']) {
        loadDatabases(url_elem.value, user_elem.value, password_elem.value).then(ok => {
            if (ok !== false) {
                databases_toggle.dataset['opened'] = 1;
                menu_elem.style.cursor = 'w-resize';
                menu_elem.classList.add('databases-opened');
            }
        });
    } else {
        closeDatabases();
    }
}

/// The logo is an <a> element so that middle-click, Shift+click, and the platform's
/// new-tab modifier click (Cmd+click on macOS, Ctrl+click elsewhere) natively open the
/// current page (with the query) in a new tab or window.
/// We update the href on mousedown so it always reflects the current URL.
document.getElementById('databases-icon').addEventListener('mousedown', () => {
    document.getElementById('databases-icon').href = window.location.href;
});

databases_toggle.addEventListener('click', e => {
    e.stopPropagation();
    /// Defer any modified click to the browser's native link handling instead of toggling:
    /// a new tab or window for the new-tab gestures, or the context menu for macOS Ctrl+click.
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    /// Normal click: toggle the databases panel instead of following the link.
    e.preventDefault();
    toggleDatabases();
});

/// The icon is an <a>, which the browser activates with Enter (following the
/// link) but not with Space. Handle both keys here so it can be toggled from the
/// keyboard once focused via Tab, instead of navigating away.
document.getElementById('databases-icon').addEventListener('keydown', e => {
    if (e.key !== ' ' && e.key !== 'Enter') return;
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    e.preventDefault();
    toggleDatabases();
});

/// The "hide panel" button is only visible while the panel is open, so it always closes it.
document.getElementById('databases-hide').addEventListener('click', e => {
    e.stopPropagation();
    toggleDatabases();
});

/// Keyboard navigation inside the database panel. The event bubbles here from the
/// focused element.
///   - Up/Down move focus between the rows (databases and expanded tables),
///     mirroring Tab/Shift+Tab but staying within the panel.
///   - Right enters the focused table's balloon (its size/rows/engine links);
///     inside the balloon Up/Down move between links, Left returns to the row,
///     and Enter/Space activate the focused link.
///   - Left on a table row toggles its column list (the disclosure the table icon
///     opens on click), so the columns are reachable from the keyboard.
document.getElementById('databases').addEventListener('keydown', e => {
    const active = document.activeElement;

    /// Within a table's balloon.
    if (active.classList && active.classList.contains('table-addendum-elem')) {
        const links = [...active.parentElement.querySelectorAll('.table-addendum-elem')];
        const i = links.indexOf(active);
        if (e.key === 'ArrowDown') { e.preventDefault(); links[Math.min(i + 1, links.length - 1)].focus({ preventScroll: true }); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); links[Math.max(i - 1, 0)].focus({ preventScroll: true }); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); active.closest('.table').querySelector('button').focus(); }
        else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); active.click(); }
        return;
    }

    /// Right arrow on a table row jumps into its balloon links.
    if (e.key === 'ArrowRight') {
        const link = active.querySelector && active.querySelector('.table-addendum-elem');
        if (link) { e.preventDefault(); link.focus({ preventScroll: true }); }
        return;
    }

    /// Left arrow on a table row toggles its list of columns, so keyboard users can expand it
    /// (`Enter` already runs the default `SELECT *`, so it can't double as the toggle). It routes
    /// through the icon's own click handler to reuse its wiring; the guard restricts this to the
    /// table's own row button (not a database row or a nested column button).
    if (e.key === 'ArrowLeft') {
        const table = active.closest && active.closest('.table');
        if (table && active === table.querySelector(':scope > button')) {
            const table_icon = table.querySelector(':scope > button .table-icon');
            if (table_icon) {
                e.preventDefault();
                table_icon.dispatchEvent(new MouseEvent('click', { bubbles: true }));
            }
        }
        return;
    }

    /// Up/Down move focus between the rows.
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    const buttons = [...document.getElementById('databases').querySelectorAll('button')];
    if (buttons.length === 0) return;
    e.preventDefault();
    let index = buttons.indexOf(active);
    if (e.key === 'ArrowDown') {
        index = index < 0 ? 0 : Math.min(index + 1, buttons.length - 1);
    } else {
        index = index < 0 ? buttons.length - 1 : Math.max(index - 1, 0);
    }
    buttons[index].focus();
});

document.getElementById('menu').addEventListener('click', e => {
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    if (!e.target.closest('#github-icon') && !e.target.closest('#databases-toggle') && !e.target.closest('button')) {
        toggleDatabases();
    }
});

function formatUptime(t) {
    if (t < 60) { return t + " sec" }
    if (t < 3600) { return Number(t / 60).toFixed() + " min" }
    if (t < 86400) { return Number(t / 3600).toFixed() + " hr" }
    const days = Number(t / 86400).toFixed();
    return days + " day" + (days > 1 ? 's' : '');
}

/// The version/uptime indicator (`#server_info`) floats over the right end of the url input.
/// A short hostname leaves it clearly visible, but a long one would overlap it into an illegible
/// mix. The hostname takes precedence: hide the indicator as soon as the hostname text reaches
/// it. The connection-status dot (the rest of `#url_status`) is left untouched — `visibility`
/// keeps the indicator's width, so hiding it does not shift the dot.
function updateServerInfoVisibility() {
    const server_info = document.getElementById('server_info');
    if (!server_info.textContent) { return; } /// nothing shown yet
    /// Skip while the input is not laid out (e.g. inside a closed drop-down); recomputed on open.
    if (!url_elem.offsetWidth) { return; }

    /// Width of the hostname text in the input's own font.
    const style = getComputedStyle(url_elem);
    const ctx = updateServerInfoVisibility.ctx ||
        (updateServerInfoVisibility.ctx = document.createElement('canvas').getContext('2d'));
    ctx.font = `${style.fontSize} ${style.fontFamily}`;
    const text_width = ctx.measureText(url_elem.value).width;

    const url_rect = url_elem.getBoundingClientRect();
    const text_end = url_rect.left + parseFloat(style.borderLeftWidth) + parseFloat(style.paddingLeft) + text_width;
    const indicator_left = document.getElementById('url_status').getBoundingClientRect().left;
    /// A few pixels of breathing room before they would touch.
    server_info.style.visibility = (text_end + 4 > indicator_left) ? 'hidden' : 'visible';
}
window.addEventListener('resize', updateServerInfoVisibility);

/// A resize can make a table start or stop overflowing horizontally, which changes whether the pin
/// option should be offered; it also changes the header widths that the pinned columns' sticky
/// `left`/`right` offsets are baked from. So for a table with pinned columns recompute the whole
/// layout (`applyPinnedColumns` refreshes `has-hscroll` itself), and for the rest just refresh the
/// pin availability.
function refreshPinnedLayout() {
    for (const el of document.querySelectorAll('query-result')) {
        if (el._hasPinnedColumns()) {
            el.applyPinnedColumns();
        } else {
            el._updatePinAvailability();
        }
    }
}
window.addEventListener('resize', refreshPinnedLayout);

/// A viewport `resize` is not the only thing that changes a result table's available width: opening
/// or closing the database panel widens the `#menu` grid column and so narrows the `#main` results
/// column WITHOUT any `resize` event. A table can therefore gain horizontal overflow while its pin
/// controls stay hidden, or keep stale sticky offsets. Observe the results container so both a
/// viewport resize and such internal layout changes keep the pin availability and offsets correct.
const main_container = document.getElementById('main');
if (main_container && typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(refreshPinnedLayout).observe(main_container);
}

let check_credentials_request_num = 0;
function checkCredentials() {
    ++check_credentials_request_num;
    const current_check_credentials_request_num = check_credentials_request_num;
    getServerStatus(url_elem.value, user_elem.value, password_elem.value).then(json => {
        if (current_check_credentials_request_num == check_credentials_request_num) {
            if (json) {
                [user_elem, password_elem].forEach(e => { e.classList.remove('fail'); e.classList.add('ok'); });
                document.getElementById('server_info').innerText = `v${json.v}, uptime ${formatUptime(json.t)} `;
                updateServerInfoVisibility();

                /// The credentials didn't work — surface the connection settings so they can be

                /// (single tab) they are already visible, so there is nothing to open.
                if (!connection_key_elem.hidden) { openConnectionDropdown(); }
            }
        }
    });
}

function resetCredentialsStatus() {

}

user_elem.addEventListener('input', resetCredentialsStatus);

/// The password is usually copy-pasted.

function queryToColor(str) {
    let hash = 2166136261;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }

    /// Limited range to avoid violet colors.
    return 50 + ((hash >>> 0) % 200);
}

function toBase64(str) {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    const binary = Array.from(bytes, byte => String.fromCharCode(byte)).join('');
    return btoa(binary);
}

function fromBase64(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
    const decoder = new TextDecoder();
    return decoder.decode(bytes);
}

let elapsed_ns = 0;

const default_format = 'JSONStringsEachRowWithProgress';

/// Execute a single query, rendering results into the given targetResultEl.
/// Returns { format, reply, response_ok, is_table, is_raw, is_chart, is_image, is_error }.
/// The caller is responsible for top-level UI (download buttons, history, favicon).
/// `tab` owns the run; `posted_request_num` is a snapshot of `tab.reqNum` taken at launch, so a
/// late response bails once the tab is re-run/cancelled/closed. `abortController` cancels the fetch.
/// `queryStart` is the absolute character offset of `query` in the editor, threaded to
/// `highlightQueryError` so a server-reported error position maps back to the statement that ran.
/// `query_database` and `connection` (the { url, user, password } tuple) are snapshotted by
/// `postOne`/`postAll` BEFORE the lexer preflight await: the shared database/connection inputs must
/// not be re-read here, or a tab switch + database/connection edit during that await (or between the
/// sequential statement groups of a "Run all") would send this run's already-snapshotted query to a
/// different database, server or identity.
async function postImpl(tab, posted_request_num, query, targetResultEl, abortController, paramValuesSnapshot, query_database, connection, queryStart)
{
    /// The connection tuple (server address, user, password) is snapshotted once per run by the
    /// caller and passed in, rather than read live from the inputs here. Otherwise, in a
    /// multi-query run (where later statement groups start only after earlier ones finish), editing
    /// the connection mid-run would send later statements to a different server/user while the saved
    /// provenance still claims a single producing connection (see `postMulti`).
    const user = connection.user;
    const password = connection.password;
    const server_address = connection.url;
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        /// Ask server to allow cross-domain requests.
        'add_http_cors_header=1';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&default_format=' + default_format + '&enable_http_compression=1';
    /// We will put the result in the query cache, so it can be used when download is initiated later.
    /// But we don't use cached results, so the results that we get here, are always fresh.
    url += '&use_query_cache=1&enable_reads_from_query_cache=0&enable_writes_to_query_cache=1&query_cache_ttl=600&query_cache_nondeterministic_function_handling=save&query_cache_system_table_handling=ignore';

    /// If the user selected a database in the panel, use it as the default database.
    if (query_database) url += '&database=' + encodeURIComponent(query_database);

    for (const [name, value] of Object.entries(paramValuesSnapshot))
    {
        url += '&param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value);
    }

    /// Extremes only if the format is likely to be unchanged. This is imprecise.
    if (!query.match(/\bFORMAT\s+\w+/i)) url += '&extremes=1';

    targetResultEl.queryText = query;

    let is_table = false;
    let is_raw = false;
    let is_chart = false;
    let is_image = false;
    let is_error = false;

    let response, reply, format;
    reply = '';
    try {
        response = await fetch(url, { method: "POST", body: query, signal: abortController.signal,
            headers: { 'Authorization': 'never' } });

        format = response.headers.get('X-ClickHouse-Format') ?? default_format;
        /// Detect image results (e.g. `FORMAT PNG`) by the response `Content-Type` rather than by
        /// parsing the query, so any format that emits an image is rendered inline as a picture.
        const content_type = response.headers.get('Content-Type') ?? '';

        if (!response.ok) {
            is_error = true;
            reply = await response.text();
            if (posted_request_num != tab.reqNum) { return { cancelled: true }; }

            let has_exception = false;
            for (const line of reply.split('\n')) {
                if (line.startsWith(`{"exception":`)) {
                    targetResultEl.update(JSON.parse(line));
                    has_exception = true;
                    break;
                }
            }
            if (!has_exception) {
                targetResultEl.renderError(reply);
            }

            /// If the error message points at a position in the query (e.g. a syntax error),
            /// highlight that position in the editor -- only while the launching tab is still the
            /// active one (the shared editor shows ITS text; a background run must never paint the
            /// foreground editor) and the user has not returned to the editor since this run
            /// started (any interaction, including a tab switch's synthetic editor restore, bumps
            /// the generation past this run's snapshot and makes the response stale).
            if (tab.id === activeTabId && editorInteractionGen === tab.runEditorInteraction) {
                highlightQueryError(reply, query, queryStart, tab);
            }

            return { format, reply, response_ok: false, is_table, is_raw, is_chart, is_image, is_error };
        } else if (content_type.startsWith('image/')) {
            is_image = true;
            const blob = await response.blob();
            if (posted_request_num != tab.reqNum) { return { cancelled: true }; }
            targetResultEl.renderImage(blob);
        } else if (format == default_format) {
            is_table = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            let stream_exception = null;   /// set if a `{"exception"}` arrives mid-stream
            while (true) {
                const { done, value } = await reader.read();
                if (posted_request_num != tab.reqNum) { return { cancelled: true }; }
                if (done) break;

                let new_content = decoder.decode(value, { stream: true });
                buffer += new_content;
                reply += new_content;

                let lines = buffer.split('\n');
                let fragment = document.createDocumentFragment();

                let cont = true;
                for (const line of lines.slice(0, -1)) {
                    /// Skip blank lines: a trailing/blank line would make `JSON.parse('')` throw
                    /// ("Unexpected end of JSON input"), masking the real result with a client error.
                    if (line.length == 0) continue;
                    const data = JSON.parse(line);
                    /// A `{"exception":...}` can arrive mid-stream after a 200 (e.g. a query that
                    /// streams progress/rows and then hits `max_execution_time`). The response was
                    /// `ok`, so without this it would be classified as a successful result. Stop the
                    /// stream and remember the message; it is handled after the loop.
                    if (data.exception) { stream_exception = data.exception; cont = false; break; }
                    cont = targetResultEl.update(data, fragment);
                    if (!cont) { break; }
                }

                /// The rows this chunk appended: captured before `flushFragment` empties the
