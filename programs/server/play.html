    if (closing.panel) closing.panel.remove();
    tabs.splice(idx, 1);
    if (tabs.length === 0) {
        /// Never leave zero tabs: start a fresh default one.
        const tab = makeTab();
        tabs.push(tab);
        activeTabId = tab.id;
        activateTab(tab.id).then(syncHistory);
    } else if (wasActive) {
        /// Prefer the right neighbour, otherwise the left.
        const next = tabs[Math.min(idx, tabs.length - 1)];
        activeTabId = next.id;
        activateTab(next.id).then(syncHistory);
    } else {
        renderTabBar();
        refreshFavicon();   /// closing a background tab may have removed the last running query
    }
    scheduleSave();
}

/// Begin inline editing of the active tab's title. The title `span` itself becomes
/// editable (rather than swapping in an `input`), so it grows with its content and the
/// tab width does not jump when editing starts.
function startTitleEdit(tab, titleEl) {
    titleEl.contentEditable = 'true';
    titleEl.spellcheck = false;
    titleEl.classList.add('editing');
    /// Drop the hover tooltip while typing so it does not linger with the old title.
    titleEl.removeAttribute('title');
    /// Mark the tab so it drops its max-width and flexes to fit the title being typed.
    titleEl.closest('.tab').classList.add('editing');

    /// Select the whole title for easy replacement.
    const range = document.createRange();
    range.selectNodeContents(titleEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    titleEl.focus();

    let done = false;
    const commit = (save) => {
        if (done) return;
        done = true;
        if (activeTitleCommit === commit) activeTitleCommit = null;
        if (save) {
            /// Collapse any pasted newlines/runs of whitespace into single spaces.
            const v = titleEl.textContent.replace(/\s+/g, ' ').trim();
            /// Keep titles unique (they key the URL `tab=` reconciliation), disambiguating
            /// a collision rather than letting two tabs share a name.
            if (v) tab.title = uniqueTitle(v, tab.id);
        }
        renderTabBar();   /// rebuilds the bar, replacing this editable span with a static one
        syncHistory();
        scheduleSave();
    };
    /// Expose the commit so paths that rerender the tab bar (e.g. duplicating another tab)
    /// can flush this pending rename first — the editor otherwise only writes back on `blur`.
    activeTitleCommit = commit;
    titleEl.addEventListener('keydown', (e) => {
        /// Keep keys (Space/Enter) from reaching the tab-level switch handler.
        e.stopPropagation();
        if (e.key === 'Enter') { e.preventDefault(); commit(true); }
        else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
    });
    titleEl.addEventListener('blur', () => commit(true));
}

/// Rebuild the whole tab bar. Cheap (few nodes) so we never diff.
function renderTabBar() {
    /// Flush any in-progress inline title rename before we rebuild and destroy its editable span.
    /// The editor writes back to `tab.title` only on `blur`, but many paths rerender the bar without
    /// a blur first — a slow query completing calls `writeHistoryEntry` -> `renderTabBar`, closing a
    /// tab or navigating rerenders too, and a middle click suppresses the blur — each of which would
    /// otherwise silently drop the pending rename. Committing here, the single rerender chokepoint,
    /// covers every path (not just `duplicateTab`). Safe against re-entry: `commit` clears
    /// `activeTitleCommit` before it calls back into `renderTabBar`, so this becomes a no-op.
    if (activeTitleCommit) activeTitleCommit(true);
    const active = getActiveTab();
    /// Hidden when there is a single tab that has never produced a result from a genuine
    /// run, so the page looks exactly as before tabs existed. Keying off `result.ran`
    /// (rather than merely `result != null`) also ignores any stale/fabricated result
    /// snapshot that an older build may have persisted to IndexedDB.
    /// A running query also reveals the bar (`anyInFlight`), so even the very first query on a
    /// fresh page can be backgrounded: the user needs the `[+]` button to open a second tab (or
    /// switch away) while that first query is still in flight.
    tab_bar_elem.hidden = (tabs.length <= 1 && !(active && active.result && active.result.ran) && !anyInFlight());
    syncConnectionUI();

    tabs_elem.textContent = '';
    for (const tab of tabs) {
        const el = document.createElement('div');
        el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
        el.dataset.id = tab.id;
        el.tabIndex = 0;
        /// Inactive tabs are tinted by the hash of their own query text.
        el.style.setProperty('--tab-hue', queryToColor(tab.query));

        /// Progress fill behind the title (width driven by `--tab-progress`).
        const fillEl = document.createElement('div');
        fillEl.className = 'tab-progress-fill';
        el.appendChild(fillEl);

        const titleEl = document.createElement('span');
        titleEl.className = 'tab-title';
        titleEl.textContent = tab.title;
        /// Native tooltip so a title truncated by the width cap can still be read in full on hover.
        titleEl.title = tab.title;
        el.appendChild(titleEl);

        /// Activity indicators: a spinning hourglass while the tab's query runs, and a check-mark
        /// once it has finished while the tab was inactive (cleared when the tab is opened).
        const statusEl = document.createElement('span');
        statusEl.className = 'tab-status';
        const spinnerEl = document.createElement('span');
        spinnerEl.className = 'tab-spinner';
        spinnerEl.textContent = '⧗';
        spinnerEl.style.display = 'none';
        const checkEl = document.createElement('span');
        checkEl.className = 'tab-check';
        checkEl.textContent = '✔';
        checkEl.style.display = 'none';
        const crossEl = document.createElement('span');
        crossEl.className = 'tab-cross';
        crossEl.textContent = '✖';
        crossEl.style.display = 'none';
        statusEl.appendChild(spinnerEl);
        statusEl.appendChild(checkEl);
        statusEl.appendChild(crossEl);
        el.appendChild(statusEl);

        const closeEl = document.createElement('span');
        closeEl.className = 'tab-close';
        closeEl.title = 'Close';
        closeEl.textContent = '×';
        el.appendChild(closeEl);

        /// Cache the row + indicator nodes so `updateTabIndicator` can update them in place on
        /// every progress tick without rebuilding the whole bar.
        tab.barEl = el;
        tab.fillEl = fillEl;
        tab.spinnerEl = spinnerEl;
        tab.checkEl = checkEl;
        tab.crossEl = crossEl;

        el.addEventListener('click', (e) => {
            if (e.target === closeEl) { e.stopPropagation(); closeTab(tab.id); return; }
            /// On macOS `Ctrl+Click` is the secondary (context-menu) click, not a new-tab
            /// gesture - leave it entirely to the browser (see `set_query_or_run`). The macOS
            /// duplicate modifier is Cmd (`metaKey`), checked below.
            if (isMac && e.ctrlKey) return;
            /// While the title is being edited inline, let clicks act on the editor (cursor placement,
            /// selection) rather than duplicating from the not-yet-committed title.
            if (e.target === titleEl && titleEl.isContentEditable) return;
            /// Shift+click or the platform's new-tab modifier click (Cmd on macOS, Ctrl elsewhere)
            /// on the title duplicates the tab (browser "open in new tab" gesture).
            if (e.target === titleEl && (e.shiftKey || (isMac ? e.metaKey : e.ctrlKey))) { e.preventDefault(); duplicateTab(tab.id); return; }
            if (tab.id === activeTabId) {
                if (e.target === titleEl) startTitleEdit(tab, titleEl);
            } else {
                switchToTab(tab.id);
            }
        });
        /// Middle-click does not raise a `click` event; it comes through as `auxclick` (button 1).
        /// A genuine middle click needs the X11 PRIMARY paste guard (see `suppress_middleclick_paste`).
        el.addEventListener('auxclick', (e) => {
            /// Skip while editing so a middle click pastes the X11 PRIMARY selection into the title instead.
            if (e.button === 1 && e.target === titleEl && !titleEl.isContentEditable) { e.preventDefault(); duplicateTab(tab.id, true); }
        });
        /// Suppress the middle-click autoscroll cursor over the title (but not while editing, so PRIMARY paste works).
        el.addEventListener('mousedown', (e) => {
            if (e.button === 1 && e.target === titleEl && !titleEl.isContentEditable) e.preventDefault();
        });
        el.addEventListener('keydown', (e) => {
            /// Ignore keys coming from the inline title editor (so Space/Enter type normally).
            if (e.target !== el) return;
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); switchToTab(tab.id); }
        });
        tabs_elem.appendChild(el);
        /// Reflect the tab's current run state on its fresh indicator nodes.
        updateTabIndicator(tab);
    }
}

/// Update one tab's title indicators in place (no full `renderTabBar`): the spinning hourglass
/// while its query runs, the progress fill behind its title, and the completion check-mark shown
/// once a query has finished while the tab is inactive. Cheap O(1) attribute writes, safe to call
/// on every progress event. A no-op until the tab has a row in the bar (`renderTabBar` ran).
function updateTabIndicator(tab) {
    if (!tab.barEl) return;
    const isActive = tab.id === activeTabId;

    if (tab.spinnerEl) tab.spinnerEl.style.display = tab.inFlight ? 'inline-block' : 'none';
    /// A finished-while-inactive tab shows a green check (success) or a red cross (the query
    /// failed). Both clear once the tab is opened (`tab.completed` is reset in `syncActiveTabChrome`).
    const done = tab.completed && !tab.inFlight && !isActive;
    if (tab.checkEl) tab.checkEl.style.display = (done && !tab.failed) ? 'inline-block' : 'none';
    if (tab.crossEl) tab.crossEl.style.display = (done && tab.failed) ? 'inline-block' : 'none';

    let pct = 0;
    if (tab.inFlight && tab.progress) {
        const total = +tab.progress.total_rows_to_read || 0;
        const rows = +tab.progress.read_rows || 0;
        if (total > 0) pct = Math.min(100, 100 * rows / total);
    }
    tab.barEl.style.setProperty('--tab-progress', pct ? pct + '%' : '0%');
}

document.getElementById('tab-add').addEventListener('click', addTab);

/// Mouse wheel over the tab panel switches tabs: scrolling up or left -> previous (left)
/// tab, down or right -> next (right) tab. The dominant axis is used, so both vertical and
/// horizontal wheels/trackpad gestures work. Deltas are accumulated (and normalized for
/// line-mode) so one mouse notch switches one tab and a trackpad swipe switches once per
/// threshold; switching stops at the ends.
let wheel_accum = 0;
tab_bar_elem.addEventListener('wheel', (e) => {
    if (tabs.length < 2) return; /// nothing to switch; let the page scroll
    e.preventDefault();
    const scale = e.deltaMode === 1 ? 16 : 1;
    const dx = e.deltaX * scale, dy = e.deltaY * scale;
    wheel_accum += Math.abs(dx) > Math.abs(dy) ? dx : dy;
    if (Math.abs(wheel_accum) < 40) return;
    const dir = wheel_accum > 0 ? 1 : -1; /// down/right (+) -> right, up/left (-) -> left
    wheel_accum = 0;
    const idx = tabs.findIndex(t => t.id === activeTabId);
    const next = idx + dir;
    if (next >= 0 && next < tabs.length) switchToTab(tabs[next].id);
}, { passive: false });

/// ----- IndexedDB persistence ----------------------------------------------------
/// Stores the workspace (tabs, titles, active tab, order and small result snapshots)
/// so it survives reloads. Best-effort: any failure degrades to in-memory-only tabs.

const DB_NAME = 'clickhouse-play';
const TAB_STORE = 'tabs';
const META_STORE = 'meta';

function openDb() {
    return new Promise((resolve) => {
        let req;
        try {
            req = indexedDB.open(DB_NAME, 1);
        } catch (e) {
            resolve(null);
            return;
        }
        req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(TAB_STORE)) db.createObjectStore(TAB_STORE, { keyPath: 'id' });
            if (!db.objectStoreNames.contains(META_STORE)) db.createObjectStore(META_STORE, { keyPath: 'key' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
    });
}

async function loadFromDb() {
    const db = await dbReady;
    if (!db) return null;
    return new Promise((resolve) => {
        try {
            const tx = db.transaction([TAB_STORE, META_STORE], 'readonly');
            const tabsReq = tx.objectStore(TAB_STORE).getAll();
            const metaReq = tx.objectStore(META_STORE).get('state');
            tx.oncomplete = () => resolve({ records: tabsReq.result || [], meta: metaReq.result || null });
            tx.onerror = () => resolve(null);
        } catch (e) {
            resolve(null);
        }
    });
}

let save_timer = null;
function scheduleSave() {
    if (save_timer) return;
    save_timer = setTimeout(() => { save_timer = null; persist(); }, 400);
}

async function persist() {
    const db = await dbReady;
    if (!db) return;
    captureActiveTab();
    try {
        const tx = db.transaction([TAB_STORE, META_STORE], 'readwrite');
        const tabStore = tx.objectStore(TAB_STORE);
        tabStore.clear();
        for (const tab of tabs) {
            tabStore.put({
                id: tab.id,
                title: tab.title,
                query: tab.query,
                params: tab.params,
                result: tab.result,
                /// The query as of the last URL/history sync. Persisting it lets startup
                /// reconciliation tell a stale reload (the URL hash is this tab's own last
                /// synced query, but the tab was edited afterwards) from a fresh external URL.
                lastSavedQuery: tab.lastSavedQuery,
            });
        }
        tx.objectStore(META_STORE).put({
            key: 'state',
            activeTabId: activeTabId,
            tabOrder: tabs.map(t => t.id),
            tabSeq: tabSeq,
            tabTitleSeq: tabTitleSeq,
        });
    } catch (e) {
        /// Ignore persistence failures (private mode, quota, etc.).
    }
}

/// ----- Browser history + URL ----------------------------------------------------

/// Build the query-string parameters (user/run/url/database/param_*/tab) shared by history
/// entries. The active tab name is appended so a shared URL can be reconciled against saved tabs
/// on load. The connection identity (`user`, `server_address`, `database`) is passed in rather
/// than read from the live globals: a run-produced entry must carry the connection the query
/// actually ran against — captured in the result snapshot — not whatever the panel/connection has
/// since been switched to while the query was in flight (see `writeHistoryEntry`), so a shared or
/// reloaded `run=1` URL reproduces the displayed result instead of replaying against a different
/// database or server.
/// `fromRun` marks an entry that a genuine run produced (see `writeHistoryEntry`).
function buildHistoryParams(params, tabName, fromRun, colorModes, pinnedColumns, user, server_address, database) {
    const out = [];
    if (user) out.push('user=' + encodeURIComponent(user));
    /// Only carry `run=1` for an entry whose query/params were produced by a genuine run and
    /// still match it (`fromRun`). `saveHistory` sets it on the run itself; the editor-only
    /// writers (`syncHistory`/`refreshCurrentHistoryEntry`, driven by tab switch/rename,
    /// parameter edits and startup sync) recompute it from `tabReflectsRun`, preserving the
    /// marker while the editor is unchanged (so a shared `run=1` link whose result is not
    /// snapshotted — an image or oversized result — stays reproducible across a tab switch or
    /// rename), but dropping it the moment the editor diverges from the produced result. An
    /// unrun edit must never keep `run=1`: reloading would auto-execute it (e.g. a
    /// `DROP`/`INSERT`), because startup treats a `run=1` URL as authoritative.
    if (run_immediately && fromRun) out.push('run=1');
    if (server_address != location.origin) out.push('url=' + encodeURIComponent(server_address));
    /// The selected database is a connection-scoped setting (like `user`/`url`): carry it so a
    /// shared or reloaded link resolves unqualified table names against the same database, and an
    /// auto-run `run=1` link reproduces the run instead of hitting the server default database.
    if (database) out.push('database=' + encodeURIComponent(database));
    for (const [name, value] of Object.entries(params || {})) {
        /// Serialize every parameter, including empty strings: an empty value is valid for a
        /// String parameter and must be distinguishable from "absent" on load (read back with
        /// URLSearchParams.get, which returns '' for present-empty and null for absent).
        if (value === undefined || value === null) continue;
        out.push('param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value));
    }
    /// Carry the result's per-column color coding modes so a shared/reloaded URL restores them.
    if (colorModes && Object.keys(colorModes).length > 0) {
        out.push('color_modes=' + encodeURIComponent(JSON.stringify(colorModes)));
    }
    /// Likewise carry the result's pinned columns, so a shared/reloaded URL restores them.
    if (pinnedColumns && Object.keys(pinnedColumns).length > 0) {
        out.push('pinned_columns=' + encodeURIComponent(JSON.stringify(pinnedColumns)));
    }
    if (tabName) out.push('tab=' + encodeURIComponent(tabName));
    return out;
}

/// Compare two server addresses for connection identity, tolerating cosmetic differences that
/// address the same endpoint (a root-path trailing slash, an explicit default port) while still
/// separating endpoints that differ in the request target. Used by the history restore gate
/// (`window.onpopstate`) so re-typing e.g. `http://h:8123` as `http://h:8123/` does not stop
/// restoring an entry produced on the same server. The query string IS significant: the request URL
/// is built by concatenating `url_elem.value` and preserving any existing `?...` (see `postImpl`),
/// so `http://h:8123/?cluster=a` and `http://h:8123/?cluster=b` are different endpoints (a different
/// cluster/namespace/settings) and must not share a restored `database=`. The trailing slash is
/// collapsed for the ROOT path only: `postImpl` sends the path verbatim, so a non-root
/// `/clickhouse` and `/clickhouse/` can be different routes/namespaces on a proxied deployment and
/// are compared exactly (only the root path, where the URL parser already yields `/` for both `origin`
/// and `origin/`, is treated as equivalent). Relative addresses (e.g. `/clickhouse`) are resolved
/// against the current page so they parse; both operands come from the same `url_elem.value` field,
/// so this is symmetric. Falls back to an exact string compare when a value does not parse as a URL.
function sameServerAddress(a, b) {
    if (a === b) return true;
    if (a == null || b == null) return false;
    try {
        const ua = new URL(a, location.href);
        const ub = new URL(b, location.href);
        /// Root path only: '' and '/' are the same root; every other path is compared verbatim.
        const rootNormalized = (p) => (p === '/' || p === '') ? '/' : p;
        return ua.protocol === ub.protocol
            && ua.host === ub.host
            && rootNormalized(ua.pathname) === rootNormalized(ub.pathname)
            && ua.search === ub.search;
    } catch (e) {
        return false;
    }
}

/// The effective user of a connection. The user can be given either in the explicit `user` field
/// or embedded in the server URL's userinfo (`http://alice@host:8123/`), and the request sends the
/// field value only when it is non-empty (see `postImpl`), otherwise the URL userinfo authenticates
/// the request. The selected database is a namespace on (server, user), so the identity must fold in
/// the userinfo user: `sameServerAddress` compares the endpoint (`host`, not the authority), so
/// `http://alice@host:8123/` and `http://bob@host:8123/` look like the same server there and must be
/// separated by their user. The field takes precedence over the userinfo, mirroring how the request
/// is built. The userinfo may be percent-encoded, so decode it (falling back to the raw value on a
/// malformed escape) before comparing.
function effectiveConnectionUser(serverAddress, fieldUser) {
    if (fieldUser) return fieldUser;
    try {
        const raw = new URL(serverAddress, location.href).username;
        try { return decodeURIComponent(raw); } catch (e) { return raw; }
    } catch (e) {
        return '';
    }
}

/// Has the live target moved away from the connection/selection the query that produced this run
/// snapshot (`tab.result`) actually ran against? Compared with the SAME semantic identity as the
/// restore gate (`window.onpopstate`) and the connection-change invalidation
/// (`resetConnectionScopedState`): `sameServerAddress` + `effectiveConnectionUser`, with the
/// selected database a namespace on that pair. So a cosmetic-only URL difference (a root-path
/// trailing slash, a default port) or a password-only change is not a divergence, matching those
/// gates, and the databases are compared in canonical effective form (`effectiveDatabase`) so a
/// snapshot carrying the explicit spelling of the server's current database (a shared/restored
/// `?database=` URL) is not a divergence from the collapsed `null` live selection — both denote
/// the same target. (When the snapshot ran against a DIFFERENT server whose database name happens
/// to match the live server's current one, the collapse cannot mask it: the connection comparisons
/// below still flag the divergence.) Used by `writeHistoryEntry` to decide whether a run entry may
/// keep describing the producing snapshot (and carry `run=1`), and by `refreshCurrentHistoryEntry`
/// to make the same call when the entry cannot be written at all.
function liveDivergedFromRun(run_snapshot) {
    /// A snapshot saved before the producing connection was recorded (a legacy tab restored from
    /// persistence) carries no `url`/`user`, so the connection it ran against is UNKNOWN. It cannot
    /// be proven reproducible on the live connection, so it always counts as diverged (fail
    /// closed): `run=1` is dropped and the live connection is stamped, never claiming the legacy
    /// result is reproducible on the current server — which would otherwise auto-run the old query
    /// on the wrong one on reload/share. A fresh run always records `url`/`user` (empty strings for
    /// the default same-origin connection), so only pre-upgrade snapshots take this branch.
    const snapshot_connection_known = !!run_snapshot
        && run_snapshot.url !== undefined && run_snapshot.user !== undefined;
    return !!run_snapshot && (
           !snapshot_connection_known
        || effectiveDatabase(selected_database) !== effectiveDatabase(run_snapshot.database)
        || !sameServerAddress(run_snapshot.url, url_elem.value)
        || effectiveConnectionUser(run_snapshot.url, run_snapshot.user)
            !== effectiveConnectionUser(url_elem.value, user_elem.value));
}

/// Write a browser-history entry + URL derived from the tab. The top-level query/params
/// are the EDITOR state (also the URL hash and the de-dup key); `result` is the snapshot
/// that produced the rendered result, carrying its OWN query/params so rendering/download
/// stay tied to the producing query even if the editor was edited without rerunning.
/// `titleForDoc` overrides the document title text. When `forceReplace` is set, the current
/// entry is replaced in place even if the query changed (used to refresh the entry of a tab
/// being left so it carries the latest editor edit rather than the last run/URL snapshot).
/// `fromRun` is set only by `saveHistory` (an actual run) so the URL carries `run=1`; every
/// editor-only caller leaves it unset so an unrun edit is never re-stamped as auto-runnable.
function writeHistoryEntry(tab, titleForDoc, forceReplace, fromRun) {
    /// Skip a fresh entry if neither the active tab nor its query changed.
    const cur = history.state;
    const sameTab = cur && cur.tabId === tab.id;
    const unchanged = sameTab && cur.query === tab.query;

    /// The connection-scoped identity carried by this entry — the selected database, server address
    /// and user, serialized into the URL and stamped into the state — must describe the connection
    /// the entry is reproducible against. Three cases:
    ///   - A run-produced entry (`fromRun`, i.e. carrying `run=1`) whose live connection STILL
    ///     matches the connection the query ran against: use the producing snapshot verbatim so the
    ///     `run=1` URL reloads/shares the exact producing query. The run resolves asynchronously, so
    ///     the live values, though semantically equal here, may differ cosmetically.
    ///   - A run-produced entry whose live connection or `selected_database` has since DIVERGED (the
    ///     panel selection or the connection inputs were switched while the query was still in
    ///     flight): describe the LIVE page instead, and drop `run=1` (below). Stamping the producing
    ///     connection here would rewrite the current URL/history back to the old target, so reloading
    ///     or sharing the finished link would silently discard the user's newer live edits and reopen
    ///     the page on the wrong server/database. The producing connection is still kept in the result
    ///     snapshot (`tab.result.{url,user,database}`) for rendering, download and Back/Forward
    ///     restore, so nothing about the displayed result is lost.
    ///   - An editor-only entry (`fromRun` false): no reproducible run, so use the live connection.
    ///   - A legacy snapshot predating the url/user snapshot (unknown producing connection): treated
    ///     as diverged, so `run=1` is dropped and the live connection is stamped (fail closed) rather
    ///     than claiming the legacy result is reproducible on the live server (see below).
    const run_snapshot = fromRun ? tab.result : null;
    /// See `liveDivergedFromRun` for the identity semantics (an unknown producing connection —
    /// a legacy snapshot without `url`/`user` — always counts as diverged, fail closed).
    const live_diverged = liveDivergedFromRun(run_snapshot);
    const use_snapshot = !!run_snapshot && !live_diverged;
    const entry_database = use_snapshot ? run_snapshot.database : selected_database;
    const entry_server = use_snapshot ? run_snapshot.url : url_elem.value;
    const entry_user = use_snapshot ? run_snapshot.user : user_elem.value;
    const carries_run = fromRun && !live_diverged;
    /// This write just made the current entry stop requesting the deferred startup auto-run (see
    /// `deferred_run_cancelled` above `reconcileStartup`): every editor-only writer that can drop
    /// `run=1` — a query/param edit, a tab switch, a database-panel click, a connection-field edit,
    /// and any future one — funnels through `writeHistoryEntry`, so no caller needs to remember to
    /// cancel it individually. Setting it once the gate has already fired (e.g. from `saveHistory`,
    /// when the deferred run itself completes) is harmless: the flag is never consulted again after
    /// `reconcileStartup` has made its decision.
    if (!carries_run) deferred_run_cancelled = true;

    const state = {
        query: tab.query,
        params: tab.params,
        result: tab.result || null,
        tabId: tab.id,
        tabName: tab.title,
        /// Stamp the connection identity (server address and user) this entry is reproducible against
        /// (the producing connection for a matching run entry, the live one otherwise; see above) so
        /// `window.onpopstate` can restore this entry's `database=` selection only while the live
        /// connection still matches (see the restore gate there). These values survive a page
        /// reload, unlike the earlier `connectionGeneration` counter, which reset to `0` on reload
        /// and could then both restore a different connection's database and stop restoring the live
        /// connection's. The password is deliberately never serialized (here or in the URL), so it
        /// is not part of the identity: the selected database is a namespace on (server, user) and
        /// survives re-authentication with a different password on the same server/user.
        connectionServer: entry_server,
        connectionUser: entry_user,
        /// The run identity this entry currently reflects (see `run_epoch`): the still-running launch
        /// while the tab is in flight (so a mid-run `result: null` entry is stamped with the run that
        /// wrote it), otherwise the completed snapshot's id. `window.onpopstate` matches it against
        /// the tab's live state to decide whether that state stands in for a null entry.
        run_id: tab.inFlight ? tab.launchRunId : (tab.result && tab.result.run_id),
    };
    const title = "ClickHouse Query: " + (titleForDoc || tab.query);
    /// Once the tab has materialized, its live `colorModes` / `pinnedColumns` objects are the
    /// authoritative display state: URL reconciliation and per-column toggles mutate them in place,
    /// and a rerun nulls `tab.result` entirely, so the snapshot's `color_modes` / `pinned_columns`
    /// may lag them or be missing (e.g. a snapshot saved with the default palette stores none, then
    /// a shared link's URL modes are applied on top). Serialize the live state, and mirror it into
    /// the snapshot so the IndexedDB persistence (`scheduleSave` below) and the history-state copy
    /// carry it too. A tab whose stored result has NOT been rendered yet keeps its snapshot's saved
    /// state: its `colorModes` / `pinnedColumns` are still the `makeTab` placeholders and must not
    /// clobber the saved ones.
    let color_modes = tab.result && tab.result.color_modes;
    let pinned_columns = tab.result && tab.result.pinned_columns;
    if (tab.materialized) {
        color_modes = tab.colorModes;
        pinned_columns = tab.pinnedColumns;
        if (tab.result) { tab.result.color_modes = tab.colorModes; tab.result.pinned_columns = tab.pinnedColumns; }
    }
    /// `carries_run` (rather than the raw `fromRun`) drops `run=1` when the live connection/database
    /// diverged from the one the displayed result was produced against: auto-running the live target
    /// on reload would not reproduce it (and must not fire a write against the wrong server/database).
    /// The producing user/server/database are serialized into the URL and stamped into the state so
    /// Back/Forward can restore this entry's `database=` only while the live connection still matches.
    const history_params = buildHistoryParams(tab.params, tab.title, carries_run, color_modes, pinned_columns, entry_user, entry_server, entry_database);
    let history_url = window.location.pathname;
    if (history_params.length > 0) history_url += '?' + history_params.join('&');
    history_url += '#' + toBase64(tab.query);

    if (!cur || unchanged || (forceReplace && sameTab)) {
        history.replaceState(state, title, history_url);
    } else {
        history.pushState(state, title, history_url);
    }
    document.title = title;
    tab.lastSavedQuery = tab.query;
    renderTabBar();
    scheduleSave();
}

/// True when the tab's editor (query + params) still exactly matches the query/params that
/// produced its current result, i.e. re-running the editor would reproduce what is shown. The
/// editor-only history writers use it to decide whether to keep `run=1` on the entry: a shared
/// `run=1` link whose result is not snapshotted (an image or an oversized result) must stay
/// re-runnable across a tab switch or rename, but the marker must be dropped the moment the
/// editor diverges from the produced result so an unrun edit is never auto-executed on reload.
/// `result.query` is the FULL editor text for a single "Run" and for a multi-query "Run all"
/// (both store the editor into `tab.query` and into the snapshot), so the two are equal while
/// the tab is clean; a "Run selected" result stores only the selected statement, so it compares
/// unequal to the full editor and conservatively drops the marker (its URL hash is the whole
/// editor and could not reproduce that single-statement result anyway).
/// The selected database is part of "what would re-run": a `run=1` URL also carries `database=`
/// from the live selection, so if the panel selection has moved away from the database that
/// produced the result, re-running would hit a different database. Drop the marker in that case
/// (comparing in canonical effective form — `effectiveDatabase` — so an absent/empty selection
/// means the server default and an explicit spelling of the server's current database, as carried
/// by a shared/restored `?database=` snapshot, denotes that same target), so a database-only
/// selection change never leaves a shared/reloaded `run=1` link auto-running against the wrong
/// one, while a semantically no-op click on the already-current row keeps the marker. A snapshot
/// produced on a different SERVER is out of scope here: `writeHistoryEntry`'s `live_diverged`
/// compares the connections and drops `run=1` regardless of what this database check says.
function tabReflectsRun(tab) {
    return !!(tab && tab.result && tab.result.ran
        && tab.query === tab.result.query
        && JSON.stringify(tab.params || {}) === JSON.stringify(tab.result.params || {})
        && effectiveDatabase(selected_database) === effectiveDatabase(tab.result.database));
}

/// Refresh the current browser-history entry in place from the given tab's captured editor
/// state. Called when leaving a tab, and on every trusted editor edit, so a later Back/Forward
/// to its entry (or a reload) restores the latest edit instead of the last run/URL snapshot.
/// Without this, an edit made after the last run lives only in memory, and the next `popstate`
/// would restore the stale entry (still holding the old query) and overwrite it. The `run=1`
/// marker is preserved while the editor still reflects the produced run (`tabReflectsRun`) and
/// dropped once it diverges, so an unrun edit never becomes auto-runnable while a clean tab
/// stays reproducible from a shared `run=1` link.
///
/// When an entry already exists it must belong to this tab — refreshing another tab's entry
/// would clobber it, so bail in that case. The bail must still make the deferred-run decision,
/// though: `history.state` survives a reload, so during startup the current entry can still
/// belong to a tab of the PREVIOUS page instance while the active tab is only the fresh
/// bootstrap tab (`reconcileStartup` rebinds them later). A trusted mutation in that window — a
/// database-panel click, a connection edit, a tab operation — reaches this bail instead of
/// `writeHistoryEntry`, yet it moved the live target away from what the deferred `run=1`
/// auto-run was armed for, so it must cancel that run exactly as the entry write would have
/// (see `deferred_run_cancelled` above `reconcileStartup`). The same `carries_run` rule as
/// `writeHistoryEntry` is applied: cancel unless the tab still reflects a run whose producing
/// connection matches the live one. Setting the flag on a post-startup bail is harmless — it is
/// never consulted again after `reconcileStartup` has made its decision.
///
/// When there is NO state yet we still seed one: a
/// fresh load leaves `history.state` null until the first `syncHistory`/`postAll`, and the very
/// first trusted edit can land before `reconcileStartup` runs any of those (the no-saved-tabs
/// bare-URL path and the dirty-startup merge never call them). That initial entry is the page's
/// own and conceptually belongs to the active tab, so replace it in place (`writeHistoryEntry`
/// uses `replaceState` when there is no state, never pushing a spurious entry). Seeding records
/// the edit in `history.state`, the URL hash and `lastSavedQuery`; otherwise the stale URL hash
/// stays authoritative and the next reload either reopens a stale tab (bare URL) or overwrites
/// the persisted live tab (dirty-startup merge) with the pre-edit query.
function refreshCurrentHistoryEntry(tab) {
    if (!tab) return;
    const cur = history.state;
    if (cur && cur.tabId !== tab.id) {
        if (!(tabReflectsRun(tab) && !liveDivergedFromRun(tab.result))) deferred_run_cancelled = true;
        return;
    }
    writeHistoryEntry(tab, undefined, /*forceReplace=*/ true, /*fromRun=*/ tabReflectsRun(tab));
}

/// Called after an actual run: stash the result snapshot on the tab that ran (this is what makes
/// the tab "have a result", hence visible in the bar) and record history. `tab` defaults to the
/// active tab (color-mode / popstate callers), but the run path passes the tab it launched in,
/// which may have become inactive: for a background tab we persist the snapshot and refresh the
/// bar, but must NOT touch the browser history / URL / document title — those follow the ACTIVE
/// tab, and hijacking them to a background tab's query would break Back/Forward and reload.
function saveHistory(stateData, titleForDoc, tab) {
    tab = tab || getActiveTab();
    if (!tab) return;
    /// Adopt the launch-time editor text only while the tab's draft still matches it. A run can
    /// finish in the background after the user edited the query and switched away: by then
    /// `captureActiveTab` (or the live input handler) has saved the newer draft into `tab.query`,
    /// and overwriting it with the old launch text would lose that draft. The statement that
    /// produced the result is still recorded in `result.query` below either way.
    const query_unchanged = tab.launchQuery === undefined || tab.query === tab.launchQuery;
    if (query_unchanged) tab.query = stateData.query;
    /// The same "draft still matches the launched run" predicate for the PARAMETERS: editing a
    /// `param_*` input while the run was in flight updates `tab.params`, and the history entry /
    /// URL below is written from `tab.params` — stamping `run=1` on it would let a reload or a
    /// shared link rerun different bindings than the result currently shown. `stateData.params`
    /// is the launch-time snapshot the run actually executed with (same comparison as
    /// `tabReflectsRun` uses against `result.params`).
    const params_unchanged = JSON.stringify(tab.params || {}) === JSON.stringify(stateData.params || {});
    /// The entry may be auto-runnable only when this run executed the FULL editor content its URL
    /// hash will carry ("Run" on a single-statement editor, "Run all", or a selection spanning
    /// every statement). A partial run — one statement of a multi-statement editor — writes the
    /// whole editor into the hash, and stamping `run=1` on that would make a reload of a page
    /// opened with `run=1` execute the statements the user deliberately did NOT run (e.g. running
    /// just `SELECT 1` out of `SELECT 1; DROP TABLE t` must not produce a URL that replays the
    /// `DROP`). The editor-only writers already enforce this via `tabReflectsRun`, whose
    /// `result.query` comparison fails for a partial run; this is the same rule for the run path.
    const full_editor_run = stateData.fullEditor === true;
    tab.result = {
        ran: true,   /// marks a genuine run; the tab bar's visibility keys off this
        /// The single statement that produced this result (in multi-query mode it differs
        /// from the editor text in tab.query); used for rendering/graph-detection/downloads.
        query: stateData.resultQuery ?? stateData.query,
        params: stateData.params,    /// the params that produced this result
        /// The default database in effect when this result was produced, so navigating back to
        /// this entry (or reloading its `run=1` URL) reproduces the run and download against the
        /// same database rather than the current panel selection or the server default.
        database: stateData.database,
        /// The server address and user that produced this result, so a download after navigating
        /// back to this entry reproduces it against the same connection even when the live
        /// connection has since changed. The password is deliberately never stored in history.
        url: stateData.url,
        user: stateData.user,
        format: stateData.format,
        ok: stateData.ok,
        data: stateData.data,
        /// Per-statement snapshots for a multi-query ("Run all") result; null for single-query
        /// runs and for multi-query runs too large to snapshot (see `postMulti`).
        multi: stateData.multi ?? null,
        /// Per-column color coding modes in effect when this result was produced. Travels with the
        /// snapshot so re-activating the tab (or navigating to its entry / reloading) restores and
        /// re-applies the same coloring; a later toggle updates it via `persistColorModes`.
        color_modes: tab.colorModes,
        /// Pinned columns in effect when this result was produced; travels with the snapshot so
        /// re-activating the tab (or navigating / reloading) restores them, like `color_modes`.
        pinned_columns: tab.pinnedColumns,
        /// The run identity that produced this result (see `run_epoch`). A completing run still owns
        /// its tab here (the caller bailed on a superseding `reqNum`), so `tab.launchRunId` is this
        /// run's. Lets `window.onpopstate` recognize the mid-run history entry this run wrote —
        /// which carries the same `run_id` — as belonging to the live snapshot.
        run_id: tab.launchRunId,
        elapsed_ns: stateData.elapsed_ns,
    };
    if (tab.id === activeTabId) {
        /// This entry was produced by an actual run, so it may carry `run=1` (a reload/shared link
        /// re-runs it). Editor-only writers (`syncHistory`/`refreshCurrentHistoryEntry`) never do.
        /// When the draft diverged from the launch text OR its parameters diverged from the ones
        /// the run executed with, the entry carries an UNRUN draft, which must never be
        /// auto-runnable (see `writeHistoryEntry` on the `run=1` invariant). A partial run of a
        /// multi-statement editor is equally not auto-runnable (see `full_editor_run` above).
        writeHistoryEntry(tab, titleForDoc, /*forceReplace=*/ false, /*fromRun=*/ query_unchanged && params_unchanged && full_editor_run);
    } else {
        /// Background run finished: reflect its new result in the tab bar and persist it, without
        /// disturbing the active tab's URL/history entry.
        renderTabBar();
        scheduleSave();
    }
}

/// Record a history entry for the active tab on tab switch / rename. Reuses the tab's
/// existing result (or none); does NOT fabricate a result, so a never-run single tab
/// stays result-less and the tab bar stays hidden. Keeps the entry's `run=1` marker while the
/// editor still reflects the produced run (`tabReflectsRun`) so switching INTO a run-backed tab
/// leaves its shared `run=1` URL as re-runnable as `saveHistory` left it; a result-less or
/// edited tab reports false and the marker is dropped.
function syncHistory() {
    const tab = getActiveTab();
    if (!tab) return;
    writeHistoryEntry(tab, undefined, /*forceReplace=*/ false, /*fromRun=*/ tabReflectsRun(tab));
}

/// Resolve which tab a history state refers to. The `tabId` is the AUTHORITATIVE, stable
/// identity: when the state carries one it wins, and we never fall back to matching by title.
/// A same-titled tab may be an unrelated one the user has since renamed to the closed tab's
/// old title, and adopting it would let Back/Forward overwrite that live tab's query/result.
/// The title fallback exists ONLY for legacy entries predating `tabId`. When a state's
/// `tabId` names a tab that was closed, recreate a fresh tab (disambiguating its title) so
/// the navigation is non-destructive instead of hijacking an existing tab.
function resolveTabForState(state) {
    let tab = state.tabId && tabs.find(t => t.id === state.tabId);
    if (!tab && !state.tabId && state.tabName) tab = tabs.find(t => t.title === state.tabName);
    if (!tab) {
        const title = state.tabId ? uniqueTitle(state.tabName) : state.tabName;
        tab = makeTab(title, state.query);
        tabs.push(tab);
    }
    return tab;
}

window.onpopstate = function(event) {
    /// A Back/Forward navigation supersedes the page-load URL that `reconcileStartup` is still
    /// reconciling in the background. Its bootstrap state (`current_url`, `url_query`, `url_tab_name`,
    /// `run_immediately`, `url_color_modes`) was snapshotted once at load, so if this `popstate`
    /// lands before reconciliation finishes its `loadFromDb`/`activateTab`/`updateQueryParams`
    /// awaits, that older reconcile could still switch back to the original tab, re-apply the
    /// original URL params/colors and fire the original deferred `run=1` on top of the entry the
    /// user just navigated to. Mark the workspace dirty — exactly as tab switches, closes and
    /// connection edits do — so every remaining `!bootstrap_dirty`-gated branch of reconciliation
    /// (the dirty-startup merge, the URL parameter restore and the auto-run) yields to this
    /// navigation instead of overwriting it. A genuine Back/Forward is a trusted event, so it is
    /// not filtered as synthetic; once reconciliation has settled this is a no-op (`bootstrap_settled`).
    markBootstrapDirty(event);
    if (!event.state) return;
    captureActiveTab();
    /// `buildHistoryParams` serializes the `url`/`user` in effect when this entry was written
    /// (omitted when they equal the defaults below) into the query string, not into `event.state`
    /// itself. The browser has already updated `location.href` to this entry's URL by the time
    /// `popstate` fires, so read the connection back from there and restore it — otherwise the
    /// live connection inputs stay on whatever server/user was active before the Back/Forward,
    /// and a Run launched from this "restored" entry would execute against the wrong target.
    const popped_url = new URL(location.href);
    const target_server = popped_url.searchParams.get('url')
        || (opened_locally ? 'http://localhost:8123/' : location.origin);
    const target_user = popped_url.searchParams.get('user') || '';
    if (url_elem.value !== target_server || user_elem.value !== target_user) {
        url_elem.value = target_server;
        user_elem.value = target_user;
        /// The password that authenticated this entry's `target_server`/`target_user` is deliberately
        /// never persisted to history, so it cannot be recovered here. Leaving the previous
        /// connection's password attached to a different restored server/user would submit `B`'s
        /// password against `A` on the next run; clear it and let the user re-enter it (the credential
        /// refresh below then reports the real state for the restored connection).
        password_elem.value = '';
        /// A Back/Forward that lands on a different connection must replay the same side effects a
        /// real connection edit performs, not merely reset the connection-scoped caches: re-ping the
        /// restored host and refresh its `ok`/`fail` badge, recompute the Documentation link for the
        /// new server, and clear the stale credential badge. Assigning `.value` above fires none of
        /// the input listeners, so dispatch synthetic `input` events on the connection inputs — every
        /// registered listener (`checkURL`, `updateDocsURL`, `resetCredentialsStatus` and
        /// `resetConnectionScopedState`) then runs exactly as it would for a typed edit. These carry
        /// `isTrusted === false`, so `markBootstrapDirty` ignores them; this navigation already marked
        /// the workspace dirty above.
        ///
        /// Guard the replay so `resetConnectionScopedState` skips its history restamp: the target tab
        /// state is not installed yet (`activeTabId`/`tab.query` are rebound below) and `history.state`
        /// is already the popped entry, so a restamp would corrupt this time-travel target with the
        /// leaving tab's newer state. `onpopstate` restores the entry/URL authoritatively itself.
        restoring_connection_from_history = true;
        try {
            [url_elem, user_elem, password_elem].forEach(el => el.dispatchEvent(new Event('input')));
        } finally {
            restoring_connection_from_history = false;
        }
    }
    const tab = resolveTabForState(event.state);
    /// Keep this history entry's identity in sync with the tab it actually resolves to, restamping
    /// BOTH the state's `tabId`/`tabName` and the URL's `tab=` key. Two cases need it:
    ///   - The entry named a now-closed tab and we recreated a fresh one (`tabId` changed): adopt
    ///     the new id so repeated Back/Forward lands on the same recreated tab instead of spawning
    ///     a duplicate each time.
    ///   - The entry's `tabId` still resolves to a live tab, but that tab's title has since changed
    ///     (e.g. the startup dirty-merge de-conflicted a live bootstrap tab's title): the entry/URL
    ///     still hold the stale `tabName`.
    /// In both cases, without the restamp a later reload of this URL would make startup
    /// reconciliation match a persisted tab by the stale title and overwrite it with this entry's
    /// query. (Normal and legacy title-only entries already match and are left untouched.)
    if (event.state.tabId && (event.state.tabId !== tab.id || event.state.tabName !== tab.title)) {
        const restamped_url = new URL(location.href);
        restamped_url.searchParams.set('tab', tab.title);
        history.replaceState({ ...event.state, tabId: tab.id, tabName: tab.title },
            document.title, restamped_url.href);
    }
    activeTabId = tab.id;
    tab.query = event.state.query;
    /// This history entry is now the tab's URL-synced query, so it is also the query the saved
    /// tab is "in sync" with: keep `lastSavedQuery` aligned with it. Otherwise a later edit and
    /// reload (while the URL still holds this entry) would be misread by startup reconciliation
    /// as a fresh external URL and overwrite the edit (`lastSavedQuery` would still point at the
    /// newer entry that `writeHistoryEntry` last recorded, not at this one).
    tab.lastSavedQuery = event.state.query;
    if (event.state.params) tab.params = event.state.params;
    /// Restore the connection-scoped selected database from the navigated URL — but ONLY when the
    /// entry still belongs to the live connection. The connection (server address and user) was just
    /// restored from this entry above, so a stamped entry normally passes this gate; the check still
    /// matters as a correctness guard — it fails closed for an unstamped legacy entry (see below) and
    /// for the edge where the entry's connection could not be reproduced — so we never import an
    /// entry's `database=` into a connection it does not belong to (e.g. replaying a server-B entry's
    /// `database=` against server A). Match on the entry's stamped server address and user
    /// (`writeHistoryEntry`) — a durable identity that survives a reload and never collides across
    /// connections, unlike the earlier process-local `connectionGeneration` counter (it reset to `0`
    /// on reload, so afterwards it could both restore a different connection's database into the live
    /// connection and stop restoring the live connection's own entries). The user is compared as an
    /// EFFECTIVE user (`effectiveConnectionUser`) that folds in any userinfo embedded in the server
    /// URL, so `http://alice@host:8123/` and `http://bob@host:8123/` with an empty user field are kept
    /// distinct even though `sameServerAddress` sees the same endpoint; without this a Back/Forward
    /// could restore one user's selection into another user's session on the same host. Server
    /// addresses are compared via `sameServerAddress`, tolerating
    /// cosmetic differences (a root-path trailing slash, a default port) but keeping the query string
    /// significant, since it is part of the request target (a different cluster/namespace/settings).
    /// The password is never part of the identity — it is never serialized and is unknowable after a
    /// reload — so a same server/user entry restores its database even across a password change: the
    /// selected database is a namespace on (server, user), and wrong credentials fail loud on the next
    /// run rather than exposing another server's data.
    /// `location` already reflects the navigated entry here (and after the restamp above); an absent
    /// `database=` means the server default.
    ///
    /// An entry with no stamp (`connectionServer` undefined — written before this feature) cannot be
    /// proven to belong to the live connection, and it carries no `database=` of its own (it ran
    /// against the server default of whatever connection was live then). Leaving the current, newer
    /// `selected_database` in place would silently send the next `Run` to that database while the
    /// displayed entry/URL describe a server-default query. Fail closed: drop the selection so
    /// Back/Forward to such an entry targets the server default it actually represents.
    if (event.state.connectionServer === undefined) {
        if (selected_database !== null) {
            selected_database = null;
            stampSelectedDatabaseConnection();
            applySelectedDatabaseHighlight();
        }
    } else if (sameServerAddress(event.state.connectionServer, url_elem.value)
        && effectiveConnectionUser(event.state.connectionServer, event.state.connectionUser)
            === effectiveConnectionUser(url_elem.value, user_elem.value)) {
        selected_database = new URL(location.href).searchParams.get('database');
        /// The gate above confirmed the entry belongs to the live connection, so record it as the
        /// connection this restored selection belongs to (keeps `resetConnectionScopedState`'s later
        /// identity comparison meaningful after a history navigation).
        stampSelectedDatabaseConnection();
        applySelectedDatabaseHighlight();
    }
    /// Does this entry carry a genuine result snapshot (modern nested or legacy flat)? An entry
    /// written while its tab was mid-run does NOT: a run nulls `tab.result` at launch and only
    /// reinstalls it on completion, and a background run that finishes in another tab reinstalls
    /// the result only in memory — it never rewrites the null entry it left behind (leaving the
    /// active tab's history/URL alone). So the entry a tab was switched away from mid-run holds
    /// `result: null` even after that run has produced a result.
    const entry_has_result = !!(event.state.result
        || event.state.data != null || (event.state.multi && event.state.multi.length));
    /// Such a degenerate null entry must not be time-travelled over the tab's newer live state:
    /// aborting a still-running query and clobbering the (possibly just-completed) result would
    /// blank a tab that a normal switch would show streaming or finished. When the entry has no
    /// snapshot but the tab is still running or already holds a result, navigate to it like a
    /// plain tab switch — `activateTab` neither materializes an in-flight tab nor aborts it, so
    /// the live stream keeps rendering into its own panel and a completed result stays shown. A
    /// genuinely result-less entry whose tab also has no result falls through to the plain
    /// time-travel below, and an entry that DOES carry a snapshot keeps the documented
    /// abort-and-re-render behavior. (The connection-scoped `selected_database` was restored from
    /// the navigated URL just above, regardless of which path we take here.)
    ///
    /// The live state may only stand in for this null entry when it is provably the SAME run the
    /// entry was written for. Every entry records the identity of the run it reflects (`run_id`, see
    /// `run_epoch`), and the tab carries that identity as either the still-running launch
    /// (`launchRunId`) or the completed in-memory snapshot (`tab.result.run_id`). A `run_id` match is
    /// exact where the old query/params heuristic was not: a partial `Run selected` writes the full
    /// editor text into the entry but only the selected statement into `tab.result.query`, and a
    /// rerun of the identical text produces a NEW run — both of which a text comparison would
    /// mis-handle (blanking a completed background partial run, or attaching a later rerun to an
    /// older entry's URL). The match stays exact across reloads because every id carries the minting
    /// page instance's `run_epoch`, so a post-reload launch can never reuse the identity of an entry
    /// written before the reload — no matter which history entries survived, or whether the previous
    /// instance's state ever reached `IndexedDB`. If the tab has since launched or
    /// completed a DIFFERENT run — jump straight
    /// back to an old mid-run entry (history menu / `history.go`) after the tab moved on — the ids no
    /// longer match, so fall through to plain time-travel and render the entry itself.
    ///
    /// Legacy entries persisted before `run_id` existed carry none; for them fall back to the
    /// earlier launch-query / snapshot-query heuristic so old history still resolves.
    const entry_run_id = event.state.run_id;
    const entry_query = event.state.query;
    const entry_params = JSON.stringify(event.state.params || {});
    const live_is_entry_run = entry_run_id != null
        ? ((tab.inFlight && tab.launchRunId === entry_run_id)
            || (tab.result && tab.result.run_id === entry_run_id))
        : ((tab.inFlight && tab.launchQuery === entry_query)
            || (tab.result && tab.result.query === entry_query
                && JSON.stringify(tab.result.params || {}) === entry_params));
    if (!entry_has_result && live_is_entry_run) {
        activateTab(tab.id).then(scheduleSave);
        return;
    }
    /// Adopt the entry's result snapshot (its own producing query/params), or clear it. This
    /// avoids leaving a stale snapshot attached to a different query. Modern entries nest the
    /// snapshot under `result`; legacy flat entries (predating per-tab state) store the produced
    /// result at the TOP level. Normalize such a flat entry into a nested snapshot on `tab.result`
    /// (which `materializeResult` renders) rather than treating it as "no result" — otherwise the
    /// tab bar would hide despite a visible result and the next persist/switch would drop the
    /// restored snapshot. A truly result-less entry stays null.
    if (event.state.result) {
        tab.result = event.state.result;
    } else if (event.state.data != null || (event.state.multi && event.state.multi.length)) {
        const flat = event.state;
        tab.result = {
            ran: true,
            query: flat.query,
            params: flat.params || {},
            database: flat.database,
            format: flat.format,
            ok: flat.ok,
            data: flat.data ?? null,
            multi: flat.multi ?? null,
            color_modes: flat.color_modes || {},
            pinned_columns: flat.pinned_columns || {},
            elapsed_ns: flat.elapsed_ns,
        };
    } else {
        tab.result = null;
    }
    /// Back/Forward is an explicit time-travel to this entry's snapshot: stop any query still
    /// running in the target tab and force its result to be re-rendered from the entry (rather
    /// than keeping whatever is live in its panel). Routing through `activateTab` reveals the
    /// tab's panel, restores the editor + params, re-materializes the snapshot, and repaints the
    /// shared chrome + page hue, exactly like a normal switch.
    abortTabQuery(tab);
    tab.materialized = false;
    activateTab(tab.id).then(scheduleSave);
};

if (window.location.hash) {
    query_area.value = fromBase64(window.location.hash.substr(1));
    query_area.dispatchEvent(new Event('input'));
}

// Favicon changes to gray while a query is running, to indicate progress on the browser tab.
const favicon_default = document.querySelector('link[rel="icon"]').href;
const favicon_running = 'data:image/svg+xml;base64,' + btoa(atob(favicon_default.split(',')[1]).replace('#ff0', '#bbb'));

function setFavicon(href) { document.querySelector('link[rel="icon"]').href = href; }

/// True when the ACTIVE tab has a query in flight (drives the Run/Stop button and Ctrl+Enter).
function activeInFlight() { const t = getActiveTab(); return !!(t && t.inFlight); }
/// True when ANY tab (active or background) is running, so the favicon shows "running" while a
/// background query is still going even after switching to an idle tab.
function anyInFlight() { return tabs.some(t => t.inFlight); }
function refreshFavicon() { setFavicon(anyInFlight() ? favicon_running : favicon_default); }

/// Mark a tab's query as started. The favicon and the tab-title spinner reflect it immediately;
/// the Run/Stop button and autocompletion only when the tab is active (background runs are shown
/// solely on their tab title). Called by `postOne`/`postAll` only AFTER their lexer preflight has
/// produced a runnable statement: entering flight is destructive (it drops the tab's previous
/// result below), so a launch that turns out to be a no-op (a whitespace-only selection) or dies
/// in the preflight (a tokenizer failure on a huge query) must never get here — the tab then keeps
/// its result and never shows a stuck "running" state. `launchInteractionGen` is the editor
/// interaction generation snapshotted when the run was LAUNCHED (before the preflight await), so
/// an edit made while the preflight ran already disarms the late server-error highlight whose
/// offsets describe the launch-time text.
function beginFlight(tab, launchInteractionGen) {
    tab.inFlight = true;
    tab.completed = false;
    tab.progressPhase = 'running';
    /// Drop any progress snapshot left by the previous run in this tab. Otherwise a rerun would
    /// inherit the old fill (via `updateTabIndicator` below) until the first new `query-progress`
    /// event arrives, and a quick switch-away/back before that event would replay the stale
    /// "Read ..." numbers through `syncActiveTabChrome`.
    tab.progress = null;
    /// A run renders directly into this tab's live element, which is now authoritative: mark the
    /// tab materialized so switching away and back does NOT re-render it from the stored snapshot
    /// (that snapshot is lossy — images and results over 100 KB persist no data — and re-rendering
    /// would wipe the live DOM, reset chart zoom/selection, and defeat the whole point of
    /// persistent panels). Back/Forward still forces a re-render by resetting `materialized`.
    tab.materialized = true;
    /// The new run supersedes the tab's stored snapshot: the live panel is authoritative now, so
    /// drop the previous result immediately. Otherwise a debounced `persist` / `refreshCurrentHistoryEntry`
    /// (scheduled by the editor edit that preceded this run) would serialize the OLD snapshot under
    /// the NEW query text, and a rerun that is cancelled or reloaded before `saveHistory` records a
    /// fresh snapshot would reopen showing the previous result attached to the new query.
    /// `saveHistory` installs the new snapshot on completion; persist the cleared state now so a
    /// reload mid-run does not resurrect the stale one. Clear the on-screen result at the same time
    /// so the panel and the snapshot can never disagree: there is no await between here and the
    /// `clearPanel` in `postSingle`/`postMulti` (the preflight ran BEFORE flight was entered), so
    /// they just re-clear an already-empty panel, and a cancel from this point on leaves the
    /// consistent "cancelled before the first row" state.
    tab.result = null;
    clearPanel(tab);
    scheduleSave();
    updateTabIndicator(tab);
    refreshFavicon();
    /// Reveal the tab bar (with its `[+]`) the moment a run starts on an otherwise-hidden bar, so
    /// the first query on a fresh page can be backgrounded. Only rebuilds when hidden (a no-op cost
    /// once the bar is already shown), and in that case there is a single tab, so no background
    /// tab's spinner animation is reset by the rebuild.
    if (tab_bar_elem.hidden) renderTabBar();
    /// New run: no statement of it has claimed the editor's error marker yet, scoping the
    /// arbitration in `highlightQueryError` to this run. Both error-marker fields live on the
    /// TAB, and are (re)set for a background launch too: runs execute concurrently across tabs,
    /// and as globals whichever run began last would overwrite the others' arbitration state,
    /// letting a background tab's late error claim — or suppress — the foreground editor's marker.
    tab.queryErrorOwnerStart = -1;
    /// Install the launch-time editor-interaction snapshot. A late error response is only allowed
    /// to paint a highlight if the user has not returned to the editor since this run was launched
    /// (a tab switch bumps the generation too, via the synthetic events of the editor restore).
    /// The keystroke or click that triggered the run has already bumped the generation (the
    /// textarea's own handlers run before the document-level run trigger), so it is included in
    /// the snapshot; an edit made during the preflight await bumps past it and disarms the paint.
    tab.runEditorInteraction = launchInteractionGen;
    if (tab.id === activeTabId) {
        document.getElementById('run').innerText = 'Stop';
        document.getElementById('run-all').style.display = 'none';
        /// Hide any open autocompletion when a query starts running.
        closeCompletions();
        /// Drop any previous syntax-error highlight; a fresh error (if any) will be set on failure.
        clearQueryError();
    }
}

function endFlight(tab) {
    tab.inFlight = false;
    updateTabIndicator(tab);
    refreshFavicon();
    /// A run that ended without leaving a result (e.g. cancelled before the first row) on a lone
    /// tab should let the bar collapse back to its pristine hidden state. Re-render only when that
    /// hide actually applies, so the common case (bar stays visible) does not rebuild on every run.
    if (!tab_bar_elem.hidden && tabs.length <= 1 && !anyInFlight()
        && !(getActiveTab() && getActiveTab().result && getActiveTab().result.ran))
    {
        renderTabBar();
    }
    if (tab.id === activeTabId) {
        document.getElementById('run').blur();
        updateRunButtons(isMultiQuery);
    }
}

/// Run the query under cursor, or all queries intersecting the selection, in the ACTIVE tab.
async function postOne()
{
    /// The run belongs to the tab active at launch; it keeps running (in the background) even if
    /// the user switches away. The lexer preflight (`splitAllQueries` / `getQueryUnderCursor`)
    /// awaits the WASM lexer, and a tab switch during that await would swap `query_area` to another
    /// tab's content — so snapshot the editor text + selection BEFORE the await and parse the
    /// snapshot, rather than dropping a launched run just because the active tab changed. Only a
    /// newer run/cancel in the SAME tab (which bumps `tab.reqNum`, tracked by `my_run`) supersedes
    /// it. Detect an in-flight parameter restore (the token stays non-null until a restore
    /// commits) so the run sources parameters from this tab's saved snapshot, not the previous
    /// tab's stale DOM inputs.
    const tab = getActiveTab();
    if (!tab) return;
    const params_restore_pending = params_restore_pending_token !== null;
    /// Snapshot this run's parameter VALUES now, from the launching tab, before any await below:
    /// re-reading `param_*` / `getActiveTab` after an await would let a tab switch during it bind
    /// the run to another tab's parameters (a correctness bug for parameterized queries). The
    /// parameter NAMES are bound later, to the run's own tokenization of the launched text (see
    /// `extractRunParamNames`): the launch-time controls can still describe an OLDER edit while
    /// the keystroke-driven `updateQueryParams` rebuild is in flight.
    const param_values_at_launch = resolveRunParams(params_restore_pending, tab);
    /// Every value known for the launching tab: the live inputs over the tab's own saved params
    /// (the latter cover names whose inputs have not been (re)built yet, e.g. a placeholder that
    /// reappeared in the editor moments before the run).
    const param_sources = Object.assign({}, tab.params || {}, param_values_at_launch);
    /// Snapshot the connection context (server / user / password) at launch too, for the same
    /// reason: these inputs are shared, and re-reading them after the preflight await (as
    /// `postImpl` used to) would let a tab switch + connection edit during it send this run's
    /// snapshotted query to the newly entered server or identity.
    const connection = { url: url_elem.value, user: user_elem.value, password: password_elem.value };
    /// Snapshot the selected database at launch too (see the connection above): the panel selection
    /// is shared, so re-reading it after the preflight await would let a mid-await database change
    /// retarget this run. It is threaded through to `postImpl` (the request URL) and the saved
    /// result snapshot so a reload/download reproduces the run against the same database.
    const query_database = selected_database;
    /// Bump `activation_num` so a concurrent, still-awaiting `activateTab` restore bails instead of
    /// overwriting the editor after this run starts; the run itself is no longer gated on it.
    ++activation_num;
    const my_run = ++tab.reqNum;
    /// Snapshot the editor-interaction generation at launch: `beginFlight` (deferred until the
    /// preflight below has found something to run) installs it into the tab's `runEditorInteraction`.
    const launch_interaction = editorInteractionGen;
    document.body.scrollTo(0, 0);

    /// Snapshot the shared editor before any await (see above). The launch text is also recorded
    /// on the tab so `saveHistory` can tell, at completion, whether the tab's draft has since
    /// moved on (an edit made while the query ran must not be clobbered by the launch text).
    const editor_text = query_area.value;
    tab.launchQuery = editor_text;
    /// Fresh run identity for this launch (see `run_epoch`): stamped onto the mid-run history entry
    /// and the completed snapshot so a later Back/Forward can match THIS run exactly.
    tab.launchRunId = nextRunId();
    const sel_start = query_area.selectionStart;
    const sel_end = query_area.selectionEnd;
    const has_selection = sel_start !== sel_end;

    /// Bind the parameter names to the RUN's text. `currentQueryParams` may still describe the
    /// text as it was BEFORE the latest edit (its rebuild by `updateQueryParams` is async), so
    /// freezing it at launch would, for a quick `SELECT {x}` -> `SELECT {y}` edit-and-run, send
    /// `param_x` and lose `param_y`. Deriving the names from the launched text itself keeps the
    /// executed request and its recorded params consistent with the query that actually ran; when
    /// the list cannot be derived (no lexer / text too large) fall back to every value known for
    /// the launching tab (`param_sources` = live inputs over the tab's saved `params`), NOT to the
    /// live inputs alone: restoring a saved parameterized tab whose query the lexer cannot tokenize
    /// clears the `param_*` DOM while the authoritative bindings live only in `tab.params`, and
    /// sourcing the empty inputs would drop them entirely.
    const run_params = await extractRunParamNames(editor_text);
    if (my_run !== tab.reqNum) return;
    const paramValuesSnapshot = run_params === null
        ? param_sources
        : pickRunParams(run_params, param_sources);

    /// Entering flight (which drops the tab's previous result — see `beginFlight`) is deferred
    /// until the preflight has produced a statement to run: a no-op launch and a preflight
    /// failure (a tokenizer exception on a huge query) leave the tab and its result untouched.
    ///
    /// Multi-query behavior is decided from the LAUNCHED text (`splitAllQueries` /
    /// `getQueryUnderCursor(...).isMulti` on the snapshot), never from the global `isMultiQuery`
    /// flag: that flag tracks whatever the shared editor currently shows, and a tab switch during
    /// the preflight awaits rewrites it for the newly shown tab — deciding from it would let a
    /// switch to a single-statement tab downgrade this run to "single mode", recording only the
    /// statement under the cursor as the launching tab's full draft (which `saveHistory` would
    /// then install over the real multi-statement draft).
    let launched = false;
    if (has_selection) {
        const parsed = await splitAllQueries(editor_text);
        if (my_run !== tab.reqNum) return;
        /// A selection in a single-statement editor runs like a plain cursor launch below.
        if (parsed.length > 1) {
            /// Use start/end offsets from splitAllQueries to find which queries overlap with the selection.
            const selected = [];
            for (let i = 0; i < parsed.length; ++i) {
                if (parsed[i].end > sel_start && parsed[i].start < sel_end) {
                    selected.push(parsed[i]);
                }
            }

            /// A whitespace/comment-only selection intersects nothing runnable: the launch is a no-op.
            if (selected.length === 0) return;

            beginFlight(tab, launch_interaction);
            if (selected.length > 1) {
                /// The run covered the whole editor only when the selection spanned EVERY
                /// statement; only such an entry may keep `run=1` (see `saveHistory`).
                await postMulti(tab, my_run, selected, paramValuesSnapshot, editor_text, connection,
                                /*ranFullEditor=*/ selected.length === parsed.length, query_database);
            } else {
                await postSingle(tab, my_run, selected[0].query, editor_text, paramValuesSnapshot, selected[0].queryStart, connection, query_database);
            }
            launched = true;
        }
    }
    if (!launched) {
        const under = await getQueryUnderCursor(editor_text, sel_start);
        if (my_run !== tab.reqNum) return;
        beginFlight(tab, launch_interaction);
        /// Highlight and focus the chosen query only when this tab is still active: a background
        /// run (the user switched away during the preflight) must not move the foreground editor's
        /// selection or steal focus.
        if (tab.id === activeTabId) {
            if (under.selStart !== null) query_area.setSelectionRange(under.selStart, under.selEnd);
            focusEditorForRun();
        }
        /// When the launched text held several statements, preserve the full textarea content in
        /// history/URL even though only the query under the cursor ran (so refresh restores all
        /// queries).
        await postSingle(tab, my_run, under.query, under.isMulti ? editor_text : undefined, paramValuesSnapshot, under.queryStart, connection, query_database);
    }

    /// Reset the run/favicon state only if this run still owns its tab's in-flight state; a newer
    /// run or cancel in the same tab (which bumped `tab.reqNum`) has taken over otherwise.
    if (my_run === tab.reqNum) endFlight(tab);
}

/// Run all queries from the textarea in the ACTIVE tab.
async function postAll()
{
    const tab = getActiveTab();
    if (!tab) return;
    /// See `postOne`: snapshot the editor before the lexer await, keep the launched run alive on a
    /// tab switch, and supersede only on a newer run/cancel in the same tab (`my_run`/`tab.reqNum`).
    const params_restore_pending = params_restore_pending_token !== null;
    /// See `postOne`: parameter values are snapshotted from the launching tab before any await
    /// (a tab switch during one must not rebind the run); the names are bound to the run's own
    /// text below.
    const param_values_at_launch = resolveRunParams(params_restore_pending, tab);
    const param_sources = Object.assign({}, tab.params || {}, param_values_at_launch);
    /// See `postOne`: the connection context and selected database are snapshotted at launch so a tab
    /// switch + connection/database edit during the preflight await cannot reroute this run.
    const connection = { url: url_elem.value, user: user_elem.value, password: password_elem.value };
    const query_database = selected_database;
    ++activation_num;
    const my_run = ++tab.reqNum;
    const launch_interaction = editorInteractionGen;   /// see `postOne`
    document.body.scrollTo(0, 0);

    const editor_text = query_area.value;
    tab.launchQuery = editor_text;   /// see `postOne`: lets `saveHistory` detect a newer draft
    tab.launchRunId = nextRunId();   /// see `postOne`: fresh run identity for this launch
    const sel_start = query_area.selectionStart;

    /// See `postOne`: bind the parameter names to the run's own text, and on a no-lexer /
    /// too-large fallback send every value known for the launching tab (`param_sources`, which
    /// includes `tab.params`) rather than the possibly-empty live inputs.
    const run_params = await extractRunParamNames(editor_text);
    if (my_run !== tab.reqNum) return;
    const paramValuesSnapshot = run_params === null
        ? param_sources
        : pickRunParams(run_params, param_sources);

    /// See `postOne`: flight is entered only once the preflight has produced a statement to run.
    const parsed = await splitAllQueries(editor_text);
    if (my_run !== tab.reqNum) return;

    if (parsed.length > 1) {
        beginFlight(tab, launch_interaction);
        await postMulti(tab, my_run, parsed, paramValuesSnapshot, editor_text, connection, /*ranFullEditor=*/ true, query_database);
    } else {
        const under = await getQueryUnderCursor(editor_text, sel_start);
        if (my_run !== tab.reqNum) return;
        beginFlight(tab, launch_interaction);
        if (tab.id === activeTabId) {
            if (under.selStart !== null) query_area.setSelectionRange(under.selStart, under.selEnd);
            focusEditorForRun();
        }
        await postSingle(tab, my_run, under.query, undefined, paramValuesSnapshot, under.queryStart, connection, query_database);
    }

    if (my_run === tab.reqNum) endFlight(tab);
}
