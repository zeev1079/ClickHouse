    <!-- Code Style:

    Do not use any JavaScript or CSS frameworks or preprocessors.
    This HTML page should not require any build systems (node.js, npm, gulp, etc.)

    <style>
        :root {
            --background-color-rotate: 215;
            --background-color: oklch(96% 0.0296 var(--background-color-rotate));
            /* Top color of the active tab's gradient: same hue/lightness as the page but
               more saturated (higher chroma), fading down to the page color. */
            --active-tab-top-color: oklch(96% 0.09 var(--background-color-rotate));
            --element-background-color: #FFF;
            --element-color-ok: #080;
            --element-background-color-fail: #FEE;
            --bar-color: #FF8; /* Light bar in background of table cells. */
            --bar-color-negative: #FEE;
            /* Lightness and chroma for the heatmap/categorical cell coloring; only the hue varies.
               Light theme: a high lightness so the dark cell text stays readable on top. */
            --viz-cell-lightness: 88%;
            --viz-cell-chroma: 0.09;
            --border-color: #CCC;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --button-color: #FF0;
            --text-color: #000;
            --text-color-active: #000;
            --button-active-color: #FE0;
            --button-active-text-color: #000;
            --misc-text-color: #888;
            --error-color: #FEE; /* Light-pink on light-cyan is so neat, I even want to trigger errors to see this cool combination of colors. */
            --table-header-color: #EEE;
            --table-hover-filter: brightness(0.9);
            --link-color: #06D;
            --logo-color: #FFF;
            --border-color-selected: #F80;
            --menu-toggle-color: #000;
            --menu-icon-color: #24292f; /* Match the GitHub logo's color. */

            --progress-color: #0C4;
            --table-size-bar-color: #FFF;

            --selection-color: #FFF;
            --selection-background-color: #456;
            --current-query-background-color: #FFF4E0;

            /* Syntax highlighting palette, modelled after `clickhouse-client`. The
               textarea text is made transparent when highlighting is ready, so the
               user sees the backdrop text in these colors directly.
               Light-theme values are darker variants of the terminal palette so they
               read well on a light background. */
            --syntax-default:    var(--text-color-active);
            --syntax-keyword:    var(--text-color-active);  /* bold default fg */
            --syntax-identifier: #00838F;                    /* CYAN */
            --syntax-function:   #875F00;                    /* BROWN */
            --syntax-number:     #008700;                    /* bright green */
            --syntax-string:     #006400;                    /* GREEN */
            --syntax-qident:     #008B8B;                    /* alias / teal */
            --syntax-comment:    #757575;
            --syntax-operator:   var(--text-color-active);
            --syntax-error:      #B71C1C;

            /* Rainbow parentheses: one color per nesting depth, cycling.
               Dark variants so they read on a light background. */
            --syntax-bracket-0:  #A31515;
            --syntax-bracket-1:  #8A4B00;
            --syntax-bracket-2:  #6B5D00;
            --syntax-bracket-3:  #1B5E3A;
            --syntax-bracket-4:  #0D3C8C;
            --syntax-bracket-5:  #4A2A85;
            --syntax-bracket-6:  #8A0F42;
        }

        [data-theme="dark"] {
            --background-color-rotate: 250;
            --background-color: oklch(15% 0.0296 var(--background-color-rotate));
            /* Top color of the active tab's gradient: same hue as the page but brighter
               (higher lightness), fading down to the page color. */
            --active-tab-top-color: oklch(28% 0.0296 var(--background-color-rotate));
            --element-background-color: #000;
            --element-color-ok: #8F8;
            --element-background-color-fail: #300;
            --bar-color: #320;
            --bar-color-negative: #311;
            /* Dark theme: a low lightness so the light cell text stays readable on top. */
            --viz-cell-lightness: 38%;
            --viz-cell-chroma: 0.08;
            --border-color: #444;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --text-color: #CCC;
            --text-color-active: #FFF;
            --button-color: rgb(250 255 105);
            --button-text-color: #000;
            --button-active-color: #FE0;
            --button-active-text-color: #000;
            --misc-text-color: #888;
            --error-color: #400;
            --table-header-color: #102020;
            --table-hover-filter: contrast(0.9) brightness(2);
            --link-color: #4BDAF7;
            --logo-color: #444;
            --border-color-selected: #FF0;
            --menu-toggle-color: #FF0;
            --menu-icon-color: #FFF; /* Match the GitHub logo's color. */

            --progress-color: #FF0;
            --table-size-bar-color: #104050;

            --selection-color: #000;
            --selection-background-color: #FF8;
            --current-query-background-color: #442;

            /* Dark-theme palette uses the actual xterm 16-color values that
               `clickhouse-client` renders to in a dark terminal. */
            --syntax-keyword:    var(--text-color-active);   /* bold default fg */
            --syntax-identifier: #00CDCD;                     /* CYAN */
            --syntax-function:   #CDCD00;                     /* BROWN */
            --syntax-number:     #00D700;                     /* rgb666(0,4,0) */
            --syntax-string:     #00CD00;                     /* GREEN */
            --syntax-qident:     #00D7D7;                     /* rgb666(0,4,4) */
            --syntax-comment:    #9E9E9E;
            --syntax-operator:   var(--text-color-active);
            --syntax-error:      #FF6E40;

            /* Rainbow parentheses: one color per nesting depth, cycling.
               Light variants so they read on a dark background. */
            --syntax-bracket-0:  #FF9999;
            --syntax-bracket-1:  #FFD3A6;
            --syntax-bracket-2:  #F7FCC0;
            --syntax-bracket-3:  #9BFAB8;
            --syntax-bracket-4:  #BFF3FF;
            --syntax-bracket-5:  #D7C4FC;
            --syntax-bracket-6:  #FFB0DE;
        }

        ::selection {
            color: var(--selection-color);
            background-color: var(--selection-background-color);
        }

        *
        {
            box-sizing: border-box;
            /* For iPad */
            margin: 0;
            border-radius: 0;
            tab-size: 4;
        }

        html, body
        {
            height: 100%;
            margin: 0;
            /* This enables position: sticky on controls */
            overflow: auto;
            scrollbar-color: var(--border-color) var(--element-background-color);
        }

        html
        {
            /* The fonts that have full support for hinting. */
            font-family: Roboto Mono, Liberation Sans, DejaVu Sans, sans-serif, Noto Color Emoji, Apple Color Emoji, Segoe UI Emoji;
            background: var(--background-color);
            color: var(--text-color);
        }

        body
        {
            position: relative;
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto 1fr;
            grid-template-areas: "terminal terminal" "menu main";
        }

        #menu
        {
            padding: 0.25rem;
            grid-area: menu;
            position: sticky;
            top: 0;
            z-index: 1;
            height: calc(100vh - var(--terminal-height, 0px));
            align-self: start;
            background: var(--table-header-color);
            border-right: 1px solid var(--border-color);
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-areas: "databases-icon" "contents" "terminal-icon" "docs-icon" "github-icon";
            cursor: e-resize;
            min-height: 0;
            overflow-x: visible;
            overflow-y: clip;
        }

        /* When the databases list is expanded, lay out the bottom icons (Web
           Terminal, Documentation, GitHub) side by side instead of stacked, so the list of
           databases/tables gets more vertical space. */
        #menu.databases-opened
        {
            grid-template-columns: auto auto 1fr;
            grid-template-areas: "databases-icon databases-hide databases-hide" "contents contents contents" "terminal-icon docs-icon github-icon";
            column-gap: 0.25rem;
        }

        #menu.databases-opened #github-icon
        {
            justify-self: start;
        }

        #main
        {
            overflow: auto;
            grid-area: main;
            padding: 0.5rem;
            position: relative;
            z-index: 0; /* stacking context so children don't overlap #menu */
        }

        /* Tab bar: the first child of #main, scrolling vertically together with the page
           content. Sticky on the horizontal axis only (left: 0, no top) like #controls and
           #logo-container, so it stays at the left edge while a wide result is scrolled
           horizontally but still scrolls away vertically.
           The full-width gray/black strip and the top-of-main border are painted by
           ::before, which extends 0.5rem into #main's side padding. A negative left/right
           margin is NOT used for that bleed: it is clamped away under position: sticky in
           some browsers, leaving #main's padding showing to the left of the tabs. */
        #tab-bar
        {
            display: flex;
            align-items: flex-end;
            gap: 0.25rem;
            position: sticky;
            left: 0;
            /* Raise the whole bar above #controls (a later sibling that is also `position:
               sticky`, hence its own stacking context). Without this the connection drop-down
               — nested in this bar's stacking context — would render behind the query editor,
               which paints later. The bar and the editor never overlap otherwise, so this only
               affects the open drop-down. */
            z-index: 2;
            margin: -0.5rem 0 0.5rem 0; /* negative top bleeds into #main's top padding */
            /* No left padding: the bar's content edge already sits at #main's content
               edge, so the first tab lines up with the query editor and result tables.
               Top padding equals the inter-tab gap (0.25rem), so the space above the tabs
               matches the space between them. It resolves to a whole pixel at the default
               root size, avoiding the sub-pixel border rasterization a fractional value
               (e.g. 0.15rem = 2.4px) would cause between the native button and the divs. */
            padding: 0.25rem 0.5rem 0 0;
        }

        #tab-bar::before
        {
            content: "";
            position: absolute;
            /* Cover the tab bar and bleed 0.5rem into #main's side padding for a full-width
               strip; +1px at the bottom so the border sits exactly at each tab's bottom
               (the active tab covers its own 1px segment via its box-shadow). */
            inset: 0 -0.5rem -1px -0.5rem;
            z-index: -1;
            background: var(--table-header-color); /* light gray strip */
            border-bottom: 1px solid var(--border-color);
        }

        /* The `display: flex` above (id specificity) overrides the user-agent
           `[hidden] { display: none }` rule, so restore hiding explicitly with a
           selector that wins on specificity. */
        #tab-bar[hidden]
        {
            display: none;
        }

        [data-theme="dark"] #tab-bar::before
        {
            background: #000; /* pure black strip */
        }

        #tabs
        {
            display: flex;
            align-items: flex-end;
            gap: 0.25rem;
            /* Take only the width of the tabs (do not grow), so the [+] button sits
               directly after the last tab. No overflow clipping here: it would force
               overflow-y to clip and cut off the 1px the active tab uses to merge with
               the main area. When there are many tabs they compress (see .tab). */
            flex: 0 1 auto;
            min-width: 0;
        }

        .tab
        {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            /* Stay at natural width when there is room; compress (title ellipsizes) when
               there are many tabs, instead of overflowing. */
            flex: 0 1 auto;
            min-width: 0;
            max-width: 12rem; /* keep tabs compact; longer titles ellipsize (see .tab-title) */
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            color: var(--text-color);
            /* No bottom border: the single top-of-main line is the strip's border-bottom,
               and every tab sits directly on it. A per-tab bottom border would render a
               second line 1px below it. */
            border: 1px solid var(--border-color);
            border-bottom: none;
            /* Anchor for the absolutely-positioned progress fill and the active tab's
               bottom-border eraser (::after). */
            position: relative;
            /* Inactive tabs are tinted by the hash of their own query text, mirroring
               the page background formula, so different queries get distinct colors. */
            background: oklch(96% 0.0296 var(--tab-hue, var(--background-color-rotate)));
        }

        [data-theme="dark"] .tab
        {
            background: oklch(15% 0.0296 var(--tab-hue, var(--background-color-rotate)));
        }

        /* The active tab uses the page background and paints over its segment of the strip's
           border line with a page-background box-shadow, so its title reads as part of the
           main area below. The shadow covers 2px (not 1px): on the sticky compositing layer
           a 1px shadow and the 1px border can round to different device rows, leaving a
           faint sliver of the border visible; 2px guarantees full coverage. The extra pixel
           is the page background (the merge), not a line, and it adds no layout offset. */
        .tab.active
        {
            /* Gradient: more saturated (light) / brighter (dark) at the top, fading to the
               page color at the bottom so it still merges with the main area below. */
            background: linear-gradient(var(--active-tab-top-color), var(--background-color));
            color: var(--text-color-active);
            font-weight: bold;
            position: relative; /* for the ::after that opens the bottom border */
        }

        /* Erase the top-of-main border only in the active tab's interior (between its side
           borders), so the bottom looks open and merges with the main area while the side
           borders still connect to the line at the bottom corners. left/right: 0 are inset
           by the 1px side borders (relative to the padding box); the 2px height robustly
           covers the 1px line even with sticky-layer rounding. */
        .tab.active::after
        {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -2px;
            height: 2px;
            background: var(--background-color);
        }

        .tab-title
        {
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0; /* allow the title to ellipsize when the tab is compressed */
        }

        /* Over the active tab's title the cursor indicates inline text editing. */
        .tab.active .tab-title
        {
            cursor: text;
        }

        /* While editing, let the title grow with its content instead of being clipped
           to an ellipsis, and remove the focus outline. */
        .tab-title.editing
        {
            overflow: visible;
            text-overflow: clip;
            min-width: 1ch;
            outline: none;
            color: var(--text-color-active);
        }

        /* The tab being edited drops its width cap and flexes to fit the full title. */
        .tab.editing
        {
            max-width: none;
            flex-shrink: 0;
        }

        /* Per-tab activity indicators (rendered even for inactive/background tabs):
           a translucent progress fill behind the title, a spinning hourglass while the
           tab's query runs, and a completion check-mark shown until the tab is opened.
           The title/close/status sit above the fill via z-index. */
        .tab-title, .tab-close, .tab-status
        {
            position: relative;
            z-index: 1;
        }

        .tab-progress-fill
        {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--tab-progress, 0%);
            background: var(--progress-color);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
            transition: width 0.15s linear;
        }

        .tab-status
        {
            flex-shrink: 0;
            line-height: 1;
            font-size: 1em;
        }

        .tab-spinner
        {
            display: inline-block;
            color: var(--misc-text-color);
            animation: tab-hourglass-animation 2s linear infinite;
        }

        .tab-check
        {
            color: #080;
        }

        .tab-cross
        {
            color: #c00;
        }

        @keyframes tab-hourglass-animation
        {
            0% { transform: none; }
            25% { transform: rotate(180deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(360deg); }
            100% { transform: rotate(360deg); }
        }

        .tab-close
        {
            line-height: 1;
            font-size: 1em; /* same size as the [+] glyph, so the two align vertically */
            padding: 0 0.15rem;
            color: var(--misc-text-color);
            flex-shrink: 0; /* never shrink the close icon */
        }

        .tab-close:hover
        {
            color: var(--text-color-active);
            background: var(--border-color);
        }

        /* Styled like a tab (same border, height and bottom-line alignment) and placed
           directly after the last tab. */
        #tab-add
        {
            flex-shrink: 0;
            align-self: flex-end;
            /* Center the [+] glyph so it lines up vertically with each tab's close [x]. */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem 0.6rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 100%;
            background: var(--element-background-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-bottom: none; /* sits on the strip line like the tabs (no second line) */
        }

        #tab-add:hover, #tab-add:focus
        {
            background: var(--button-color);
            color: var(--button-text-color);
        }

        /* Each tab owns one persistent result panel; only the active one is shown, the
           rest are kept alive but hidden so their rendered result (and any running query)
           survives switching away and back. */
        .tab-panel[hidden]
        {
            display: none;
        }

        /* Holds the 🔑 button and its drop-down; pushed to the far right of the tab bar
           so the connection settings sit in the top-right corner of the main area.
           `position: relative` is the containing block for the absolutely positioned
           drop-down below. */
        #connection-menu
        {
            margin-left: auto;
            /* Cancel the tab bar's 0.5rem right padding so the key's right edge lines up with
               the query editor and result tables (the right edge of #main's content). */
            margin-right: -0.5rem;
            align-self: flex-end;
            position: relative;
            flex-shrink: 0;
        }

        /* A borderless, background-less button: just the 🔑 glyph aligned to the right edge. */
        #connection-key
        {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            /* No right padding: the glyph sits flush at the right edge of the page. */
            padding: 0.25rem 0 0.25rem 0.6rem;
            cursor: pointer;
            font-size: 100%;
            line-height: 1;
            background: none;
            border: none;
            /* On active, brighten the emoji itself rather than painting a button background. */
            filter: brightness(0.85);
            transition: filter 0.1s;
        }

        #connection-key[hidden]
        {
            display: none;
        }

        #connection-key:hover, #connection-key:focus
        {
            filter: brightness(1.15);
        }

        /* The drop-down panel with the connection parameters. Anchored to the right edge
           of the 🔑 button and floating above the content below it. */
        #connection-dropdown
        {
            position: absolute;
            top: 100%;
            right: 0;
            z-index: 3;
            padding: 0.75rem;
            width: min(90vw, 34rem);
            /* The page background, so the inputs look exactly as they do in the inline top bar
               (a field on the page color, delineated by its own border) rather than blending
               into a same-colored panel. The border and shadow below set the panel apart from
               the content it floats over. */
            background: var(--background-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 0.25rem 1rem var(--shadow-color);
        }

        #connection-dropdown[hidden]
        {
            display: none;
        }

        /* Inside the drop-down the same relocated `#inputs` element is laid out in two stories:
           the url (host) fills the first row, user and password share the second. `flex-wrap`
           plus a 100% basis on the url forces the wrap; the negative top margin on the second
           row overlaps the url's bottom border so there is a single seam and no vertical gap
           (mirroring the horizontal -1px overlap the inputs already use side by side).
           `position: relative` makes `#inputs` the containing block for the status dot. */
        #connection-dropdown #inputs
        {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            position: relative;
        }

        #connection-dropdown #url
        {
            flex: 1 1 100%;
            width: auto;
        }

        #connection-dropdown #user, #connection-dropdown #password
        {
            flex: 1 1 0;
            width: auto;
            margin-top: -1px; /* overlap the url's bottom border: one seam, no gap */
        }

        #connection-dropdown #user
        {
            margin-left: 0;
        }

        /* The connection-status dot sits at the right end of the url (first) row. The inline
           layout relies on its static position after the url input; in the wrapped two-story
           layout that position moves to the next row, so pin it explicitly instead. */
        #connection-dropdown #url_status
        {
            top: 0;
            right: 0;
            transform: none;
        }

        .menu-icon
        {
            width: 2.25em;
            cursor: pointer;
            user-select: none;
            fill: var(--menu-toggle-color);
            /* Stroke-based icons (Web Terminal, Documentation) draw with `currentColor`;
               pin it to the GitHub logo's color so all three icons match. */
            color: var(--menu-icon-color);
        }

        .menu-icon:hover
        {
            transform: translate(1px, 1px);
        }

        #databases-icon
        {
            grid-area: databases-icon;
            text-decoration: none;
            display: block;
        }

        /* Drop the inline-SVG baseline gap so the icon's box hugs the glyph and the
           "hide panel" button can be centered against it. */
        #databases-icon svg
        {
            display: block;
        }

        /* Small "hide panel" button shown at the top-right corner of the menu, vertically
           aligned with the database icon. Only visible while the database panel is open. */
        #databases-hide
        {
            grid-area: databases-hide;
            display: none;
            justify-self: end;
            /* Center against the database icon: same row, aligned by vertical midpoint.
               The icon's bars span y=0..8 of a 9-unit viewBox, so their visual midpoint sits
               (0.5/9) * 2.25em = 0.125em above the row center; nudge the arrow up to match.
               font-size: inherit makes the button's em equal the icon's (buttons default to a
               smaller font), so the offset is exact and scales with zoom. */
            align-self: center;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0 0.25rem;
            cursor: pointer;
            font-size: inherit;
            transform: translateY(-0.125em);
            /* Faint color, with no change on hover. */
            color: var(--menu-toggle-color);
            opacity: 0.25;
        }

        #databases-hide svg
        {
            width: 1.25em;
            display: block;
        }

        /* Shown only while the database panel is open. */
        #menu.databases-opened #databases-hide
        {
            display: flex;
        }

        #databases
        {
            grid-area: contents;
            max-width: 25em;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
            /* The menu column is auto-sized (max-content), so the appearance of the vertical
               scrollbar (e.g. when expanding tables) would otherwise widen the whole panel by
               the scrollbar width. Reserve the gutter permanently to avoid that layout shift. */
            scrollbar-gutter: stable;
        }

        .tables:not(:empty)
        {
            margin-bottom: 1em;
        }

        #terminal-icon
        {
            grid-area: terminal-icon;
            margin-bottom: 0.25rem;
            /* Rendered as an <a> so middle-click, Shift+click, and the platform's new-tab
               modifier click (Cmd+click on macOS, Ctrl+click elsewhere) open the terminal in
               a new browser tab or window natively. color: inherit keeps the currentColor strokes from
               picking up the default link color, and display: block matches #databases-icon. */
            text-decoration: none;
            display: block;
            color: inherit;
        }

        #terminal-icon.active svg
        {
            fill: var(--button-color);
        }

        #terminal-panel
        {
            grid-area: terminal;
            display: none;
            position: relative;
            background: #000;
            border-bottom: 2px solid var(--border-color);
        }

        #terminal-panel.active
        {
            display: block;
        }

        #terminal-iframe
        {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #terminal-resizer
        {
            position: absolute;
            bottom: -0.3rem;
            left: 0;
            width: 100%;
            height: 0.5rem;
            cursor: row-resize;
            user-select: none;
            z-index: 10;
        }

        #terminal-resizer:hover, .terminal-resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color);
        }

        #docs-icon
        {
            grid-area: docs-icon;
            text-decoration: none;
            display: block;
            margin-bottom: 0.25rem;
        }

        /* This is an `<a>` whose SVG draws with `currentColor`. Pin the color across all link
           states (including `:visited`, which the generic `a:visited` rule would otherwise tint
           with `--link-color`) so the icon always matches the other menu icons. */
        #docs-icon:link, #docs-icon:visited, #docs-icon:hover, #docs-icon:active
        {
            color: var(--menu-icon-color);
        }

        #github-icon
        {
            grid-area: github-icon;
        }

        #github-icon-light, #github-icon-dark
        {
            display: none;
        }

        [data-theme="light"] #github-icon-light, [data-theme="dark"] #github-icon-dark
        {
            display: block;
        }

        .database
        {
            /* Anchor the loading hourglass, which is absolutely positioned (see below). */
            position: relative;
        }

        .database button
        {
            cursor: pointer;
            background: transparent;
            font-size: 100%;
            /* Span the full panel width so the whole row is a click target. */
            display: block;
            width: 100%;
            text-align: left;
            border: none;
            padding: 0;
            user-select: none;
            color: var(--text-color);
            &:hover {
                text-decoration: 1px underline dotted var(--text-color);
            }
        }

        .database button:hover
        {
            color: var(--button-text-color);
            background-color: var(--button-color);
        }

        .database button:focus
        {
            color: var(--button-text-color);
            background-color: var(--button-color);
        }

        .loading-hourglass
        {
            /* Pinned to the top-right of the database row so the full-width name
               button does not push it onto a new line while tables load. */
            position: absolute;
            top: 0;
            right: 0.25rem;
            color: var(--misc-text-color);
            animation: hourglass-animation 2s linear infinite;
            /* The hourglass overlays the right edge of the full-width database button.
               Let clicks pass through to the button underneath, so the row stays fully
               clickable while tables load (otherwise a click here is treated as a menu
               background click and would close the whole panel). */
            pointer-events: none;
        }

        /* `.database button.database-refresh` (not just `.database-refresh`) so it
           outranks the `.database button` rule that forces `display: block; width: 100%`,
           which would otherwise stretch the button full width and push the icon to the left. */
        .database button.database-refresh
        {
            /* Pinned to the top-right of the database row, in the same spot as the
               loading hourglass (only one of them is shown at a time). */
            position: absolute;
            top: 0;
            right: 0.25rem;
            display: inline-block;
            width: auto;
            color: var(--misc-text-color);
            line-height: 1;
            &:hover {
                text-decoration: none;
                color: var(--text-color);
            }
        }

        .no-tables
        {
            color: var(--misc-text-color);
        }

        .current
        {
            font-weight: bold;
        }

        /* Number of tables shown next to an opened database name. Kept non-bold even when the
           database is the current one (which renders the name in bold). */
        .database-table-count
        {
            font-weight: normal;
            color: var(--misc-text-color);
        }

        .table
        {
            background-repeat: no-repeat;
        }

        .table button
        {
            /* Span the full panel width so the whole row is a click target. */
            display: block;
            width: 100%;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            font-size: 100%;
            user-select: none;
            color: var(--text-color);
        }

        .table button:hover, .table button:focus
        {
            color: var(--button-text-color);
            background-color: var(--button-color);
        }

        .table-icon
        {
            width: 1em;
            height: 1em;
            vertical-align: -0.1em;
            margin-right: 0.25em;
            flex-shrink: 0;
            opacity: 0.5;
            /* The icon toggles the list of columns, so it reads as an interactive
               disclosure control: brighten it on hover and while expanded. */
            cursor: pointer;
            transition: opacity 0.1s;
        }

        .table-icon:hover,
        .table-icon.expanded
        {
            opacity: 1;
        }

        /* The list of columns shown under an expanded table. Its own opaque background
           covers the table's size bar (drawn on the whole `.table` box) so the bar does
           not bleed vertically behind the columns; each column then draws its own bar. */
        .table-columns
        {
            background-color: var(--table-header-color);
        }

        .table-column
        {
            background-repeat: no-repeat;
        }

        .table-column button
        {
            display: flex;
            align-items: baseline;
            width: 100%;
            /* Align columns with the table rows: the type icon sits at the same left edge as
               the table icon, so the two lists share a left margin. */
            padding: 0 0.25em 0 0;
            text-align: left;
            cursor: pointer;
            background: transparent;
            border: none;
            font-size: 100%;
            user-select: none;
            color: var(--text-color);
            overflow: hidden;
        }

        .table-column button:hover,
        .table-column button:focus
        {
            color: var(--button-text-color);
            background-color: var(--button-color);
        }

        .column-name
        {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1 1 auto;
            min-width: 0;
        }

        /* The data type is shown to the right, dimmed; it may be truncated when long,
           the full type (with sizes) is available in the hover balloon. */
        .column-type
        {
            flex: 0 1 auto;
            min-width: 0;
            max-width: 55%;
            margin-left: 0.5em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--misc-text-color);
            font-size: 90%;
        }

        /* Type icon to the left of the column name. Every icon is an SVG in the same 24x24
           viewBox and the same box here, so they all render at identical dimensions (both the
           line drawings for Date/DateTime and the text labels 09, Aa, [], {}, (,), T), which
           also keeps the column names aligned. */
        .column-type-icon
        {
            width: 1.4em;
            height: 1em;
            vertical-align: -0.15em;
            /* Same icon-to-name gap as the table rows (`.table-icon`). */
            margin-right: 0.25em;
            flex-shrink: 0;
            opacity: 0.5;
        }

        /* The text-label icons are SVG <text>; size them here (font-size is in viewBox units). */
        .column-type-badge text
        {
            font-family: 'Liberation Mono', 'DejaVu Sans Mono', monospace;
            font-weight: bold;
            font-size: 15px;
        }

        .columns-loading
        {
            padding: 0 0.25em 0 0;
            color: var(--misc-text-color);
            animation: hourglass-animation 2s linear infinite;
        }

        .table-addendum,
        .column-addendum
        {
            position: fixed;
            z-index: 999;
            white-space: pre;
            transform: translateY(-50%);
            color: var(--element-background-color);
            background: color-mix(in srgb, var(--text-color) 50%, var(--background-color));
            backdrop-filter: blur(4px);
            border-radius: 0.5rem;
            padding: 0.25rem;
            margin-left: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0s 0.1s;
        }

        .table-addendum::before,
        .column-addendum::before {
            content: " ";
            position: absolute;
            top: 50%;
            transform: translate(calc(-100% - 0.2rem), -50%);
            line-height: 0;
            border-width: 0.5rem;
            border-style: solid;
            border-color: transparent color-mix(in srgb, var(--text-color) 50%, var(--background-color)) transparent transparent;
        }

        .table-name:hover ~ .table-addendum,
        .table > button .table-addendum:hover,
        .column-name:hover ~ .column-addendum,
        .column-type:hover ~ .column-addendum,
        .table-column .column-addendum:hover
        {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0s 0.1s;
        }

        /* Show the balloon when the row (or one of its balloon links) is focused via the
           keyboard, mirroring the hover behaviour above. Uses `:focus-visible` (not `:focus`
           / `:focus-within`) so a mouse click - which focuses the button but not "visibly" -
           does not leave the balloon stuck open after the pointer moves away; only keyboard
           focus reveals it. `:has(:focus-visible)` covers a focused balloon link inside the
           button; the bare `:focus-visible` covers the button itself. Scoped to the row's own
           button so a focused nested column does not also reveal the table balloon. */
        .table > button:is(:focus-visible, :has(:focus-visible)) .table-addendum,
        .table-column > button:is(:focus-visible, :has(:focus-visible)) .column-addendum
        {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0s 0.1s;
        }

        /* While suppress-balloons is set on the body (set on scroll, cleared on the
           next mousemove), no balloon may appear from a :hover state. This prevents
           a different table button from scrolling under a stationary cursor and
           revealing its balloon without `mouseenter` having fired to position it. */
        body.suppress-balloons .table-name:hover ~ .table-addendum,
        body.suppress-balloons .table > button .table-addendum:hover,
        body.suppress-balloons .column-name:hover ~ .column-addendum,
        body.suppress-balloons .column-type:hover ~ .column-addendum,
        body.suppress-balloons .table-column .column-addendum:hover
        {
            opacity: 0;
            pointer-events: none;
        }

        /* The keyboard-focused row's balloon is repositioned explicitly on scroll,
           so it must stay visible even while `suppress-balloons` hides hover-opened
           balloons (e.g. when the stationary cursor also happens to be over the
           focused row). Placed after the suppress rule so it wins the specificity
           tie. */
        body.suppress-balloons .table > button:is(:focus-visible, :has(:focus-visible)) .table-addendum,
        body.suppress-balloons .table-column > button:is(:focus-visible, :has(:focus-visible)) .column-addendum
        {
            opacity: 1;
            pointer-events: auto;
        }

        .table-addendum-elem
        {
            display: block;
            cursor: pointer;
            &:hover {
                text-decoration: 1px underline dotted var(--element-background-color);
            }
            &:focus {
                outline: none;
                text-decoration: 1px underline solid var(--element-background-color);
            }
        }

        #controls
        {
            /* When a page will be scrolled horizontally due to large table size, keep controls in place. */
            position: sticky;
            left: 0;
        }

        /* Otherwise Webkit based browsers will display ugly border on focus. */
        textarea, input, button
        {
            outline: none;
            border: none;
            color: var(--text-color);
        }

        /* The rule above removes the default outline; re-add a clear one for
           keyboard focus only (Tab), so the controls show where focus is while a
           mouse click does not draw a ring. Covers the real <button>s (Run, Run
           all, Download) and the icon "buttons" (copy, download, theme switcher). */
        button:focus-visible,
        [role="button"]:focus-visible
        {
            outline: 2px solid var(--link-color);
            outline-offset: 2px;
        }

        .monospace
        {
            /* Prefer fonts that have full hinting info. This is important for non-retina displays.
               Also I personally dislike "Ubuntu" font due to the similarity of 'r' and 'г' (it looks very ignorant). */
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
        }

        .shadow
        {
            box-shadow: 0 0 1rem var(--shadow-color);
        }

        input, textarea
        {
            border: 1px solid var(--border-color);
            /* The font must be not too small (to be inclusive) and not too large (it's less practical and make general feel of insecurity) */
            font-size: 11pt;
            padding: 0.25rem;
            background-color: var(--element-background-color);
        }

        input:focus, textarea:focus
        {
            color: var(--text-color-active);
        }

        #query
        {
            display: block;
            position: relative;
            z-index: 1;
            /* Make enough space for even big queries. */
            height: 20vh;
            /* Keeps query text-area's width full screen even when user adjusting the width of the query box. */
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            margin-top: -1px; /* To compensate the border. */
            resize: none; /* Disable default browser resizer */
        }

        /* When the backdrop is populated with the highlighted version of the text,
           we hide the textarea's own text by setting its color to transparent. What
           the user sees is the backdrop directly. The caret keeps a normal color via
           `caret-color` (the bare `color: transparent` would also make the caret
           transparent because the caret defaults to `currentColor`). */
        #query.has-backdrop
        {
            background: transparent;
            color: transparent;
            caret-color: var(--text-color-active);
        }

        #query-backdrop
        {
            display: none;
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            /* Typography MUST match the textarea exactly. */
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
            font-size: 11pt;
            line-height: normal;
            padding: 0.25rem;
            border: 1px solid transparent; /* same box model as textarea */
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            background-color: var(--element-background-color);
            /* Default backdrop text is the "neutral" color of the chosen palette.
               It coincides with the canonical text color after the difference blend. */
            color: var(--syntax-default);
        }

        #query-backdrop .q-active { background-color: var(--current-query-background-color); }

        /* Per-token syntax highlighting classes. The color value here is the raw color
           painted in the backdrop; the visible color the user sees is the difference
           between this and --text-color-active (see the comment on .has-backdrop). */
        #query-backdrop .q-kw  { color: var(--syntax-keyword); font-weight: bold; }
        #query-backdrop .q-id  { color: var(--syntax-identifier); }
        #query-backdrop .q-fn  { color: var(--syntax-function); }
        #query-backdrop .q-num { color: var(--syntax-number); }
        #query-backdrop .q-str { color: var(--syntax-string); }
        #query-backdrop .q-qid { color: var(--syntax-qident); }
        #query-backdrop .q-com { color: var(--syntax-comment); font-style: italic; }
        #query-backdrop .q-op  { color: var(--syntax-operator); }
        #query-backdrop .q-err { color: var(--syntax-error); text-decoration: underline wavy; }
        /* The token where the server reported a syntax error is painted with a red
           background. It is cleared as soon as the user returns focus to the editor. */
        #query-backdrop .q-err-pos { background-color: color-mix(in srgb, var(--syntax-error) 40%, transparent); border-radius: 2px; }
        /* An "(end of query)" error has no token to paint (the parser reached the end of the
           statement or a `;` separator). Mark the statement boundary with a thin vertical bar
           instead of filling the following separator/whitespace token. The bar is zero content
           width (drawn by the border, offset by negative margins) so the backdrop still aligns
           character-for-character with the textarea underneath it. */
        #query-backdrop .q-err-pos-end { display: inline-block; width: 0; border-left: 2px solid var(--syntax-error); margin: 0 -1px; }

        /* Rainbow parentheses: brackets are colored by their nesting depth (cycling
           through the seven --syntax-bracket-* colors). */
        #query-backdrop .q-br0 { color: var(--syntax-bracket-0); }
        #query-backdrop .q-br1 { color: var(--syntax-bracket-1); }
        #query-backdrop .q-br2 { color: var(--syntax-bracket-2); }
        #query-backdrop .q-br3 { color: var(--syntax-bracket-3); }
        #query-backdrop .q-br4 { color: var(--syntax-bracket-4); }
        #query-backdrop .q-br5 { color: var(--syntax-bracket-5); }
        #query-backdrop .q-br6 { color: var(--syntax-bracket-6); }

        /* The pair of brackets around the cursor is emphasized in bold with a faint
           background box. Bold monospace has the same advance width, so the surrounding
           text does not shift. */
        #query-backdrop .q-br-match
        {
            font-weight: bold;
            background-color: color-mix(in srgb, var(--syntax-default) 20%, transparent);
            border-radius: 0.15rem;
        }

        /* Underline used both for every occurrence of the identifier under the cursor and
           for the digit-group separators inside long numbers (matching `clickhouse-client`). */
        #query-backdrop .q-underline { text-decoration: underline; }

        /* Off-screen mirror used to measure the pixel coordinates of the caret inside the
           textarea. Its typography and box model MUST match the textarea exactly (same as
           the backdrop) so that wrapping is identical. */
        #completion-mirror
        {
            position: absolute;
            inset: 0;
            visibility: hidden;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
            font-size: 11pt;
            line-height: normal;
            padding: 0.25rem;
            border: 1px solid transparent;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
        }

        /* The completion overlay sits above the textarea and shows the "ghost" completion
           candidates. The container itself does not capture clicks (so the user can keep
           interacting with the textarea), only its entries do. Its inner-border (padding box)
           origin coincides with the textarea's, so entry offsets line up with the caret. */
        #completion-overlay
        {
            display: none;
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 2;
            border: 1px solid transparent;
            box-sizing: border-box;
        }

        /* A hidden, zero-visibility span injected into the backdrop at the cursor. It occupies
           exactly the width (and wrapping) of the selected completion's suffix, so the text to
           the right shifts as if the completion had already been typed. */
        #query-backdrop .completion-spacer
        {
            visibility: hidden;
        }

        .completion-entry
        {
            position: absolute;
            white-space: pre;
            pointer-events: auto;
            cursor: pointer;
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
            font-size: 11pt;
            line-height: normal;
            /* Faint text (a muted version of the backdrop's default token color). The
               faintness lives in the color, not in `opacity`, so the background can stay
               fully opaque and cover any existing text underneath. Inactive candidates are
               a 30% mix; the selected one is brighter (see below). */
            color: color-mix(in srgb, var(--syntax-default) 30%, var(--element-background-color));
            /* Opaque background so the entry fully covers any existing text underneath. */
            background-color: var(--element-background-color);
            border-radius: 0.2rem;
        }

        /* The selected entry is distinguished only by being a little brighter: a 50% mix of
           the default color (vs 30% for the inactive ones). */
        .completion-entry.completion-selected
        {
            color: color-mix(in srgb, var(--syntax-default) 50%, var(--element-background-color));
        }

        /* The "…" marker shown when more candidates exist below the visible window. */
        .completion-entry.completion-more
        {
            cursor: default;
        }

        #inputs
        {
            white-space: nowrap;
        }

        #url
        {
            width: 70%;
        }

        #user, #password
        {
            width: calc(15% + 1px);
            margin-left: -1px;
        }

        input.ok
        {
            color: var(--element-color-ok);
        }

        input.fail
        {
            background-color: var(--element-background-color-fail);
        }

        #run_div
        {
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        query-progress
        {
            flex: 1;
        }

        #run, #run-all
        {
            grid-area: run;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            padding: 0.25rem 1rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 100%; /* Otherwise button element will have a lower font size. */
        }

        #run-all
        {
            display: none;
        }

        #run:hover, #run:focus, #run-all:hover, #run-all:focus, #copy-div:hover, #copy-div:focus, #download-div:hover, #download-div:focus
        {
            color: var(--button-active-text-color);
            background-color: var(--button-active-color);
        }

        #hint
        {
            grid-area: hint;
            color: var(--misc-text-color);
        }

        #copy-div
        {
            display: none;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            padding: 0.25rem 0.65rem;
            cursor: pointer;
            position: relative;
        }

        .copy-balloon
        {
            position: absolute;
            bottom: calc(100% + 0.25rem);
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--button-color);
            color: var(--button-text-color);
            padding: 0.25rem 0.5rem;
            white-space: nowrap;
            font-size: 0.85em;
            opacity: 0;
            animation: balloon-fade 1s ease-out;
            pointer-events: none;
        }

        @keyframes balloon-fade
        {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        #copy-icon
        {
            width: 1em;
            height: 1em;
            vertical-align: middle;
        }

        #download-div
        {
            grid-area: download;
            display: none;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            padding: 0.25rem 0.65rem;
            cursor: pointer;
            position: relative;
        }

        #download
        {
            width: 1em;
            height: 1em;
            vertical-align: middle;
        }

        #download-dropdown
        {
            display: none;
            position: absolute;
            background-color: var(--button-color);
            border: 1px solid var(--button-text-color);
            padding: 0.5rem;
            z-index: 999;
            box-shadow: 0 4px 6px var(--shadow-color);
        }

        #download-dropdown.show
        {
            display: block;
        }

        .download-option
        {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .download-option label
        {
            color: var(--button-text-color);
            white-space: nowrap;
            margin-right: 0.5rem;
        }

        .download-option select,
        #download-format-other
        {
            flex: 1;
            padding: 0.25rem;
            background-color: var(--element-background-color);
            color: var(--text-color);
            border: 1px solid var(--shadow-color);

            &:focus {
                outline: none;
            }
        }

        #download-format-other
        {
            display: none;
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
        }

        #download-format-other.show
        {
            display: block;
        }

        #download-button
        {
            width: 100%;
            margin-top: 0rem;
            padding: 0.5rem 0.5rem;
            background-color: var(--element-background-color);
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-weight: bold;

            &:hover {
                background-color: var(--button-active-color);
                color: var(--button-active-text-color);
            }
        }

        #theme
        {
            grid-area: theme;
        }

        #toggle-light, #toggle-dark
        {
            cursor: pointer;
            user-select: none;
        }

        [data-theme="light"] #toggle-light, [data-theme="dark"] #toggle-dark
        {
            display: none;
        }

        .textarea-resizer {
            position: absolute;
            bottom: -0.3rem;
            left: 0;
            width: 100%;
            height: 0.5rem;
            cursor: row-resize;
            user-select: none;
        }

        .textarea-resizer:hover, .textarea-resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color);
        }

        #query_div {
            position: relative;
        }

        #query-params
        {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem 0.5rem;
            margin-top: 0.25rem;
            align-items: center;
        }

        .query-param
        {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .query-param label
        {
            color: var(--misc-text-color);
            white-space: nowrap;
        }

        .query-param input
        {
            width: 10em;
            max-width: 20em;
        }

        a, a:visited
        {
            color: var(--link-color);
            text-decoration: none;
        }

        #logo
        {
            fill: var(--logo-color);
        }

        #cloud-logo
        {
            color: transparent;
            text-shadow: 0 0 0 var(--logo-color);
            font-size: 10vw;
            display: block;
        }

        #logo-container
        {
            text-align: center;
            margin-top: 5em;
            line-height: 0.75;
            position: sticky;
            left: 0;
            z-index: -1; /* Below the expanded selected cell */
        }

        #url_status
        {
            position: absolute;
            display: inline-block;
            font-size: 11pt;
            padding: 0.25rem;
            transform: translateX(-100%);
            color: transparent;
            user-select: none;
        }

        #url_status.ok
        {
            color: #0F0;
        }

        #url_status.fail
        {
            color: #F00;
        }

        #server_info
        {
            color: var(--misc-text-color);
        }

        /* Prevents a different color when Chromium auto-fills inputs from the list. */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active
        {
            transition: background-color 600000s 0s, color 600000s 0s;
        }

    </style>
</head>

class QueryProgressElement extends HTMLElement
{
    constructor()
    {
        super();
        this.attachShadow({ mode: 'open' });
        this.shadowRoot.innerHTML = `
            <style>
                :host
                {
                    display: grid;
                    /* Progress and stats share the available width equally, and both can
                       shrink below their content size (the zero minimum), so they resize
                       uniformly when the row is narrow instead of one hogging the space. */
                    grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
                    gap: 1rem;
                    align-items: center;
                }

                #hourglass, #check-mark
                {
                    grid-column: 1;
                    grid-row: 1;
                }

                #hourglass
                {
                    display: none;
                    font-size: 110%;
                    color: #888;
                    animation: hourglass-animation 2s linear infinite;
                }

                #check-mark
                {
                    display: none;
                    font-size: 110%;
                    color: #080;
                }

                #progress
                {
                    display: none;
                    width: 100%;
                    color: var(--misc-text-color);
                    background: linear-gradient(to right,
                        transparent 0%,
                        var(--progress-color) var(--progress, 0%),
                        transparent var(--progress, 0%));
                }

                #stats
                {
                    color: var(--misc-text-color);
                }

                #stats b
                {
                    color: var(--progress-color);
                }

                @keyframes hourglass-animation
                {
                    0% { transform: none; }
                    25% { transform: rotate(180deg); }
                    50% { transform: rotate(180deg); }
                    75% { transform: rotate(360deg); }
                    100% { transform: rotate(360deg); }
                }
            </style>
            <span id="hourglass">&#10711;</span>
            <span id="check-mark">&#10004;</span>
            <span id="progress"></span>
            <span id="stats"></span>
        `;
        this._hourglass = this.shadowRoot.getElementById('hourglass');
        this._checkMark = this.shadowRoot.getElementById('check-mark');
        this._progress = this.shadowRoot.getElementById('progress');
        this._stats = this.shadowRoot.getElementById('stats');
    }

    clear()
    {
        this._hourglass.style.display = 'none';
        this._checkMark.style.display = 'none';
        this._stats.innerText = '';
        this._progress.style.display = 'none';
        this._progress.innerText = '';
        this.style.setProperty('--progress', '0%');
    }

    start()
    {
        this._checkMark.style.display = 'none';
        this._hourglass.style.display = 'inline-block';
    }

    finish()
    {
        this._hourglass.style.display = 'none';
        this._checkMark.style.display = 'inline-block';
    }

    updateProgress(progress)
    {
        const rows = +progress.read_rows;
        const bytes = +progress.read_bytes;
        const total_rows = +progress.total_rows_to_read;
        const elapsed_ns = +progress.elapsed_ns;

        let formatted_rows = formatReadableRows(rows);
        let formatted_bytes = formatReadableBytes(bytes);

        const rps = rows * 1e9 / elapsed_ns;
        const bps = bytes * 1e9 / elapsed_ns;

        let formatted_rps = formatReadableRows(rps) + '/sec';
        let formatted_bps = formatReadableBytes(bps) + '/sec';

        if (rows >= 1e11) { formatted_rows = `<b>${formatted_rows}<\/b>`; }
        if (bytes >= 1e12) { formatted_bytes = `<b>${formatted_bytes}<\/b>`; }
        if (rps >= 1e10) { formatted_rps = `<b>${formatted_rps}<\/b>`; }
        if (bps >= 1e10) { formatted_bps = `<b>${formatted_bps}<\/b>`; }

        let text = '';

        if (total_rows) { text += (100 * Math.min(1.0, rows / total_rows)).toFixed(1) + '%, '; }

        text += `Read ${formatted_rows} rows, ${formatted_bytes}`;

        if (rps > 1e6) { text += ` (${formatted_rps}, ${formatted_bps})`; }

        this._stats.innerHTML = text;

        this.style.setProperty('--progress',
            rows && total_rows ? (100 * rows / total_rows) + '%' : '0');
    }

    updateText(rowCount, elapsedNs, incomplete)
    {
        let progress_text = '';
        if (rowCount)
        {
            progress_text += `${rowCount}${incomplete ? '+' : ''} rows in result`;
            if (elapsedNs) progress_text += ', ';
        }
        if (elapsedNs) { progress_text += `${(elapsedNs / 1e9).toFixed(2)} sec.`; }
        this._progress.innerText = progress_text;
        this._progress.style.display = 'block';
    }
}

/// Per-column color coding modes chosen by the user, keyed by column name. Only columns with
/// an explicit (non-default) choice are stored. These modes are PER TAB: each tab keeps its own
/// `colorModes` object (see `makeTab`), and its result element(s) hold the same object via
/// `_colorModes`, so a toggle in one tab never repaints another tab's columns. They are persisted
/// with the tab's result snapshot and mirrored into the URL / history for the active tab.
function activeColorModes() {
    const tab = getActiveTab();
    return tab ? tab.colorModes : {};
}

/// Names of the columns the user pinned, kept as a set (`{name: true}`). A pinned column sticks
/// to the left/right edge of the result while it is scrolled horizontally instead of scrolling
/// away; several pinned columns stack against the edge. Like the color modes, the pinned set is
/// PER TAB: each tab keeps its own `pinnedColumns` object (see `makeTab`), and its result
/// element(s) hold the same object via `_pinnedColumns`, so pinning a column in one tab never
/// re-lays-out another tab's result. They are persisted with the tab's result snapshot and
/// mirrored into the URL / history for the active tab, exactly like the color modes.
function activePinnedColumns() {
    const tab = getActiveTab();
    return tab ? tab.pinnedColumns : {};
}
